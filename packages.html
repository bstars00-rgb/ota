<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>다이나믹 패키지 만들기 | 오마이트립</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* Tokens (shared) */
    :root{
      --primary:#FF6B35; --primary-dark:#E85826; --primary-soft:#FFF0E8;
      --secondary:#1E88E5; --secondary-soft:#E3F2FD;
      --accent:#FFD23F; --success:#10B981;
      --ink:#1A1A1A; --ink-2:#4B5563; --ink-3:#9CA3AF;
      --line:#E5E7EB; --bg:#fff; --bg-soft:#F7F7F9;
      --radius:14px; --radius-lg:20px;
      --shadow:0 6px 20px rgba(0,0,0,.08); --shadow-lg:0 20px 40px rgba(0,0,0,.12);
      --header-h:64px; --max-w:1280px;
    }
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);background:var(--bg-soft);line-height:1.55;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none;}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
    img{display:block;max-width:100%;}
    ul{list-style:none;margin:0;padding:0;}
    input,select,textarea{font-family:inherit;}
    .container{max-width:var(--max-w);margin:0 auto;padding:0 24px;}

    /* Header */
    .header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
    .header-inner{height:var(--header-h);display:flex;align-items:center;gap:16px;}
    .logo{display:inline-flex;align-items:center;gap:8px;font-weight:900;font-size:18px;letter-spacing:-0.02em;color:var(--ink);}
    .logo-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#FF9A6C);color:#fff;display:grid;place-items:center;font-weight:900;font-size:16px;box-shadow:0 4px 12px rgba(255,107,53,.35);}
    .logo-mark::after{content:"O";}
    .header-actions{margin-left:auto;display:flex;align-items:center;gap:8px;}
    .btn-ghost{padding:8px 14px;border-radius:10px;font-weight:600;font-size:13px;color:var(--ink-2);}
    .btn-ghost:hover{background:var(--bg-soft);color:var(--ink);}

    /* ==============================
       Progress Bar
       ============================== */
    .progress-wrap{
      background:#fff;
      border-bottom:1px solid var(--line);
      padding: 24px 0 20px;
    }
    .progress-steps{
      display:flex;align-items:center;justify-content:center;gap:14px;
      max-width:600px;margin:0 auto;
    }
    .p-step{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;}
    .p-step-circle{
      width:40px;height:40px;border-radius:50%;
      background:#fff;border:2px solid var(--line);color:var(--ink-3);
      display:grid;place-items:center;
      font-weight:900;font-size:15px;
      transition:all .25s;
      flex-shrink:0;
    }
    .p-step.active .p-step-circle{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 0 0 4px rgba(255,107,53,.18);}
    .p-step.done .p-step-circle{background:var(--success);border-color:var(--success);color:#fff;}
    .p-step.done .p-step-circle::after{content:"✓";}
    .p-step.done .p-step-circle .n{display:none;}
    .p-step-label{font-size:13px;font-weight:700;color:var(--ink-3);margin-top:8px;}
    .p-step.active .p-step-label,.p-step.done .p-step-label{color:var(--ink);}
    .p-line{
      flex:1;height:2px;background:var(--line);
      position:relative;margin-top:-20px;
    }
    .p-line.done{background:var(--success);}

    /* ==============================
       Builder Layout
       ============================== */
    .builder-grid{
      display:grid;
      grid-template-columns: 1fr 380px;
      gap: 24px;
      padding: 28px 24px 100px;
      max-width:var(--max-w); margin: 0 auto;
      align-items:flex-start;
    }
    .builder-main{min-width:0;}

    /* Step panels */
    .step-panel{
      background:#fff;
      border-radius:var(--radius-lg);
      padding:28px;
      border:1px solid var(--line);
    }
    .step-panel[hidden]{display:none;}
    .step-panel h2{
      margin:0 0 6px;font-size:22px;font-weight:900;letter-spacing:-0.02em;
    }
    .step-panel .sub{margin:0 0 22px;font-size:14px;color:var(--ink-2);}

    /* Flight search row (Step 1) */
    .flight-form{
      display:grid;
      grid-template-columns: 1fr 1fr 1.4fr 0.8fr;
      gap:10px;
      margin-bottom:22px;
      padding:14px;
      background:var(--bg-soft);
      border-radius:var(--radius);
    }
    .ff-field{display:flex;flex-direction:column;padding:4px 10px;}
    .ff-field label{font-size:10px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;}
    .ff-field select,.ff-field input{border:none;outline:none;background:transparent;font-size:14px;font-weight:700;color:var(--ink);padding:4px 0;}

    /* Flight cards */
    .flight-list{display:flex;flex-direction:column;gap:10px;}
    .flight-card{
      background:#fff;border:1.5px solid var(--line);border-radius:var(--radius);
      padding:16px 20px;
      display:grid;
      grid-template-columns: 70px 1fr auto;
      gap:16px;align-items:center;
      transition:border-color .15s, box-shadow .15s;
    }
    .flight-card:hover{border-color:var(--primary);box-shadow:var(--shadow);}
    .flight-card.selected{border-color:var(--primary);background:var(--primary-soft);}
    .airline-logo{
      width:48px;height:48px;border-radius:10px;
      background:linear-gradient(135deg,var(--secondary),#64B5F6);
      color:#fff;display:grid;place-items:center;font-weight:900;font-size:14px;
      letter-spacing:-0.02em;
    }
    .flight-legs{display:flex;flex-direction:column;gap:6px;min-width:0;}
    .flight-leg{display:flex;align-items:center;gap:10px;font-size:13px;}
    .flight-leg .tag{font-size:11px;color:var(--ink-3);font-weight:700;width:40px;flex-shrink:0;}
    .flight-leg .time{font-weight:800;font-size:15px;color:var(--ink);}
    .flight-leg .airport{color:var(--ink-2);font-weight:600;}
    .flight-leg .dur{font-size:11px;color:var(--ink-3);margin:0 4px;display:inline-flex;align-items:center;gap:4px;}
    .flight-leg .dur::before,.flight-leg .dur::after{content:"";flex:1;height:1px;background:var(--ink-3);opacity:.35;width:20px;display:inline-block;}
    .flight-leg .direct{color:var(--success);font-weight:700;font-size:11px;}
    .flight-airline-name{font-size:11px;color:var(--ink-3);font-weight:600;margin-bottom:4px;}
    .flight-price-col{text-align:right;display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
    .flight-price{font-size:20px;font-weight:900;color:var(--primary);letter-spacing:-0.02em;}
    .flight-price small{font-size:11px;color:var(--ink-3);font-weight:600;}
    .btn-select{
      padding:8px 16px;border-radius:8px;
      background:var(--ink);color:#fff;
      font-weight:800;font-size:12px;
      transition:background .15s;
    }
    .flight-card.selected .btn-select{background:var(--success);}
    .flight-card.selected .btn-select::before{content:"✓ ";}
    .btn-select:hover{background:var(--primary);}

    /* Hotel filters + list */
    .hotel-filters{
      display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;
      padding:14px;background:var(--bg-soft);border-radius:var(--radius);
    }
    .hf-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:150px;}
    .hf-group label{font-size:10px;font-weight:700;color:var(--ink-3);text-transform:uppercase;}
    .hf-group select{
      padding:8px 10px;border:1px solid var(--line);border-radius:8px;
      background:#fff;font-weight:700;font-size:13px;color:var(--ink);
      outline:none;
    }
    .date-notice{
      font-size:13px;color:var(--secondary);
      background:var(--secondary-soft);
      padding:10px 14px;border-radius:10px;
      margin-bottom:16px;
      display:flex;align-items:center;gap:8px;
    }

    .hotel-list{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
    .hotel-card{
      background:#fff;border:1.5px solid var(--line);border-radius:var(--radius);
      overflow:hidden;display:flex;flex-direction:column;
      transition:border-color .15s, box-shadow .15s, transform .15s;
    }
    .hotel-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
    .hotel-card.selected{border-color:var(--primary);background:var(--primary-soft);}
    .h-thumb{aspect-ratio:16/10;background-size:cover;background-position:center;background-color:#eee;}
    .h-body{padding:14px 16px;display:flex;flex-direction:column;flex:1;}
    .h-stars{color:var(--accent);font-size:12px;letter-spacing:2px;margin-bottom:4px;}
    .h-name{font-weight:800;font-size:15px;letter-spacing:-0.01em;}
    .h-area{font-size:12px;color:var(--ink-3);margin-top:2px;}
    .h-meta{display:flex;align-items:center;gap:8px;margin:8px 0 10px;font-size:11px;color:var(--ink-2);flex:1;}
    .h-score{padding:2px 6px;background:var(--primary-soft);color:var(--primary);border-radius:5px;font-weight:800;font-size:11px;}
    .h-price-row{display:flex;justify-content:space-between;align-items:baseline;padding-top:10px;border-top:1px dashed var(--line);}
    .h-per{font-size:11px;color:var(--ink-3);}
    .h-price{font-size:17px;font-weight:900;color:var(--primary);letter-spacing:-0.02em;}
    .h-select-bar{
      margin-top:10px;padding:10px;border-radius:8px;
      background:var(--ink);color:#fff;
      text-align:center;font-weight:800;font-size:12px;
      transition:background .15s;
      cursor:pointer;
    }
    .hotel-card.selected .h-select-bar{background:var(--success);}
    .hotel-card.selected .h-select-bar::before{content:"✓ ";}

    /* Activities */
    .act-cats{
      display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;
    }
    .act-cats::-webkit-scrollbar{display:none;}
    .act-cat{
      padding:10px 16px;border-radius:999px;
      font-weight:700;font-size:13px;color:var(--ink-2);
      background:var(--bg-soft);white-space:nowrap;
      transition:background .15s, color .15s;
    }
    .act-cat.active{background:var(--ink);color:#fff;}

    .act-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
    .act-card{
      background:#fff;border:1.5px solid var(--line);border-radius:var(--radius);
      overflow:hidden;display:flex;flex-direction:column;
      transition:border-color .15s, transform .15s;
    }
    .act-card.selected{border-color:var(--primary);}
    .a-thumb{aspect-ratio:16/10;background-size:cover;background-position:center;}
    .a-body{padding:12px;display:flex;flex-direction:column;gap:4px;flex:1;}
    .a-title{font-weight:800;font-size:13px;line-height:1.35;}
    .a-meta{font-size:11px;color:var(--ink-3);flex:1;margin-top:2px;}
    .a-price-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);}
    .a-price{font-size:15px;font-weight:900;color:var(--primary);}
    .btn-add{
      padding:6px 12px;border-radius:8px;font-weight:800;font-size:11px;
      background:var(--primary-soft);color:var(--primary);border:1.5px solid var(--primary);
      transition:all .15s;
    }
    .btn-add:hover{background:var(--primary);color:#fff;}
    .act-card.selected .btn-add{background:var(--success);color:#fff;border-color:var(--success);}
    .act-card.selected .btn-add::before{content:"✓ 추가됨 · ";}

    /* Step actions */
    .step-actions{
      display:flex;justify-content:space-between;gap:10px;margin-top:22px;
    }
    .btn-prev, .btn-next, .btn-skip{
      padding:14px 28px;border-radius:12px;font-weight:800;font-size:14px;
      transition:all .15s;
    }
    .btn-prev{background:var(--bg-soft);color:var(--ink-2);}
    .btn-prev:hover{background:var(--line);}
    .btn-next{background:var(--primary);color:#fff;margin-left:auto;}
    .btn-next:hover{background:var(--primary-dark);}
    .btn-next:disabled{background:var(--line);color:var(--ink-3);cursor:not-allowed;}
    .btn-skip{background:transparent;color:var(--ink-3);}
    .btn-skip:hover{color:var(--ink);}

    /* ==============================
       Summary Panel
       ============================== */
    .summary-panel{
      background:#fff;border-radius:var(--radius-lg);
      border:1px solid var(--line);padding:22px;
      position:sticky;top:calc(var(--header-h) + 16px);
    }
    .sp-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
    .sp-head h3{font-size:16px;font-weight:900;margin:0;letter-spacing:-0.02em;}
    .sp-head .pax{font-size:12px;color:var(--ink-3);font-weight:600;}

    .sp-empty{
      padding:24px 12px;text-align:center;
      font-size:13px;color:var(--ink-3);
      border:1.5px dashed var(--line);border-radius:10px;
    }
    .sp-items{display:flex;flex-direction:column;gap:10px;}
    .sp-item{
      display:grid;
      grid-template-columns: 28px 1fr auto 24px;
      gap:8px;align-items:flex-start;
      padding:12px;background:var(--bg-soft);border-radius:10px;
    }
    .sp-icon{font-size:18px;line-height:1.2;}
    .sp-item-main{min-width:0;}
    .sp-item-type{font-size:10px;font-weight:800;color:var(--ink-3);letter-spacing:.04em;text-transform:uppercase;}
    .sp-item-title{font-size:13px;font-weight:700;line-height:1.35;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .sp-item-sub{font-size:11px;color:var(--ink-3);margin-top:2px;}
    .sp-item-price{font-size:14px;font-weight:900;color:var(--ink);white-space:nowrap;align-self:center;}
    .sp-item-remove{
      width:24px;height:24px;border-radius:50%;
      background:#fff;color:var(--ink-3);
      display:grid;place-items:center;font-size:14px;
      transition:background .15s, color .15s;
    }
    .sp-item-remove:hover{background:#fee; color:#c00;}

    .sp-divider{height:1px;background:var(--line);margin:14px 0;}
    .sp-totals{display:flex;flex-direction:column;gap:6px;font-size:13px;color:var(--ink-2);}
    .sp-totals-row{display:flex;justify-content:space-between;}
    .sp-totals-row.discount{color:var(--primary);font-weight:700;}
    .sp-grand{
      display:flex;justify-content:space-between;align-items:baseline;
      padding:14px;background:var(--ink);color:#fff;border-radius:10px;margin:14px 0;
    }
    .sp-grand .label{font-size:12px;opacity:.7;}
    .sp-grand .total{font-size:22px;font-weight:900;letter-spacing:-0.02em;color:var(--accent);}
    .sp-cta{
      width:100%;padding:15px;border-radius:12px;
      background:var(--primary);color:#fff;
      font-weight:900;font-size:15px;
      box-shadow:0 6px 20px rgba(255,107,53,.35);
      transition:all .15s;
    }
    .sp-cta:hover{background:var(--primary-dark);transform:translateY(-1px);}
    .sp-cta:disabled{background:var(--line);color:var(--ink-3);box-shadow:none;cursor:not-allowed;transform:none;}

    /* ==============================
       Mobile Summary Bar + Sheet
       ============================== */
    .m-sum-bar{display:none;}
    .sheet-overlay{position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .25s;}
    .sheet-overlay.open{opacity:1;pointer-events:auto;}
    .sheet{
      position:fixed;left:0;right:0;bottom:0;z-index:71;
      background:#fff;border-radius:20px 20px 0 0;
      transform:translateY(100%);transition:transform .3s ease;
      max-height:80vh;overflow-y:auto;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }
    .sheet.open{transform:translateY(0);}
    .sheet-handle{
      width:40px;height:4px;background:var(--line);
      border-radius:2px;margin:10px auto 4px;
    }

    /* ==============================
       Responsive
       ============================== */
    @media (max-width: 1024px){
      .builder-grid{grid-template-columns:1fr;padding:18px 16px 120px;}
      .summary-panel{display:none;}
      .hotel-list{grid-template-columns:1fr;}
      .act-grid{grid-template-columns:repeat(2,1fr);}
      .flight-form{grid-template-columns:1fr 1fr;}

      .m-sum-bar{
        display:flex;align-items:center;gap:10px;
        position:fixed;left:0;right:0;bottom:0;z-index:55;
        background:#fff;border-top:1px solid var(--line);
        padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
        box-shadow: 0 -4px 20px rgba(0,0,0,.08);
      }
      .m-sum-info{flex:1;min-width:0;}
      .m-sum-label{font-size:10px;color:var(--ink-3);font-weight:700;}
      .m-sum-price{font-size:18px;font-weight:900;color:var(--primary);letter-spacing:-0.02em;}
      .m-sum-price small{font-size:11px;color:var(--ink-3);font-weight:600;}
      .m-sum-view{
        padding:12px 14px;border-radius:10px;background:var(--bg-soft);
        font-weight:700;font-size:12px;color:var(--ink-2);
      }
      .m-sum-next{
        padding:14px 20px;border-radius:10px;background:var(--primary);
        color:#fff;font-weight:900;font-size:14px;white-space:nowrap;
      }
      .m-sum-next:disabled{background:var(--line);color:var(--ink-3);}
    }

    @media (max-width: 768px){
      :root{--header-h:56px;}
      .progress-wrap{padding:16px 12px 14px;}
      .p-step-circle{width:34px;height:34px;font-size:13px;}
      .p-step-label{font-size:11px;}
      .p-line{margin-top:-18px;}

      .step-panel{padding:18px;border-radius:var(--radius);}
      .step-panel h2{font-size:18px;}

      .flight-form{grid-template-columns:1fr 1fr;}
      .flight-card{grid-template-columns:1fr;gap:12px;padding:14px;}
      .flight-price-col{flex-direction:row;justify-content:space-between;align-items:center;text-align:left;}

      .act-grid{grid-template-columns:1fr;}
      .hotel-filters{flex-direction:column;}
      .hf-group{min-width:0;}
    }

    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}
    }
  </style>
</head>
<body>

  <!-- A11y: Skip link -->
  <a class="skip-link" href="#omt-main">본문 바로가기</a>
  <style>.skip-link{position:absolute;left:-9999px;top:0;padding:10px 16px;background:#1A1A1A;color:#fff;z-index:999;font-weight:700;font-size:13px;border-radius:0 0 8px 0;text-decoration:none;}.skip-link:focus{left:0;}</style>

  <!-- HEADER -->
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-mark"></span><span>오마이트립</span></a>
      <div class="header-actions">
        <a href="ai-planner.html" class="btn-ghost">✦ AI 플래너</a>
        <a href="index.html" class="btn-ghost">← 홈</a>
      </div>
    </div>
  </header>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-steps" id="progressSteps">
      <div class="p-step active" data-step="1">
        <div class="p-step-circle"><span class="n">1</span></div>
        <div class="p-step-label">항공 선택</div>
      </div>
      <div class="p-line" data-line="1"></div>
      <div class="p-step" data-step="2">
        <div class="p-step-circle"><span class="n">2</span></div>
        <div class="p-step-label">호텔 선택</div>
      </div>
      <div class="p-line" data-line="2"></div>
      <div class="p-step" data-step="3">
        <div class="p-step-circle"><span class="n">3</span></div>
        <div class="p-step-label">액티비티</div>
      </div>
    </div>
  </div>

  <!-- BUILDER -->
  <main class="builder-grid">
    <section class="builder-main">
      <!-- STEP 1: FLIGHT -->
      <div class="step-panel" data-step-panel="1">
        <h2>✈️ 어떤 항공편으로 가시나요?</h2>
        <p class="sub">왕복 기준 · 1인 가격</p>

        <form class="flight-form" onsubmit="return false;">
          <div class="ff-field">
            <label>출발지</label>
            <select id="ffDep">
              <option>인천 (ICN)</option>
              <option>김포 (GMP)</option>
              <option>김해 (PUS)</option>
              <option>대구 (TAE)</option>
            </select>
          </div>
          <div class="ff-field">
            <label>도착지</label>
            <select id="ffArr">
              <option>오사카 (KIX)</option>
              <option>도쿄 (NRT)</option>
              <option>후쿠오카 (FUK)</option>
            </select>
          </div>
          <div class="ff-field">
            <label>여행 날짜</label>
            <input type="text" id="ffDate" value="2026.04.25 - 2026.04.28" readonly style="cursor:pointer;" />
          </div>
          <div class="ff-field">

  function renderHotels(){
    const filterPrice = document.getElementById('hfPrice').value;
    const filterStars = document.getElementById('hfStars').value;
    const filterArea  = document.getElementById('hfArea').value;

    const filtered = HOTELS.filter(h => {
      if(filterStars !== 'all' && h.stars !== +filterStars) return false;
      if(filterArea !== 'all' && h.area !== filterArea) return false;
      if(filterPrice === 'low' && h.price > 100000) return false;
      if(filterPrice === 'mid' && (h.price <= 100000 || h.price > 200000)) return false;
      if(filterPrice === 'high' && h.price <= 200000) return false;
      return true;
    });

    const el = document.getElementById('hotelList');
    if(filtered.length === 0){
      el.innerHTML = `<div class="sp-empty" style="grid-column:1/-1;">조건에 맞는 호텔이 없어요. 필터를 조정해보세요.</div>`;
      return;
    }

    el.innerHTML = filtered.map(h => `
      <div class="hotel-card ${STATE.hotel?.id===h.id?'selected':''}" data-id="${h.id}">
        <div class="h-thumb" style="background-image:url('${h.img}')"></div>
        <div class="h-body">
          <div class="h-stars">${'★'.repeat(h.stars)}</div>
          <div class="h-name">${h.name}</div>
          <div class="h-area">${h.areaLabel}</div>

        </div>
      </div>
    `).join('');

    el.querySelectorAll('.hotel-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = card.dataset.id;
        STATE.hotel = HOTELS.find(h => h.id === id);
        renderHotels();
        renderSummary();
        updateStepButtons();
      });
    });
  }

        renderActCats();
        renderActGrid();
      });
    });
  }

  function renderActGrid(){
    const el = document.getElementById('actGrid');
    const list = ACTIVITIES[currentCat] || [];
    el.innerHTML = list.map(a => {
      const isSel = STATE.activities.some(s => s.id === a.id);
      return `
        <div class="act-card ${isSel?'selected':''}" data-id="${a.id}">
          <div class="a-thumb" style="background-image:url('${a.img}')"></div>
          <div class="a-body">
            <div class="a-title">${a.title}</div>
            <div class="a-meta">${a.meta}</div>
            <div class="a-price-row">
              <span class="a-price">${krw(a.price)}</span>
              <button class="btn-add">${isSel?'선택 취소':'+ 추가'}</button>
            </div>
          </div>
        </div>
      `;
    }).join('');

    el.querySelectorAll('.act-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = card.dataset.id;
        const allAct = Object.values(ACTIVITIES).flat();
        const item = allAct.find(a => a.id === id);
        const idx = STATE.activities.findIndex(s => s.id === id);
        if(idx >= 0) STATE.activities.splice(idx, 1);
        else STATE.activities.push(item);
        renderActGrid();
        renderSummary();
      });
    });
  }

        title: `${STATE.flight.airline} ${STATE.flight.out.depAp} ↔ ${STATE.flight.out.arrAp}`,

    if(STATE.hotel){

        type:'호텔', icon:'🏨', key:'hotel',
        title: STATE.hotel.name,
        sub: `${STATE.hotel.areaLabel} · ${STATE.nights}박`,
        price: STATE.hotel.price * STATE.nights

    STATE.activities.forEach((a, i) => {

        type:'액티비티', icon:'🎫', key:'act-'+i,
        title: a.title, sub: a.meta, price: a.price

    });

    if(items.length === 0){
      el.innerHTML = `<div class="sp-empty">선택한 상품이 여기에 표시돼요</div>`;
      return;
    }

    const subtotal = items.reduce((s,i) => s + i.price, 0);
    const discount = Math.round(subtotal * 0.07);
    const final = subtotal - discount;

    el.innerHTML = `
      <div class="sp-items">
        ${items.map(i => `
          <div class="sp-item">
            <div class="sp-icon">${i.icon}</div>
            <div class="sp-item-main">

              <div class="sp-item-sub">${i.sub}</div>

            <button class="sp-item-remove" data-remove="${i.key}" aria-label="삭제">×</button>
          </div>
        `).join('')}
      </div>
      <div class="sp-divider"></div>
      <div class="sp-totals">
        <div class="sp-totals-row"><span>소계</span><span>${krw(subtotal)}</span></div>

      </div>
      <div class="sp-grand">
        <div class="label">총 예상 가격<br><small style="opacity:.6;">성인 ${STATE.paxCount}명 기준</small></div>
        <div class="total">${krw(final)}</div>
      </div>
      <button class="sp-cta" ${!STATE.flight||!STATE.hotel?'disabled':''} onclick="goCheckout()">예약하기 →</button>
    `;

    el.querySelectorAll('[data-remove]').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.remove;
        if(key === 'flight'){ STATE.flight = null; renderFlights(); }
        else if(key === 'hotel'){ STATE.hotel = null; renderHotels(); }
        else if(key.startsWith('act-')){
          const idx = +key.slice(4);
          STATE.activities.splice(idx, 1);
          renderActGrid();
        }
        renderSummary();
        updateStepButtons();
      });
    });
  }

  function renderSummary(){
    renderSummaryInto('sumBody');
    renderSummaryInto('sumBodyM');

    const total = computeFinal();
    document.getElementById('mSumPrice').textContent = krw(total);
  }

  function computeFinal(){
    let sub = 0;
    if(STATE.flight) sub += STATE.flight.price;
    if(STATE.hotel) sub += STATE.hotel.price * STATE.nights;
    STATE.activities.forEach(a => sub += a.price);
    return Math.max(0, sub - Math.round(sub * 0.07));
  }

  /* =========================================================================
     STEP NAVIGATION
     ========================================================================= */
  function goToStep(n){
    STATE.step = n;
    // Progress bar
    document.querySelectorAll('.p-step').forEach(el => {
      const s = +el.dataset.step;
      el.classList.remove('active','done');
      if(s < n) el.classList.add('done');
      if(s === n) el.classList.add('active');
    });
    document.querySelectorAll('.p-line').forEach(el => {
      const s = +el.dataset.line;
      el.classList.toggle('done', s < n);
    });
    // Panels
    document.querySelectorAll('[data-step-panel]').forEach(p => {
      p.hidden = +p.dataset.stepPanel !== n;
    });
    // Step 2 auto-refresh date notice
    if(n === 2) renderHotelDateNotice();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    updateStepButtons();
  }

  function updateStepButtons(){
    // Desktop step-actions next buttons
    const s1Next = document.querySelector('[data-step-panel="1"] .btn-next');
    if(s1Next) s1Next.disabled = !STATE.flight;
    const s2Next = document.querySelector('[data-step-panel="2"] .btn-next');
    if(s2Next) s2Next.disabled = !STATE.hotel;

    // Mobile next button
    const mNext = document.getElementById('mSumNext');
    if(STATE.step === 1){
      mNext.disabled = !STATE.flight;
      mNext.textContent = '다음 (호텔) →';
    } else if(STATE.step === 2){
      mNext.disabled = !STATE.hotel;
      mNext.textContent = '다음 (액티비티) →';
    } else {
      mNext.disabled = !(STATE.flight && STATE.hotel);
      mNext.textContent = '예약 진행 →';
    }
  }

  function mobileNext(){
    if(STATE.step === 1 && STATE.flight) goToStep(2);
    else if(STATE.step === 2 && STATE.hotel) goToStep(3);
    else if(STATE.step === 3) goCheckout();
  }

  function goCheckout(){
    if(!STATE.flight || !STATE.hotel){
      alert('항공과 호텔을 모두 선택해주세요');
      return;
    }
    // Persist to sessionStorage for checkout page
    const payload = {
      flight: STATE.flight,
      hotel:  STATE.hotel,
      activities: STATE.activities,
      paxCount: STATE.paxCount,
      nights: STATE.nights,
      dates: document.getElementById('ffDate').value,
      final: computeFinal()
    };
    sessionStorage.setItem('omt_package', JSON.stringify(payload));
    location.href = 'checkout.html';
  }

  /* =========================================================================
     Mobile sheet
     ========================================================================= */
  function openSheet(){
    document.getElementById('sumSheet').classList.add('open');
    document.querySelector('.sheet-overlay').classList.add('open');
  }
  function closeSheet(){
    document.getElementById('sumSheet').classList.remove('open');
    document.querySelector('.sheet-overlay').classList.remove('open');
  }

  // A11y: Escape closes bottom sheet
  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && document.getElementById('sumSheet').classList.contains('open')){
      closeSheet();
    }
  });

  /* =========================================================================
     WIRE UP
     ========================================================================= */
  // Step action buttons
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const a = btn.dataset.action;
      if(a === 'next'){
        if(STATE.step < 3) goToStep(STATE.step + 1);
      } else if(a === 'prev'){
        if(STATE.step > 1) goToStep(STATE.step - 1);
      } else if(a === 'skip'){
        goCheckout();
      } else if(a === 'checkout'){
        goCheckout();
      }
    });
  });

  // Progress steps — allow back-navigation only
  document.querySelectorAll('.p-step').forEach(el => {
    el.style.cursor = 'pointer';
    el.addEventListener('click', () => {
      const target = +el.dataset.step;
      if(target < STATE.step) goToStep(target);
    });
  });

  // Hotel filters
  ['hfPrice','hfStars','hfArea'].forEach(id => {
    document.getElementById(id).addEventListener('change', renderHotels);
  });

  // Pax change
  document.getElementById('ffPax').addEventListener('change', (e) => {
    const m = e.target.value.match(/성인\s*(\d+)/);
    if(m) STATE.paxCount = +m[1];
    document.getElementById('spPax').textContent = e.target.value;
    document.getElementById('mSumPax').textContent = e.target.value;
  });

  // Init
  renderFlights();
  renderHotels();
  renderActCats();
  renderActGrid();
  renderSummary();
  updateStepButtons();
  </script>
</body>
</html>
