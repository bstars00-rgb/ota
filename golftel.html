<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>골프텔 상세 | 오마이트립</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#FF6B35;--primary-dark:#E85826;--primary-soft:#FFF0E8;
      --secondary:#1E88E5;--accent:#FFD23F;
      --golf:#0B6E4F;--golf-dark:#075440;--golf-soft:#E6F4EE;
      --success:#10B981;--danger:#EF4444;
      --ink:#1A1A1A;--ink-2:#4B5563;--ink-3:#9CA3AF;
      --line:#E5E7EB;--bg:#fff;--bg-soft:#F7F7F9;
      --radius:14px;--radius-lg:20px;
      --shadow:0 6px 20px rgba(0,0,0,.08);
      --shadow-lg:0 20px 40px rgba(0,0,0,.15);
      --header-h:64px;--max-w:1280px;
    }
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{font-family:'Noto Sans KR',-apple-system,sans-serif;color:var(--ink);background:var(--bg-soft);line-height:1.55;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none;}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
    .container{max-width:var(--max-w);margin:0 auto;padding:0 24px;}
    .skip-link{position:absolute;left:-9999px;top:0;padding:10px 16px;background:#1A1A1A;color:#fff;z-index:999;font-weight:700;font-size:13px;border-radius:0 0 8px 0;}
    .skip-link:focus{left:0;}

    /* Header */
    .header{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
    .header-inner{height:var(--header-h);display:flex;align-items:center;gap:16px;}
    .logo{display:inline-flex;align-items:center;gap:8px;font-weight:900;font-size:18px;color:var(--ink);}
    .logo-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#FF9A6C);color:#fff;display:grid;place-items:center;font-weight:900;font-size:16px;}
    .logo-mark::after{content:"O";}
    .breadcrumb{font-size:13px;color:var(--ink-3);font-weight:600;}
    .breadcrumb a{color:var(--ink-2);}
    .breadcrumb a:hover{color:var(--golf);}
    .header-actions{margin-left:auto;display:flex;gap:6px;}
    .btn-ghost{padding:8px 14px;border-radius:10px;font-weight:600;font-size:13px;color:var(--ink-2);}
    .btn-ghost:hover{background:var(--bg-soft);color:var(--ink);}

    /* Gallery */
    .gallery{
      display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:repeat(2, 220px);gap:6px;
      max-width:var(--max-w);margin:20px auto 0;padding:0 24px;border-radius:var(--radius-lg);overflow:hidden;
    }
    .gallery > div{
      background-size:cover;background-position:center;background-color:var(--bg-soft);
      transition:filter .15s;border-radius:8px;
    }
    .gallery .g-main{grid-row:1/span 2;border-radius:14px;}

    /* Layout */
    .main-wrap{
      display:grid;grid-template-columns:1fr 380px;gap:32px;
      padding:32px 24px 80px;max-width:var(--max-w);margin:0 auto;
    }
    .main-col{min-width:0;}

    /* Title block */
    .title-block{margin-bottom:24px;}
    .badge{
      display:inline-flex;align-items:center;gap:5px;
      padding:5px 11px;border-radius:999px;font-size:11px;font-weight:900;
      letter-spacing:.02em;margin-bottom:10px;
    }
    .badge-direct{background:linear-gradient(135deg, var(--golf-dark), var(--golf));color:#fff;}
    .badge-direct::before{content:"⭐";}
    .badge-franchise{background:#fff;color:var(--ink);border:1px solid var(--line);}
    .badge-franchise::before{content:"🤝";}
    .title{font-size:30px;font-weight:900;letter-spacing:-0.02em;line-height:1.2;margin:6px 0 8px;}
    .subtitle{font-size:15px;color:var(--ink-2);font-weight:500;margin:0;}
    .quick-meta{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:13px;color:var(--ink-2);flex-wrap:wrap;}
    .rating{
      display:inline-flex;align-items:center;gap:4px;background:var(--primary-soft);color:var(--primary-dark);
      font-weight:900;padding:3px 10px;border-radius:6px;font-size:13px;
    }

    /* Quick facts strip */
    .facts{
      display:grid;grid-template-columns:repeat(4, 1fr);gap:1px;
      background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden;
      margin-bottom:28px;
    }
    .fact{background:#fff;padding:16px 18px;text-align:center;}
    .fact .lb{font-size:11px;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
    .fact .vl{font-size:18px;font-weight:900;color:var(--ink);letter-spacing:-0.01em;}
    .fact .vl .unit{font-size:12px;color:var(--ink-2);font-weight:700;margin-left:2px;}

    /* Tabs */
    .tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:24px;overflow-x:auto;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab{
      padding:14px 20px;font-weight:800;font-size:15px;color:var(--ink-3);position:relative;
      white-space:nowrap;transition:color .15s;
    }
    .tab.active{color:var(--golf);}
    .tab.active::after{content:"";position:absolute;left:12px;right:12px;bottom:-2px;height:3px;background:var(--golf);border-radius:3px 3px 0 0;}

    .panel{display:none;}
    .panel.active{display:block;}

    .panel h3{font-size:18px;font-weight:900;margin:0 0 12px;letter-spacing:-0.01em;}
    .panel p{color:var(--ink-2);margin:0 0 12px;}

    /* Hotel panel */
    .hotel-row{
      display:grid;grid-template-columns:160px 1fr;gap:18px;
      padding:18px;background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:18px;
    }
    .hotel-thumb{
      background-size:cover;background-position:center;background-color:var(--bg-soft);
      border-radius:10px;min-height:120px;
    }
    .hotel-info .name{font-size:16px;font-weight:900;margin:0 0 4px;}
    .hotel-info .area{font-size:13px;color:var(--ink-2);margin:0 0 8px;}
    .amenity{
      display:inline-block;font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px;
      background:var(--bg-soft);color:var(--ink-2);margin-right:4px;margin-bottom:4px;
    }

    /* Course panel */
    .course-card{
      padding:18px;background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:12px;
    }
    .course-card .name{font-size:16px;font-weight:900;margin:0 0 6px;color:var(--golf-dark);}
    .course-card .meta{display:flex;gap:14px;font-size:13px;color:var(--ink-2);flex-wrap:wrap;}
    .course-card .meta strong{color:var(--ink);font-weight:800;}

    /* Inclusions */
    .incl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .incl-row{
      display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;
      background:#fff;border:1px solid var(--line);font-size:14px;font-weight:600;
    }
    .incl-row.on{background:var(--golf-soft);border-color:var(--golf);color:var(--golf-dark);}
    .incl-row.off{color:var(--ink-3);text-decoration:line-through;background:var(--bg-soft);}
    .incl-row .check{font-size:18px;}

    .list{margin:0;padding-left:20px;color:var(--ink-2);}
    .list li{margin:6px 0;}

    /* Book panel (sticky) */
    .book-panel{
      background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);padding:22px;
      position:sticky;top:calc(var(--header-h) + 16px);box-shadow:var(--shadow);
    }
    .bp-price-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
    .bp-lb{font-size:12px;color:var(--ink-3);font-weight:700;}
    .bp-old{font-size:13px;color:var(--ink-3);text-decoration:line-through;}
    .bp-price{font-size:30px;font-weight:900;color:var(--golf-dark);letter-spacing:-0.02em;}
    .bp-price small{font-size:13px;font-weight:600;color:var(--ink-2);}
    .bp-basis{font-size:12px;color:var(--ink-3);margin-top:2px;}

    /* Air toggle */
    .air-toggle{
      margin-top:18px;padding:14px;background:var(--bg-soft);border-radius:12px;
      display:flex;align-items:center;gap:12px;cursor:pointer;border:2px solid transparent;
      transition:all .15s;
    }
    .air-toggle:hover{background:var(--primary-soft);}
    .air-toggle.on{background:var(--primary-soft);border-color:var(--primary);}
    .at-switch{
      width:42px;height:24px;background:var(--line);border-radius:999px;position:relative;flex-shrink:0;
      transition:background .15s;
    }
    .at-switch::after{
      content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;
      background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .15s;
    }
    .air-toggle.on .at-switch{background:var(--primary);}
    .air-toggle.on .at-switch::after{left:20px;}
    .at-text{flex:1;}
    .at-title{font-weight:900;font-size:14px;color:var(--ink);}
    .at-sub{font-size:12px;color:var(--ink-2);margin-top:2px;}
    .at-add{font-weight:900;font-size:13px;color:var(--primary);}

    /* Pax row */
    .pax-row{
      display:flex;align-items:center;justify-content:space-between;
      margin-top:18px;padding:14px;background:var(--bg-soft);border-radius:12px;
    }
    .pax-row .lb{font-size:13px;font-weight:700;color:var(--ink-2);}
    .pax-ctrl{display:flex;align-items:center;gap:12px;}
    .pax-ctrl button{
      width:32px;height:32px;border-radius:8px;border:1.5px solid var(--line);
      background:#fff;font-weight:900;font-size:16px;color:var(--ink);
    }
    .pax-ctrl button:hover{border-color:var(--golf);color:var(--golf);}
    .pax-ctrl .num{min-width:24px;text-align:center;font-weight:900;font-size:16px;}

    /* Total */
    .total-row{
      display:flex;justify-content:space-between;align-items:baseline;
      margin-top:18px;padding-top:18px;border-top:1px solid var(--line);
    }
    .total-row .lb{font-size:13px;font-weight:700;color:var(--ink-2);}
    .total-row .vl{font-size:24px;font-weight:900;color:var(--ink);letter-spacing:-0.02em;}

    .product-label{
      display:inline-block;font-size:11px;font-weight:900;padding:3px 8px;border-radius:6px;
      background:var(--golf-soft);color:var(--golf-dark);margin-top:4px;
    }
    .product-label.air{background:var(--primary-soft);color:var(--primary-dark);}

    .bp-cta{
      width:100%;padding:15px;border-radius:12px;background:var(--golf);color:#fff;
      font-weight:900;font-size:15px;margin-top:14px;
      box-shadow:0 6px 20px rgba(11,110,79,.35);transition:background .15s;
    }
    .bp-cta:hover{background:var(--golf-dark);}
    .bp-cta.air{background:var(--primary);box-shadow:0 6px 20px rgba(255,107,53,.35);}
    .bp-cta.air:hover{background:var(--primary-dark);}

    .bp-note{font-size:11px;color:var(--ink-3);text-align:center;margin-top:10px;}

    /* ★ 1박=1라운드 매칭 배너 (몽키 표준) */
    .match-banner{
      display:flex;align-items:center;gap:14px;padding:14px 18px;
      background:linear-gradient(135deg, var(--golf-soft), #F0FAF5);
      border:1px solid var(--golf);border-radius:12px;margin-bottom:18px;
    }
    .match-banner .ic{font-size:32px;line-height:1;flex-shrink:0;}
    .match-banner .text{flex:1;}
    .match-banner .t{font-weight:900;font-size:14px;color:var(--golf-dark);}
    .match-banner .s{font-size:12px;color:var(--ink-2);margin-top:2px;}

    /* 시설 칩 */
    .fac-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
    .fac{
      display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
      padding:4px 9px;border-radius:6px;background:var(--bg-soft);color:var(--ink-2);
    }
    .fac.korean{background:#FEF3C7;color:#92400E;}

    /* 운영 정보 시간표 */
    .op-table{
      display:grid;grid-template-columns:120px 1fr;gap:0;
      background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;
      font-size:13px;
    }
    .op-table > div{padding:11px 14px;border-bottom:1px solid var(--line);}
    .op-table > div:nth-last-child(-n+2){border-bottom:none;}
    .op-table .op-key{background:var(--bg-soft);font-weight:800;color:var(--ink-2);}
    .op-table .op-val{font-weight:600;color:var(--ink);}
    .op-table .op-val .sub{display:block;font-size:11px;color:var(--ink-3);font-weight:600;margin-top:2px;}

    /* 규정 리스트 */
    .rules-list{
      background:#FFF7ED;border:1px solid #FED7AA;border-radius:12px;padding:14px 18px;
      margin-top:14px;
    }
    .rules-list .title{font-weight:900;font-size:13px;color:#9A3412;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    .rules-list ul{margin:0;padding-left:18px;}
    .rules-list li{font-size:13px;color:var(--ink-2);margin:4px 0;line-height:1.5;}

    /* book-panel — 객실 옵션 / 티타임 */
    .opt-block{
      margin-top:14px;padding:12px;background:var(--bg-soft);border-radius:10px;
    }
    .opt-block .lb{font-size:11px;font-weight:800;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
    .room-list, .tee-list{display:flex;flex-direction:column;gap:6px;}
    .room-item, .tee-item{
      display:flex;align-items:center;justify-content:space-between;
      padding:9px 12px;border:1.5px solid var(--line);border-radius:8px;background:#fff;
      cursor:pointer;font-size:13px;transition:all .15s;
    }
    .room-item:hover, .tee-item:hover{border-color:var(--golf);}
    .room-item.on, .tee-item.on{border-color:var(--golf);background:var(--golf-soft);}
    .room-item .nm, .tee-item .nm{font-weight:700;color:var(--ink);}
    .room-item .pr{font-weight:800;color:var(--golf-dark);font-size:12px;}
    .room-item.on .pr{color:var(--golf-dark);}
    .tee-item .pr{font-size:11px;color:var(--ink-2);font-weight:600;}

    .tee-list{display:grid;grid-template-columns:1fr 1fr;gap:6px;}

    /* ★ 티오프 선택 섹션 (몽키 스타일 카드 그리드) */
    .tee-section{
      background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);
      padding:22px;margin-bottom:24px;
    }
    .tee-section-head{
      display:flex;align-items:center;justify-content:space-between;
      flex-wrap:wrap;gap:12px;margin-bottom:14px;
    }
    .tee-section-head h3{margin:0;font-size:18px;font-weight:900;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px;}
    .tee-required{
      display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:6px;
      background:var(--golf-soft);color:var(--golf-dark);margin-left:4px;
    }
    .tee-options{display:flex;gap:14px;}
    .opt-check{
      display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;
    }
    .opt-check input{width:16px;height:16px;accent-color:var(--golf);}

    /* 필터 칩 */
    .tee-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
    .tw{
      padding:8px 16px;border-radius:999px;border:1.5px solid var(--line);background:#fff;
      font-size:13px;font-weight:800;color:var(--ink-2);transition:all .15s;cursor:pointer;
    }
    .tw:hover{border-color:var(--golf);color:var(--golf);}
    .tw.on{background:#000;border-color:#000;color:#fff;}

    /* 시 단위 그룹 */
    .tee-hour-group{margin-bottom:22px;}
    .tee-hour-group:last-child{margin-bottom:0;}
    .th-head{font-size:15px;font-weight:900;color:var(--ink);margin-bottom:10px;padding-left:2px;}

    .th-slots{
      display:grid;grid-template-columns:repeat(3, 1fr);gap:8px;
    }

    /* 슬롯 카드 — 몽키 스타일 */
    .ts-card{
      padding:14px 14px;border-radius:10px;border:1.5px solid var(--line);background:#fff;
      cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:8px;
      text-align:left;width:100%;
    }
    .ts-card:hover:not(:disabled){border-color:var(--golf);background:var(--golf-soft);}
    .ts-card.on{border-color:var(--golf);border-width:2px;background:var(--golf-soft);}
    .ts-card:disabled{opacity:.4;cursor:not-allowed;}

    .ts-top{
      display:flex;align-items:center;justify-content:space-between;gap:8px;
    }
    .ts-time{font-size:16px;font-weight:900;color:var(--ink);letter-spacing:-0.01em;}
    .ts-course{
      font-size:11px;font-weight:800;padding:3px 8px;border-radius:5px;
      background:var(--accent);color:var(--ink);letter-spacing:-0.01em;
      max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .ts-course.alt{background:#A7F3D0;}

    .ts-bot{
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      padding-top:6px;border-top:1px dashed var(--line);
    }
    .ts-incl{font-size:11px;color:var(--ink-2);font-weight:600;}
    .ts-price{font-size:14px;font-weight:900;color:var(--ink);letter-spacing:-0.01em;}
    .ts-price.discount{color:#B91C1C;}
    .ts-price small{font-size:10px;color:var(--ink-3);font-weight:600;margin-left:2px;}

    /* 푸터 */
    .tee-footer{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);}
    .tee-counter{
      display:inline-block;font-size:13px;font-weight:900;color:var(--golf-dark);
      background:var(--golf-soft);padding:6px 12px;border-radius:8px;margin-bottom:10px;
    }
    .tee-counter.full{background:var(--success);color:#fff;}
    .tee-note{
      font-size:11px;color:var(--ink-3);line-height:1.5;
    }

    /* book-panel 미니 요약 */
    .tee-mini-summary{
      margin-top:14px;padding:10px 12px;background:var(--golf-soft);border-radius:8px;
      font-size:12px;color:var(--golf-dark);font-weight:700;display:none;
    }
    .tee-mini-summary.on{display:block;}
    .tee-mini-summary .tms-line{margin-top:4px;padding-top:4px;border-top:1px dashed rgba(11,110,79,.2);}
    .tee-mini-summary .tms-line:first-child{margin-top:0;padding-top:0;border-top:none;}

    /* Responsive */
    @media (max-width: 980px){
      .th-slots{grid-template-columns:repeat(2, 1fr);}
      .ts-course{max-width:90px;}
    }
    @media (max-width: 640px){
      .th-slots{grid-template-columns:1fr;}
      .tee-section-head{flex-direction:column;align-items:flex-start;}
    }

    /* Cart policy chip */
    .cart-chip{
      display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:800;
      padding:4px 10px;border-radius:6px;background:#EEF2FF;color:#4338CA;margin-top:6px;
    }

    /* Loading / Empty */
    .loading{padding:80px 20px;text-align:center;color:var(--ink-3);}

    /* Responsive */
    @media (max-width: 980px){
      .main-wrap{grid-template-columns:1fr;}
      .book-panel{position:static;}
      .gallery{grid-template-columns:1fr 1fr;grid-template-rows:200px 150px 150px;}
      .gallery .g-main{grid-row:1;grid-column:1/-1;}
      .facts{grid-template-columns:repeat(2, 1fr);}
      .title{font-size:24px;}
      .hotel-row{grid-template-columns:1fr;}
      .incl-grid{grid-template-columns:1fr;}
    }
    @media (max-width:640px){
      .gallery{grid-template-columns:1fr;grid-template-rows:240px;margin:0;padding:0;border-radius:0;}
      .gallery > div:not(.g-main){display:none;}
      .gallery .g-main{border-radius:0;}
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">본문 바로가기</a>

  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="오마이트립 홈">
        <span class="logo-mark" aria-hidden="true"></span>
        <span>오마이트립</span>
      </a>
      <div class="breadcrumb">
        <a href="golftels.html">⛳ 골프텔</a> ›
        <span id="bcCountry">로딩...</span>
      </div>
      <div class="header-actions">
        <a href="golftels.html" class="btn-ghost">← 목록으로</a>

    // ===== 객실 옵션 바인딩 =====
    function bindRoomOption(){

    // ============================================================
    // 티오프 슬롯 시스템 (몽키 카드 그리드 패턴)
    // ============================================================

    // 국가별 기본 그린피 (1라운딩 1인 정가)
    const BASE_GREEN_FEE = { japan:180000, vietnam:200000, thailand:140000, philippines:150000 };
    // 시간대별 모디파이어
    const TIME_MOD = { morning:1.0, afternoon:0.9, twilight:0.7, night:0.5 };
    // 시간대 라벨
    const WINDOW_LABEL = { morning:'오전', afternoon:'오후', twilight:'트와일라잇', night:'야간' };

    // "06:00~10:30" → 8분 간격 슬롯 배열
    function expandSlots(range, interval=8){
      const [start, end] = range.split('~').map(s => s.trim());
      const [sh, sm] = start.split(':').map(Number);
      const [eh, em] = end.split(':').map(Number);
      const out = [];
      let h = sh, m = sm;
      while(h < eh || (h === eh && m <= em)){
        out.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
        m += interval;
        while(m >= 60){ h++; m -= 60; }
      }
      return out;
    }

    // 포함사항 라벨 자동 생성: "캐디+1/2카트 포함" / "1/2카트 포함" 등
    function buildInclusionLabel(g){
      const inc = g.inclusions || {};
      const parts = [];
      if(inc.caddyFee) parts.push('캐디');
      if(inc.cartFee){
        // cartPolicy로 1/2카트 또는 1카트 구분
        const half = /2인 1카트/.test(g.cartPolicy || '');
        parts.push(half ? '1/2카트' : '1카트');
      }
      return parts.length ? parts.join('+') + ' 포함' : '그린피만';
    }

    // 슬롯 가격 계산
    function computeSlotPrice(g, course, window){
      const base = BASE_GREEN_FEE[g.country] || 180000;
      const mod  = TIME_MOD[window] || 1.0;
      const designerPremium = course?.designer && course.designer !== '-' ? 1.1 : 1.0;
      const cart  = g.inclusions?.cartFee  ? 25000 : 0;
      const caddy = g.inclusions?.caddyFee ? 30000 : 0;
      return Math.round(base * mod * designerPremium + cart + caddy);
    }

    // 모든 슬롯 생성 (시간 × 코스)
    function generateAllSlots(g){
      const teeOff = g.operatingInfo?.teeOff || {};
      const courseIds = g.courseIds || [];
      const slots = [];
      (g.teeTimeWindows || []).forEach(w => {
        const range = teeOff[w];
        if(!range) return;
        const times = expandSlots(range, 8);
        times.forEach(t => {
          courseIds.forEach((cid, ci) => {
            const course = D.GOLF_COURSES.find(c => c.id === cid);
            if(!course) return;
            const price = computeSlotPrice(g, course, w);
            slots.push({
              key: `${w}:${t}:${cid}`,
              window: w,
              time: t,
              hour: parseInt(t.split(':')[0]),
              courseId: cid,
              courseName: course.name,
              courseIdx: ci,
              inclLabel: buildInclusionLabel(g),
              price
            });
          });
        });
      });
      return slots;
    }

    // 시 단위로 그룹화
    function groupByHour(slots){
      const map = new Map();
      slots.forEach(s => {
        const h = String(s.hour).padStart(2,'0') + '시';
        if(!map.has(h)) map.set(h, []);
        map.get(h).push(s);
      });
      // 시간 정렬
      return Array.from(map.entries()).sort((a,b) => parseInt(a[0]) - parseInt(b[0]));
    }

    function renderTeeSlots(){
      const g = D.GOLFTELS.find(x => x.id === id);
      if(!g) return;
      const grid = document.getElementById('teeGrid');
      if(!grid) return;

      // 1. 모든 슬롯 생성
      let allSlots = generateAllSlots(g);

      // 2. 필터 적용
      if(teeFilter !== 'all'){
        allSlots = allSlots.filter(s => s.window === teeFilter);
      }

      // 3. "최저가만" — 같은 시간대에서 가장 싼 슬롯만 (코스 여러개 중 최저)
      if(teeOptions.cheapest){
        const byTime = new Map();
        allSlots.forEach(s => {
          const k = `${s.window}:${s.time}`;
          if(!byTime.has(k) || byTime.get(k).price > s.price) byTime.set(k, s);
        });
        allSlots = Array.from(byTime.values());
      }

      if(allSlots.length === 0){
        grid.innerHTML = `<div style="padding:30px;text-align:center;color:var(--ink-3);font-size:13px;">조건에 맞는 슬롯이 없습니다. 필터를 풀어보세요.</div>`;
        return;
      }

      // 4. 시 단위로 그룹화
      const groups = groupByHour(allSlots);

      // 5. HTML 렌더
      grid.innerHTML = groups.map(([hourLabel, slots]) => `
        <div class="tee-hour-group">
          <div class="th-head">${hourLabel}</div>
          <div class="th-slots">
            ${slots.map(s => {
              const on = selectedSlots.some(x => x.key === s.key);
              const discount = s.window !== 'morning';
              const courseClass = s.courseIdx === 0 ? '' : 'alt';
              return `
                <button type="button" class="ts-card ${on?'on':''}" data-key="${s.key}" aria-pressed="${on}">
                  <div class="ts-top">
                    <span class="ts-time">${s.time}</span>
                    <span class="ts-course ${courseClass}" title="${s.courseName}">${s.courseName}</span>
                  </div>
                  <div class="ts-bot">
                    <span class="ts-incl">${s.inclLabel}</span>
                    <span class="ts-price ${discount?'discount':''}">${s.price.toLocaleString('ko-KR')}원</span>
                  </div>
                </button>
              `;
            }).join('')}
          </div>
        </div>
      `).join('');

      // 6. 슬롯 클릭 → 다중 선택 (rounds 횟수까지)
      grid.querySelectorAll('.ts-card').forEach(card => {
        card.addEventListener('click', () => {
          const key = card.dataset.key;
          const existing = selectedSlots.findIndex(x => x.key === key);
          if(existing >= 0){
            // 이미 선택됨 → 해제
            selectedSlots.splice(existing, 1);
          } else {
            // 새로 선택 — rounds 초과 시 가장 오래된 것 자동 제거 (FIFO)
            if(selectedSlots.length >= g.rounds){
              selectedSlots.shift();
            }
            const slot = allSlots.find(s => s.key === key);
            if(slot) selectedSlots.push(slot);
          }
          renderTeeSlots();   // 재렌더 (선택 상태 반영)
          updateTeeCounter();
          updateTeeMiniSummary();
        });
      });

      updateTeeCounter();
      updateTeeMiniSummary();
    }

    function updateTeeCounter(){
      const g = D.GOLFTELS.find(x => x.id === id);
      if(!g) return;
      const el = document.getElementById('teeCounter');
      if(!el) return;
      const n = selectedSlots.length;
      el.textContent = `슬롯 ${n}/${g.rounds} 선택`;
      el.classList.toggle('full', n === g.rounds);
    }

    function updateTeeMiniSummary(){
      const el = document.getElementById('teeMiniSummary');
      if(!el) return;
      if(selectedSlots.length === 0){
        el.classList.remove('on');
        el.innerHTML = '';
        return;
      }
      el.classList.add('on');
      el.innerHTML = `<div style="font-weight:900;margin-bottom:4px;">✓ 선택된 티오프</div>` +
        selectedSlots.map(s => `
          <div class="tms-line">
            ${WINDOW_LABEL[s.window] || ''} ${s.time} · ${s.courseName.replace(/^[^a-zA-Z가-힣]+/,'')}
          </div>
        `).join('');
    }

    function bindTeeFilters(){
      document.querySelectorAll('#teeFilter .tw').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#teeFilter .tw').forEach(b => b.classList.remove('on'));
          btn.classList.add('on');
          teeFilter = btn.dataset.w;
          renderTeeSlots();
        });
      });
    }

    function bindTeeOptions(){
      const cheap = document.getElementById('optCheapest');
      const real  = document.getElementById('optRealtime');
      if(cheap) cheap.addEventListener('change', () => { teeOptions.cheapest = cheap.checked; renderTeeSlots(); });
      if(real)  real.addEventListener('change', () => { teeOptions.realtime = real.checked; renderTeeSlots(); });
    }

    // ===== Air price estimate (mock — country/city based) =====
    function getAirEstimate(){
      const g = D.GOLFTELS.find(x => x.id === id);
      if(!g) return 0;
      const map = { japan:380000, vietnam:430000, thailand:450000, philippines:420000 };
      return map[g.country] || 400000;
    }

    // ===== State =====
    let pax = 2;
    let airOn = false;
    let selectedRoomIdx = 0;  // roomOptions[0] = 기본 (2인 1실)
    let selectedSlots = [];   // [{ slotKey, window, time, courseId, courseName, price, includesLabel }]
    let teeFilter = 'all';
    let teeOptions = { cheapest:false, realtime:false };

    function changePax(delta){
      pax = Math.max(1, Math.min(8, pax + delta));
      document.getElementById('paxNum').textContent = pax;
      document.getElementById('paxLabel').textContent = pax + '명';
      updateTotal();
    }

    function toggleAir(){
      airOn = !airOn;
      const t = document.getElementById('airToggle');
      const label = document.getElementById('prodLabel');
      const cta = document.getElementById('ctaBtn');
      t.classList.toggle('on', airOn);
      if(airOn){
        label.textContent = '✈️ 골프투어 (골프텔 + 항공)';
        label.classList.add('air');
        cta.classList.add('air');
        cta.textContent = '골프투어로 예약 →';
      } else {
        label.textContent = '⛳ 골프텔 (호텔+골프)';
        label.classList.remove('air');
        cta.classList.remove('air');
        cta.textContent = '예약 진행하기 →';
      }
      updateTotal();
    }

    function updateTotal(){
      const g = D.GOLFTELS.find(x => x.id === id);
      if(!g) return;
      const room = g.roomOptions?.[selectedRoomIdx] || { supplement:0 };
      const per = g.pricePerPerson + (room.supplement || 0) + (airOn ? getAirEstimate() : 0);
      document.getElementById('totalPrice').textContent = (per * pax).toLocaleString('ko-KR') + '원';
      document.getElementById('bpPrice').innerHTML = per.toLocaleString('ko-KR') + '원<small> ~</small>';
    }

    function bookNow(){
      const g = D.GOLFTELS.find(x => x.id === id);
      if(!g) return;
      const productType = airOn ? 'golftel-air' : 'golftel';
      const room = g.roomOptions?.[selectedRoomIdx] || { type:'2인 1실', supplement:0 };
      const per = g.pricePerPerson + (room.supplement || 0) + (airOn ? getAirEstimate() : 0);
      const total = per * pax;

      // localStorage에 임시 저장 → checkout이 읽음
      try {
        sessionStorage.setItem('omt_pending_booking', JSON.stringify({
          source:'golftel',
          productType,
          productId: g.id,
          productName: g.name + (airOn ? ' (+ 항공)' : ''),
          productImage: g.images?.[0],
          country: g.country,
          city: g.city,
          nights: g.nights,
          rounds: g.rounds,
          pax,
          pricePerPerson: per,
          total,
          ownership: D.OWNERSHIP[g.country]?.model,
          // 사용자 선택 (예약 확정 시 백엔드로 전달)
          roomOption: room.type,
          roomSupplement: room.supplement || 0,
          // 선택 슬롯들 (각 라운딩별 시간·코스) — ELLIS 백엔드가 골프장에 부킹 요청
          selectedSlots: selectedSlots.map(s => ({
            window: s.window, time: s.time, courseId: s.courseId, courseName: s.courseName, price: s.price
          }))
        }));
      } catch(e){}

      location.href = `checkout.html?gt=${encodeURIComponent(g.id)}&pax=${pax}&air=${airOn ? 1 : 0}`;
    }

    function bindTabs(){
      document.querySelectorAll('#tabs .tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#tabs .tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const target = btn.dataset.tab;
          document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.dataset.panel === target));
        });
      });
    }

    // Close popups on Esc (consistency w/ rest of site)
    document.addEventListener('keydown', e => {
      if(e.key === 'Escape') document.activeElement?.blur();
    });

    render();
  </script>
</body>
</html>
