<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>골프텔 상세 | 오마이트립</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#FF6B35;--primary-dark:#E85826;--primary-soft:#FFF0E8;
      --secondary:#1E88E5;--accent:#FFD23F;
      --golf:#0B6E4F;--golf-dark:#075440;--golf-soft:#E6F4EE;
      --success:#10B981;--danger:#EF4444;
      --ink:#1A1A1A;--ink-2:#4B5563;--ink-3:#9CA3AF;
      --line:#E5E7EB;--bg:#fff;--bg-soft:#F7F7F9;
      --radius:14px;--radius-lg:20px;
      --shadow:0 6px 20px rgba(0,0,0,.08);
      --shadow-lg:0 20px 40px rgba(0,0,0,.15);
      --header-h:64px;--max-w:1280px;
    }
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{font-family:'Noto Sans KR',-apple-system,sans-serif;color:var(--ink);background:var(--bg-soft);line-height:1.55;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none;}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
    .container{max-width:var(--max-w);margin:0 auto;padding:0 24px;}
    .skip-link{position:absolute;left:-9999px;top:0;padding:10px 16px;background:#1A1A1A;color:#fff;z-index:999;font-weight:700;font-size:13px;border-radius:0 0 8px 0;}
    .skip-link:focus{left:0;}

    /* Header */
    .header{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
    .header-inner{height:var(--header-h);display:flex;align-items:center;gap:16px;}
    .logo{display:inline-flex;align-items:center;gap:8px;font-weight:900;font-size:18px;color:var(--ink);}
    .logo-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#FF9A6C);color:#fff;display:grid;place-items:center;font-weight:900;font-size:16px;}
    .logo-mark::after{content:"O";}
    .breadcrumb{font-size:13px;color:var(--ink-3);font-weight:600;}
    .breadcrumb a{color:var(--ink-2);}
    .breadcrumb a:hover{color:var(--golf);}
    .header-actions{margin-left:auto;display:flex;gap:6px;}
    .btn-ghost{padding:8px 14px;border-radius:10px;font-weight:600;font-size:13px;color:var(--ink-2);}
    .btn-ghost:hover{background:var(--bg-soft);color:var(--ink);}

    /* Gallery */
    .gallery{
      display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:repeat(2, 220px);gap:6px;
      max-width:var(--max-w);margin:20px auto 0;padding:0 24px;border-radius:var(--radius-lg);overflow:hidden;
    }
    .gallery > div{
      background-size:cover;background-position:center;background-color:var(--bg-soft);
      transition:filter .15s;border-radius:8px;position:relative;
    }
    .gallery > div:not(.g-main):hover{filter:brightness(.95);}
    .gallery .g-main{grid-row:1/span 2;border-radius:14px;}

    /* 마지막 슬롯 "+N장 더보기" 오버레이 */
    .gallery .g-more{
      cursor:pointer;
    }
    .gallery .g-more::after{
      content:attr(data-more);
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,.55);color:#fff;font-weight:900;font-size:18px;
      border-radius:8px;letter-spacing:-0.01em;
      transition:background .15s;
    }
    .gallery .g-more:hover::after{background:rgba(0,0,0,.7);}

    /* 갤러리 모달 */
    .lightbox{
      position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);display:none;
      align-items:center;justify-content:center;flex-direction:column;padding:40px 20px;
    }
    .lightbox.on{display:flex;}
    .lightbox-img{
      max-width:min(1100px, 95vw);max-height:78vh;border-radius:12px;background:#000;
      object-fit:contain;box-shadow:0 20px 60px rgba(0,0,0,.5);
    }
    .lightbox-thumbs{
      display:flex;gap:6px;margin-top:14px;overflow-x:auto;padding:8px;
      max-width:min(1100px, 95vw);
    }
    .lightbox-thumbs img{
      width:72px;height:54px;object-fit:cover;border-radius:6px;cursor:pointer;
      opacity:.6;transition:opacity .15s, transform .15s;flex-shrink:0;
    }
    .lightbox-thumbs img:hover{opacity:1;}
    .lightbox-thumbs img.on{opacity:1;outline:2px solid var(--accent);}
    .lightbox-close{
      position:absolute;top:20px;right:24px;width:40px;height:40px;border-radius:50%;
      background:rgba(255,255,255,.1);color:#fff;font-size:22px;font-weight:900;
      display:grid;place-items:center;cursor:pointer;backdrop-filter:blur(8px);
    }
    .lightbox-close:hover{background:rgba(255,255,255,.2);}
    .lightbox-counter{
      position:absolute;top:24px;left:24px;color:#fff;font-weight:800;font-size:14px;
      background:rgba(255,255,255,.1);padding:6px 14px;border-radius:999px;backdrop-filter:blur(8px);
    }

    /* Layout */
    .main-wrap{
      display:grid;grid-template-columns:1fr 380px;gap:32px;
      padding:32px 24px 80px;max-width:var(--max-w);margin:0 auto;
    }
    .main-col{min-width:0;}

    /* Title block */
    .title-block{margin-bottom:24px;}
    .badge{
      display:inline-flex;align-items:center;gap:5px;
      padding:5px 11px;border-radius:999px;font-size:11px;font-weight:900;
      letter-spacing:.02em;margin-bottom:10px;
    }
    .badge-direct{background:linear-gradient(135deg, var(--golf-dark), var(--golf));color:#fff;}
    .badge-direct::before{content:"⭐";}
    .badge-franchise{background:#fff;color:var(--ink);border:1px solid var(--line);}
    .badge-franchise::before{content:"🤝";}
    .title{font-size:30px;font-weight:900;letter-spacing:-0.02em;line-height:1.2;margin:6px 0 8px;}
    .subtitle{font-size:15px;color:var(--ink-2);font-weight:500;margin:0;}
    .quick-meta{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:13px;color:var(--ink-2);flex-wrap:wrap;}
    .rating{
      display:inline-flex;align-items:center;gap:4px;background:var(--primary-soft);color:var(--primary-dark);
      font-weight:900;padding:3px 10px;border-radius:6px;font-size:13px;
    }

    /* Quick facts strip */
    .facts{
      display:grid;grid-template-columns:repeat(4, 1fr);gap:1px;
      background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden;
      margin-bottom:28px;
    }
    .fact{background:#fff;padding:16px 18px;text-align:center;}
    .fact .lb{font-size:11px;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
    .fact .vl{font-size:18px;font-weight:900;color:var(--ink);letter-spacing:-0.01em;}
    .fact .vl .unit{font-size:12px;color:var(--ink-2);font-weight:700;margin-left:2px;}

    /* Tabs */
    .tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:24px;overflow-x:auto;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab{
      padding:14px 20px;font-weight:800;font-size:15px;color:var(--ink-3);position:relative;
      white-space:nowrap;transition:color .15s;
    }
    .tab.active{color:var(--golf);}
    .tab.active::after{content:"";position:absolute;left:12px;right:12px;bottom:-2px;height:3px;background:var(--golf);border-radius:3px 3px 0 0;}

    .panel{display:none;}
    .panel.active{display:block;}

    .panel h3{font-size:18px;font-weight:900;margin:0 0 12px;letter-spacing:-0.01em;}
    .panel p{color:var(--ink-2);margin:0 0 12px;}

    /* Hotel panel */
    .hotel-row{
      display:grid;grid-template-columns:160px 1fr;gap:18px;
      padding:18px;background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:18px;
    }
    .hotel-thumb{
      background-size:cover;background-position:center;background-color:var(--bg-soft);
      border-radius:10px;min-height:120px;
    }
    .hotel-info .name{font-size:16px;font-weight:900;margin:0 0 4px;}
    .hotel-info .area{font-size:13px;color:var(--ink-2);margin:0 0 8px;}
    .amenity{
      display:inline-block;font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px;
      background:var(--bg-soft);color:var(--ink-2);margin-right:4px;margin-bottom:4px;
    }

    /* Course panel */
    .course-card{
      padding:18px;background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:12px;
    }
    .course-card .name{font-size:16px;font-weight:900;margin:0 0 6px;color:var(--golf-dark);}
    .course-card .meta{display:flex;gap:14px;font-size:13px;color:var(--ink-2);flex-wrap:wrap;}
    .course-card .meta strong{color:var(--ink);font-weight:800;}

    /* Inclusions */
    .incl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .incl-row{
      display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;
      background:#fff;border:1px solid var(--line);font-size:14px;font-weight:600;
    }
    .incl-row.on{background:var(--golf-soft);border-color:var(--golf);color:var(--golf-dark);}
    .incl-row.off{color:var(--ink-3);text-decoration:line-through;background:var(--bg-soft);}
    .incl-row .check{font-size:18px;}

    .list{margin:0;padding-left:20px;color:var(--ink-2);}
    .list li{margin:6px 0;}

    /* Book panel (sticky) */
    .book-panel{
      background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);padding:22px;
      position:sticky;top:calc(var(--header-h) + 16px);box-shadow:var(--shadow);
    }
    .bp-price-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
    .bp-lb{font-size:12px;color:var(--ink-3);font-weight:700;}
    .bp-old{font-size:13px;color:var(--ink-3);text-decoration:line-through;}
    .bp-price{font-size:30px;font-weight:900;color:var(--golf-dark);letter-spacing:-0.02em;}
    .bp-price small{font-size:13px;font-weight:600;color:var(--ink-2);}
    .bp-basis{font-size:12px;color:var(--ink-3);margin-top:2px;}

    /* Air toggle */
    .air-toggle{
      margin-top:18px;padding:14px;background:var(--bg-soft);border-radius:12px;
      display:flex;align-items:center;gap:12px;cursor:pointer;border:2px solid transparent;
      transition:all .15s;
    }
    .air-toggle:hover{background:var(--primary-soft);}
    .air-toggle.on{background:var(--primary-soft);border-color:var(--primary);}
    .at-switch{
      width:42px;height:24px;background:var(--line);border-radius:999px;position:relative;flex-shrink:0;
      transition:background .15s;
    }
    .at-switch::after{
      content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;
      background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .15s;
    }
    .air-toggle.on .at-switch{background:var(--primary);}
    .air-toggle.on .at-switch::after{left:20px;}
    .at-text{flex:1;}
    .at-title{font-weight:900;font-size:14px;color:var(--ink);}
    .at-sub{font-size:12px;color:var(--ink-2);margin-top:2px;}
    .at-add{font-weight:900;font-size:13px;color:var(--primary);}

    /* Pax row */
    .pax-row{
      display:flex;align-items:center;justify-content:space-between;
      margin-top:18px;padding:14px;background:var(--bg-soft);border-radius:12px;
    }
    .pax-row .lb{font-size:13px;font-weight:700;color:var(--ink-2);}
    .pax-ctrl{display:flex;align-items:center;gap:12px;}
    .pax-ctrl button{
      width:32px;height:32px;border-radius:8px;border:1.5px solid var(--line);
      background:#fff;font-weight:900;font-size:16px;color:var(--ink);
    }
    .pax-ctrl button:hover{border-color:var(--golf);color:var(--golf);}
    .pax-ctrl .num{min-width:24px;text-align:center;font-weight:900;font-size:16px;}

    /* Total */
    .total-row{
      display:flex;justify-content:space-between;align-items:baseline;
      margin-top:18px;padding-top:18px;border-top:1px solid var(--line);
    }
    .total-row .lb{font-size:13px;font-weight:700;color:var(--ink-2);}
    .total-row .vl{font-size:24px;font-weight:900;color:var(--ink);letter-spacing:-0.02em;}

    .product-label{
      display:inline-block;font-size:11px;font-weight:900;padding:3px 8px;border-radius:6px;
      background:var(--golf-soft);color:var(--golf-dark);margin-top:4px;
    }
    .product-label.air{background:var(--primary-soft);color:var(--primary-dark);}

    .bp-cta{
      width:100%;padding:15px;border-radius:12px;background:var(--golf);color:#fff;
      font-weight:900;font-size:15px;margin-top:14px;
      box-shadow:0 6px 20px rgba(11,110,79,.35);transition:background .15s;
    }
    .bp-cta:hover{background:var(--golf-dark);}
    .bp-cta.air{background:var(--primary);box-shadow:0 6px 20px rgba(255,107,53,.35);}
    .bp-cta.air:hover{background:var(--primary-dark);}

    .bp-note{font-size:11px;color:var(--ink-3);text-align:center;margin-top:10px;}

    /* ★ 1박=1라운드 매칭 배너 (몽키 표준) */
    .match-banner{
      display:flex;align-items:center;gap:14px;padding:14px 18px;
      background:linear-gradient(135deg, var(--golf-soft), #F0FAF5);
      border:1px solid var(--golf);border-radius:12px;margin-bottom:18px;
    }
    .match-banner .ic{font-size:32px;line-height:1;flex-shrink:0;}
    .match-banner .text{flex:1;}
    .match-banner .t{font-weight:900;font-size:14px;color:var(--golf-dark);}
    .match-banner .s{font-size:12px;color:var(--ink-2);margin-top:2px;}

    /* 시설 칩 */
    .fac-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
    .fac{
      display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
      padding:4px 9px;border-radius:6px;background:var(--bg-soft);color:var(--ink-2);
    }
    .fac.korean{background:#FEF3C7;color:#92400E;}

    /* 운영 정보 시간표 */
    .op-table{
      display:grid;grid-template-columns:120px 1fr;gap:0;
      background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;
      font-size:13px;
    }
    .op-table > div{padding:11px 14px;border-bottom:1px solid var(--line);}
    .op-table > div:nth-last-child(-n+2){border-bottom:none;}
    .op-table .op-key{background:var(--bg-soft);font-weight:800;color:var(--ink-2);}
    .op-table .op-val{font-weight:600;color:var(--ink);}
    .op-table .op-val .sub{display:block;font-size:11px;color:var(--ink-3);font-weight:600;margin-top:2px;}

    /* 규정 리스트 */
    .rules-list{
      background:#FFF7ED;border:1px solid #FED7AA;border-radius:12px;padding:14px 18px;
      margin-top:14px;
    }
    .rules-list .title{font-weight:900;font-size:13px;color:#9A3412;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    .rules-list ul{margin:0;padding-left:18px;}
    .rules-list li{font-size:13px;color:var(--ink-2);margin:4px 0;line-height:1.5;}

    /* 체크인 날짜 picker */
    .date-picker-block{
      margin-top:14px;padding:14px;background:linear-gradient(135deg, var(--golf-soft), #F0FAF5);
      border-radius:10px;border:1.5px solid var(--golf);
    }
    .dp-label{font-size:11px;font-weight:800;color:var(--golf-dark);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
    .dp-input{
      width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;
      font-size:14px;font-weight:800;color:var(--ink);background:#fff;cursor:pointer;
      font-family:inherit;
    }
    .dp-input:focus{outline:none;border-color:var(--golf);box-shadow:0 0 0 3px rgba(11,110,79,.15);}
    .dp-hint{font-size:11px;color:var(--ink-2);margin-top:6px;display:flex;align-items:center;gap:6px;}
    .dp-hint .day-chip{
      padding:1px 6px;border-radius:4px;font-size:10px;font-weight:900;
    }
    .dp-hint .day-chip.weekday{background:#E0F2FE;color:#0369A1;}
    .dp-hint .day-chip.weekend{background:#FEE2E2;color:#B91C1C;}
    .dp-hint .day-chip.holiday{background:linear-gradient(135deg, var(--accent), #F59E0B);color:#7C2D12;}

    /* book-panel — 객실 옵션 / 티타임 */
    .opt-block{
      margin-top:14px;padding:12px;background:var(--bg-soft);border-radius:10px;
    }
    .opt-block .lb{font-size:11px;font-weight:800;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
    .room-list, .tee-list{display:flex;flex-direction:column;gap:6px;}
    .room-item, .tee-item{
      display:flex;align-items:center;justify-content:space-between;
      padding:9px 12px;border:1.5px solid var(--line);border-radius:8px;background:#fff;
      cursor:pointer;font-size:13px;transition:all .15s;
    }
    .room-item:hover, .tee-item:hover{border-color:var(--golf);}
    .room-item.on, .tee-item.on{border-color:var(--golf);background:var(--golf-soft);}
    .room-item .nm, .tee-item .nm{font-weight:700;color:var(--ink);}
    .room-item .pr{font-weight:800;color:var(--golf-dark);font-size:12px;}
    .room-item.on .pr{color:var(--golf-dark);}
    .tee-item .pr{font-size:11px;color:var(--ink-2);font-weight:600;}

    .tee-list{display:grid;grid-template-columns:1fr 1fr;gap:6px;}

    /* ★ 티오프 선택 섹션 (몽키 스타일 카드 그리드) */
    .tee-section{
      background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);
      padding:22px;margin-bottom:24px;
    }
    .tee-section-head{
      display:flex;align-items:center;justify-content:space-between;
      flex-wrap:wrap;gap:12px;margin-bottom:14px;
    }
    .tee-section-head h3{margin:0;font-size:18px;font-weight:900;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px;}
    .tee-required{
      display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:6px;
      background:var(--golf-soft);color:var(--golf-dark);margin-left:4px;
    }
    .tee-options{display:flex;gap:14px;}
    .opt-check{
      display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;
    }
    .opt-check input{width:16px;height:16px;accent-color:var(--golf);}

    /* 필터 칩 */
    .tee-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
    .tw{
      padding:8px 16px;border-radius:999px;border:1.5px solid var(--line);background:#fff;
      font-size:13px;font-weight:800;color:var(--ink-2);transition:all .15s;cursor:pointer;
    }
    .tw:hover{border-color:var(--golf);color:var(--golf);}
    .tw.on{background:#000;border-color:#000;color:#fff;}

    /* 시 단위 그룹 */
    .tee-hour-group{margin-bottom:22px;}
    .tee-hour-group:last-child{margin-bottom:0;}
    .th-head{font-size:15px;font-weight:900;color:var(--ink);margin-bottom:10px;padding-left:2px;}

    .th-slots{
      display:grid;grid-template-columns:repeat(3, 1fr);gap:8px;
    }

    /* 슬롯 카드 — 몽키 스타일 */
    .ts-card{
      padding:14px 14px;border-radius:10px;border:1.5px solid var(--line);background:#fff;
      cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:8px;
      text-align:left;width:100%;
    }
    .ts-card:hover:not(:disabled){border-color:var(--golf);background:var(--golf-soft);}
    .ts-card.on{border-color:var(--golf);border-width:2px;background:var(--golf-soft);}
    .ts-card:disabled{opacity:.4;cursor:not-allowed;}

    .ts-top{
      display:flex;align-items:center;justify-content:space-between;gap:8px;
    }
    .ts-time{font-size:16px;font-weight:900;color:var(--ink);letter-spacing:-0.01em;}
    .ts-course{
      font-size:11px;font-weight:800;padding:3px 8px;border-radius:5px;
      background:var(--accent);color:var(--ink);letter-spacing:-0.01em;
      max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .ts-course.alt{background:#A7F3D0;}

    .ts-bot{
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      padding-top:6px;border-top:1px dashed var(--line);
    }
    .ts-incl{font-size:11px;color:var(--ink-2);font-weight:600;}
    .ts-price{font-size:14px;font-weight:900;color:var(--ink);letter-spacing:-0.01em;}
    .ts-price.discount{color:#B91C1C;}
    .ts-price small{font-size:10px;color:var(--ink-3);font-weight:600;margin-left:2px;}

    /* 실시간 / 견적 뱃지 */
    .ts-rt{
      display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:900;
      padding:2px 6px;border-radius:4px;
      background:linear-gradient(135deg, #FFD23F, #FFA500);color:#7C2D12;
      margin-right:auto;
    }
    .ts-rt.quote{background:var(--bg-soft);color:var(--ink-3);}
    .ts-rt-row{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--ink-3);font-weight:600;}

    /* 푸터 */
    .tee-footer{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);}
    .tee-counter{
      display:inline-block;font-size:13px;font-weight:900;color:var(--golf-dark);
      background:var(--golf-soft);padding:6px 12px;border-radius:8px;margin-bottom:10px;
    }
    .tee-counter.full{background:var(--success);color:#fff;}
    .tee-note{
      font-size:11px;color:var(--ink-3);line-height:1.5;
    }

    /* book-panel 미니 요약 */
    .tee-mini-summary{
      margin-top:14px;padding:10px 12px;background:var(--golf-soft);border-radius:8px;
      font-size:12px;color:var(--golf-dark);font-weight:700;display:none;
    }
    .tee-mini-summary.on{display:block;}
    .tee-mini-summary .tms-line{margin-top:4px;padding-top:4px;border-top:1px dashed rgba(11,110,79,.2);}
    .tee-mini-summary .tms-line:first-child{margin-top:0;padding-top:0;border-top:none;}

    /* Responsive */
    @media (max-width: 980px){
      .th-slots{grid-template-columns:repeat(2, 1fr);}
      .ts-course{max-width:90px;}
    }
    @media (max-width: 640px){
      .th-slots{grid-template-columns:1fr;}
      .tee-section-head{flex-direction:column;align-items:flex-start;}
    }

    /* Cart policy chip */
    .cart-chip{
      display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:800;
      padding:4px 10px;border-radius:6px;background:#EEF2FF;color:#4338CA;margin-top:6px;
    }

    /* ====== 이용 안내 / 위치 / 리뷰 / FAQ 공통 ====== */
    .info-card{
      background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;
    }
    .info-card h4{
      margin:0 0 10px;font-size:14px;font-weight:900;color:var(--ink);
      display:flex;align-items:center;gap:6px;letter-spacing:-0.01em;
    }
    .info-card .body{font-size:13px;color:var(--ink-2);line-height:1.6;}
    .info-card ul{margin:0;padding-left:18px;}
    .info-card li{margin:4px 0;}
    .info-card .kv{
      display:grid;grid-template-columns:100px 1fr;gap:10px 14px;font-size:13px;
    }
    .info-card .kv dt{color:var(--ink-2);font-weight:700;}
    .info-card .kv dd{margin:0;color:var(--ink);font-weight:600;}

    /* 시설 운영 시간 표 */
    .fac-table{
      display:grid;grid-template-columns:repeat(2,1fr);gap:8px;
    }
    .fac-table .frow{
      display:flex;justify-content:space-between;padding:10px 12px;background:var(--bg-soft);border-radius:8px;font-size:13px;
    }
    .fac-table .fname{font-weight:700;color:var(--ink);}
    .fac-table .fhours{color:var(--golf-dark);font-weight:800;}

    /* 캐디팁 알림 */
    .tip-banner{
      padding:14px;background:linear-gradient(135deg,#FEF3C7,#FDE68A);border-radius:10px;
      display:flex;gap:12px;align-items:center;margin-bottom:10px;
    }
    .tip-banner .ic{font-size:28px;}
    .tip-banner .body{flex:1;}
    .tip-banner .t{font-weight:900;font-size:14px;color:#7C2D12;}
    .tip-banner .s{font-size:12px;color:#92400E;margin-top:2px;line-height:1.4;}

    /* 픽업 지역 표 */
    .pickup-list{display:flex;flex-direction:column;gap:6px;}
    .pickup-row{
      display:flex;justify-content:space-between;padding:8px 12px;
      background:var(--bg-soft);border-radius:8px;font-size:13px;
    }
    .pickup-row .zone{font-weight:700;color:var(--ink);}
    .pickup-row .fee{font-weight:800;color:var(--golf-dark);}
    .pickup-row .fee.free{color:var(--success);}

    /* 위치 — OpenStreetMap iframe 임베드 */
    .map-box{
      border:1px solid var(--line);border-radius:12px;overflow:hidden;
      position:relative;background:var(--bg-soft);
    }
    .map-box iframe{
      width:100%;height:320px;border:none;display:block;
    }
    .map-box .map-overlay{
      position:absolute;top:14px;left:14px;
      background:#fff;padding:8px 14px;border-radius:8px;
      box-shadow:0 2px 8px rgba(0,0,0,.15);
      font-weight:800;font-size:13px;color:var(--golf-dark);
      display:flex;align-items:center;gap:6px;pointer-events:none;
    }
    .map-box .map-link{
      position:absolute;bottom:14px;right:14px;
      background:#fff;padding:8px 14px;border-radius:8px;
      box-shadow:0 2px 8px rgba(0,0,0,.15);
      font-weight:800;font-size:12px;color:var(--ink);
      display:flex;align-items:center;gap:4px;text-decoration:none;
      transition:background .15s;
    }
    .map-box .map-link:hover{background:var(--golf-soft);color:var(--golf-dark);}

    .address-card{
      margin-top:12px;padding:14px;background:var(--bg-soft);border-radius:10px;
      display:flex;gap:14px;align-items:flex-start;
    }
    .address-card .ic{font-size:24px;line-height:1;}
    .address-card .body{flex:1;font-size:13px;color:var(--ink-2);}
    .address-card .body strong{display:block;color:var(--ink);font-weight:900;font-size:14px;margin-bottom:4px;}
    .address-card .phone{margin-top:4px;color:var(--golf-dark);font-weight:800;}

    /* 리뷰 — 별점 분포 */
    .rev-head{
      display:grid;grid-template-columns:200px 1fr;gap:24px;
      padding:18px;background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:14px;
    }
    .rev-score{
      text-align:center;padding:14px;background:linear-gradient(135deg,var(--golf-soft),#fff);
      border-radius:12px;
    }
    .rev-score .big{font-size:46px;font-weight:900;color:var(--golf-dark);line-height:1;}
    .rev-score .stars{font-size:16px;color:#F59E0B;margin:6px 0;letter-spacing:2px;}
    .rev-score .count{font-size:12px;color:var(--ink-2);font-weight:700;}
    .rev-tags-block{flex:1;}
    .rev-tags-title{font-size:12px;font-weight:800;color:var(--ink-3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;}
    .rev-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
    .rev-tag{
      display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;
      font-size:12px;font-weight:700;
    }
    .rev-tag.pos{background:var(--golf-soft);color:var(--golf-dark);}
    .rev-tag.neg{background:#FEE2E2;color:#B91C1C;}
    .rev-tag .n{font-weight:900;}

    /* 리뷰 카드 */
    .rev-list{display:flex;flex-direction:column;gap:12px;}
    .rev-card{
      padding:16px;background:#fff;border:1px solid var(--line);border-radius:12px;
    }
    .rev-card-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .rev-avatar{
      width:36px;height:36px;border-radius:50%;background:var(--golf-soft);
      display:grid;place-items:center;font-weight:900;color:var(--golf-dark);font-size:14px;flex-shrink:0;
    }
    .rev-author{font-weight:800;font-size:13px;color:var(--ink);}
    .rev-meta{font-size:11px;color:var(--ink-3);font-weight:600;display:flex;gap:8px;align-items:center;}
    .rev-stars{color:#F59E0B;font-size:13px;}
    .rev-text{font-size:14px;color:var(--ink);line-height:1.6;margin:8px 0;}
    .rev-pn{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
    .rev-pn-tag{
      font-size:11px;padding:2px 8px;border-radius:5px;font-weight:700;
    }
    .rev-pn-tag.pos{background:var(--golf-soft);color:var(--golf-dark);}
    .rev-pn-tag.neg{background:#FEE2E2;color:#B91C1C;}
    .rev-reply{
      margin-top:10px;padding:12px;background:var(--bg-soft);border-left:3px solid var(--golf);
      border-radius:0 8px 8px 0;font-size:13px;color:var(--ink-2);line-height:1.6;white-space:pre-line;
    }
    .rev-reply-head{font-weight:800;color:var(--golf-dark);margin-bottom:4px;font-size:12px;}

    /* FAQ — 아코디언 */
    .faq-list{display:flex;flex-direction:column;gap:8px;}
    .faq-item{
      background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;
    }
    .faq-q{
      padding:14px 16px;font-weight:800;font-size:14px;color:var(--ink);cursor:pointer;
      display:flex;justify-content:space-between;align-items:center;gap:10px;
      width:100%;text-align:left;background:#fff;
    }
    .faq-q:hover{background:var(--bg-soft);}
    .faq-q::after{
      content:"+";font-size:20px;font-weight:900;color:var(--ink-3);transition:transform .15s;
    }
    .faq-item.open .faq-q::after{transform:rotate(45deg);color:var(--golf);}
    .faq-a{
      max-height:0;overflow:hidden;transition:max-height .25s ease, padding .25s;
      padding:0 16px;font-size:13px;color:var(--ink-2);line-height:1.6;
    }
    .faq-item.open .faq-a{max-height:400px;padding:0 16px 14px;}

    /* Loading / Empty */
    .loading{padding:80px 20px;text-align:center;color:var(--ink-3);}

    @media (max-width: 980px){
      .fac-table{grid-template-columns:1fr;}
      .rev-head{grid-template-columns:1fr;}
    }

    /* Responsive */
    @media (max-width: 980px){
      .main-wrap{grid-template-columns:1fr;}
      .book-panel{position:static;}
      .gallery{grid-template-columns:1fr 1fr;grid-template-rows:200px 150px 150px;}
      .gallery .g-main{grid-row:1;grid-column:1/-1;}
      .facts{grid-template-columns:repeat(2, 1fr);}
      .title{font-size:24px;}
      .hotel-row{grid-template-columns:1fr;}
      .incl-grid{grid-template-columns:1fr;}
    }
    @media (max-width:640px){
      .gallery{grid-template-columns:1fr;grid-template-rows:240px;margin:0;padding:0;border-radius:0;}
      .gallery > div:not(.g-main){display:none;}
      .gallery .g-main{border-radius:0;}
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">본문 바로가기</a>

  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="오마이트립 홈">
        <span class="logo-mark" aria-hidden="true"></span>
        <span>오마이트립</span>
      </a>
      <div class="breadcrumb">
        <a href="golftels.html">⛳ 골프텔</a> ›
        <span id="bcCountry">로딩...</span>
      </div>
      <div class="header-actions">
        <a href="golftels.html" class="btn-ghost">← 목록으로</a>
        <a href="mypage.html" class="btn-ghost">마이페이지</a>
      </div>
    </div>
  </header>

  <main id="main">
    <div id="content">
      <div class="loading">상품 정보를 불러오는 중...</div>
    </div>
  </main>

  <!-- 갤러리 lightbox 모달 -->
  <div class="lightbox" id="lightbox" onclick="closeLightboxIfBg(event)">
    <button type="button" class="lightbox-close" onclick="closeLightbox()" aria-label="닫기">✕</button>
    <div class="lightbox-counter" id="lbCounter">1 / 1</div>
    <img class="lightbox-img" id="lbImg" src="" alt="갤러리 이미지" />
    <div class="lightbox-thumbs" id="lbThumbs"></div>
  </div>

  <script src="data.js"></script>
  <script src="state.js"></script>
  <script>
    const D = window.OMT.DATA;
    const State = window.OMT.State;
    const params = new URLSearchParams(location.search);
    const id = params.get('id');

    // ===== Render =====
    function render(){
      const g = D.GOLFTELS.find(x => x.id === id);
      // 최근 본 상품 자동 트래킹 (state.js)
      if(g && State?.addRecentlyViewed){
        try { State.addRecentlyViewed(g.id); } catch(e){}
      }
      if(!g){
        document.getElementById('content').innerHTML = `
          <div class="loading">
            <div style="font-size:48px;margin-bottom:12px;">⛳</div>
            <div style="font-size:18px;font-weight:800;color:#4B5563;margin-bottom:6px;">상품을 찾을 수 없습니다</div>
            <div>잘못된 ID이거나 삭제된 상품일 수 있어요.</div>
            <a href="golftels.html" style="display:inline-block;margin-top:20px;padding:12px 24px;background:#0B6E4F;color:#fff;border-radius:10px;font-weight:800;">⛳ 골프텔 목록으로</a>
          </div>`;
        return;
      }

      const own = D.OWNERSHIP[g.country] || { model:'partner', label:'파트너' };
      const country = D.COUNTRIES[g.country] || {};
      const hotel = D.HOTELS.find(h => h.id === g.hotelId) || {};
      const courses = (g.courseIds || []).map(cid => D.GOLF_COURSES.find(c => c.id === cid)).filter(Boolean);
      const inc = g.inclusions || {};
      document.title = `${g.name} | 오마이트립 골프텔`;
      document.getElementById('bcCountry').textContent = `${country.name || g.country} · ${g.city}`;

      const badgeHtml = own.model === 'direct'
        ? `<span class="badge badge-direct">${own.label}</span>`
        : `<span class="badge badge-franchise">${own.label}</span>`;

      const allImages = (g.images?.length ? g.images : [hotel.img]).filter(Boolean);
      // 풀백: 갤러리가 5장 미만이면 호텔 갤러리로 보강
      while(allImages.length < 5 && hotel.gallery?.length){
        const next = hotel.gallery[allImages.length - 1];
        if(next && !allImages.includes(next)) allImages.push(next);
        else break;
      }
      const visible = allImages.slice(0, 5);
      const remaining = Math.max(0, allImages.length - 5);
      const galleryHtml = `
        <div class="g-main" style="background-image:url('${visible[0] || ''}')" onclick="openLightbox(0)"></div>
        <div style="background-image:url('${visible[1] || ''}')" onclick="openLightbox(1)"></div>
        <div style="background-image:url('${visible[2] || ''}')" onclick="openLightbox(2)"></div>
        <div style="background-image:url('${visible[3] || ''}')" onclick="openLightbox(3)"></div>
        <div class="${remaining > 0 ? 'g-more' : ''}" data-more="📷 +${remaining}장 더보기" style="background-image:url('${visible[4] || ''}')" onclick="openLightbox(4)"></div>
      `;

      const incRow = (label, on) => `
        <div class="incl-row ${on ? 'on' : 'off'}">
          <span class="check">${on ? '✓' : '✕'}</span>
          <span>${label}</span>
        </div>`;

      const courseHtml = courses.map(c => {
        const ch = D.CHANNEL_MANAGERS[c.channelManager] || D.CHANNEL_MANAGERS.partner;
        const rtBadge = c.realTimeBooking
          ? `<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:900;padding:3px 8px;border-radius:5px;background:linear-gradient(135deg,#FFD23F,#FFA500);color:#7C2D12;">⚡ 실시간 예약</span>`
          : `<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:900;padding:3px 8px;border-radius:5px;background:var(--bg-soft);color:var(--ink-3);">⏱ 견적 24시간</span>`;
        return `
        <div class="course-card">
          <div class="name">⛳ ${c.name}</div>
          <div class="meta">
            <span><strong>${c.holes}</strong>홀 · Par <strong>${c.par}</strong></span>
            ${c.yardage ? `<span><strong>${c.yardage.toLocaleString()}</strong>야드</span>` : ''}
            <span>설계 · ${c.designer || '-'}</span>
            <span>그린 · ${c.greens || '-'}</span>
          </div>
          <div style="margin-top:10px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
            ${rtBadge}
            <span style="font-size:11px;color:var(--ink-2);font-weight:600;">📡 ${ch.label}</span>
          </div>
          ${g.cartPolicy ? `<div class="cart-chip">🚗 카트 정책: ${g.cartPolicy}</div>` : ''}
        </div>
      `;}).join('') || '<p>코스 정보 준비 중</p>';

      const distanceLine = g.distance ?
        `<div style="margin-top:6px;font-size:12px;color:var(--ink-2);font-weight:600;">📏 ${g.distance.city} · ${g.distance.airport}</div>` : '';

      const FACILITY_LABELS = {
        pool:'🏊 수영장', spa:'💆 스파', fitness:'🏋️ 피트니스', restaurant:'🍽️ 레스토랑',
        beach:'🏖️ 프라이빗 비치', kidsclub:'👶 키즈클럽',
        'driving-range':'🎯 드라이빙 레인지', shuttle:'🚐 무료 셔틀',
        'korean-staff':'🇰🇷 한국인 상주'
      };
      const facHtml = (g.facilities || []).length ? `
        <div class="fac-row">
          ${(g.facilities || []).map(f => `<span class="fac ${f==='korean-staff'?'korean':''}">${FACILITY_LABELS[f] || f}</span>`).join('')}
        </div>` : '';

      const hotelHtml = hotel.name ? `
        <div class="hotel-row">
          <div class="hotel-thumb" style="background-image:url('${hotel.img}')"></div>
          <div class="hotel-info">
            <div class="name">${hotel.name}</div>
            <div class="area">📍 ${hotel.area} · ${'★'.repeat(hotel.stars || 0)}</div>
            ${distanceLine}
            <div style="margin-top:8px;">${hotel.description || ''}</div>
            <div style="margin-top:10px;">
              ${(hotel.amenities || []).map(a => `<span class="amenity">${a}</span>`).join('')}
            </div>
            ${facHtml}
            <div style="margin-top:10px;font-size:13px;color:var(--ink-2);"><strong>객실</strong> · ${g.roomType}</div>
          </div>
        </div>
      ` : `
        <div class="hotel-row" style="grid-template-columns:1fr;">
          <div class="hotel-info">
            <div class="name">${g.hotelName}</div>
            <div class="area">📍 ${country.name} · ${g.city}</div>
            ${distanceLine}
            ${facHtml}
            <div style="margin-top:10px;font-size:13px;color:var(--ink-2);"><strong>객실</strong> · ${g.roomType}</div>
          </div>
        </div>
      `;

      document.getElementById('content').innerHTML = `
        <div class="gallery">${galleryHtml}</div>

        <div class="main-wrap">
          <div class="main-col">
            <div class="title-block">
              ${badgeHtml}
              <h1 class="title">${g.name}</h1>
              <p class="subtitle">${g.tagline || ''}</p>
              <div class="quick-meta">
                <span class="rating">★ ${(g.rating/2).toFixed(1)}</span>
                <span>리뷰 ${g.reviews || 0}건</span>
                <span>· ${country.name || g.country} ${g.city}</span>
              </div>
            </div>

            <!-- ★ 1박 = 1라운드 자동 매칭 (몽키 표준) -->
            <div class="match-banner">
              <div class="ic">🏨⛳</div>
              <div class="text">
                <div class="t">${g.nights}박 = ${g.rounds}회 라운딩 자동 매칭</div>
                <div class="s">호텔 투숙 기간 내 ${g.rounds}회의 라운딩이 포함됩니다. 티타임은 예약 시 선택하세요.</div>
              </div>
            </div>

            <div class="facts">
              <div class="fact"><div class="lb">기간</div><div class="vl">${g.nights}<span class="unit">박${g.nights+1}일</span></div></div>
              <div class="fact"><div class="lb">라운딩</div><div class="vl">${g.rounds}<span class="unit">회</span></div></div>
              <div class="fact"><div class="lb">코스</div><div class="vl">${courses.length}<span class="unit">개</span></div></div>
              <div class="fact"><div class="lb">기준</div><div class="vl">2<span class="unit">인 1실</span></div></div>
            </div>

            <!-- ★ 티오프 선택 (몽키 스타일 슬롯 카드 그리드) -->
            ${(g.teeTimeWindows || []).length ? `
              <section class="tee-section" id="teeSection">
                <div class="tee-section-head">
                  <h3>🕐 티오프 선택 <span class="tee-required">선호 ${g.rounds}슬롯 (선택 사항)</span></h3>

    function _fmtDate(d){
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function _parseDate(s){
      if(!s) return null;
      const [y,m,d] = s.split('-').map(Number);
      return new Date(y, m-1, d);
    }
    // 라운딩 N번째 날짜 (체크인일 + N-1, 0-indexed)
    function _slotDate(roundIdx){
      if(!checkinDate) return null;
      const d = new Date(checkinDate); d.setDate(d.getDate() + roundIdx);
      return d;
    }
    function _isWeekend(d){ return d && (d.getDay() === 0 || d.getDay() === 6); }
    // 공휴일은 holidays 배열에 매칭 시도 (간단 mock — "01월 01일" 같은 형식 비교)
    function _isHoliday(d, g){
      if(!d || !g.holidays?.length) return false;
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      return g.holidays.some(h => h.includes(`${mm}월 ${dd}일`) || h.includes(`${mm}월`));
    }
    function _dayKind(d, g){
      if(_isHoliday(d, g)) return 'holiday';
      if(_isWeekend(d)) return 'weekend';
      return 'weekday';
    }

    function bindCheckinDate(){
      const input = document.getElementById('checkinDate');
      if(!input) return;
      // 기본값: 오늘 + 30일
      const def = new Date(); def.setDate(def.getDate() + 30);
      input.value = _fmtDate(def);
      input.min = _fmtDate(new Date());
      checkinDate = def;
      updateCheckinHint();
      input.addEventListener('change', () => {
        checkinDate = _parseDate(input.value);
        updateCheckinHint();
        renderTeeSlots();  // 슬롯 재렌더 (가격 모디파이어 반영)
        updateTotal();
      });
    }
    function updateCheckinHint(){
      const g = D.GOLFTELS.find(x => x.id === id);
      if(!g || !checkinDate) return;
      const hint = document.getElementById('dpHint');

      const checkout = new Date(checkinDate); checkout.setDate(checkout.getDate() + g.nights);
      // 라운딩 일자별 분류
      const chips = [];
      const dayLabels = ['일','월','화','수','목','금','토'];
      for(let i=0;i<g.rounds;i++){
        const d = _slotDate(i);
        const kind = _dayKind(d, g);
        chips.push(`<span class="day-chip ${kind}">R${i+1} ${d.getMonth()+1}/${d.getDate()}(${dayLabels[d.getDay()]})</span>`);
      }
      hint.innerHTML = `${g.nights}박 ${g.nights+1}일 · 체크아웃 ${checkout.getMonth()+1}/${checkout.getDate()}<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;">${chips.join('')}</div>`;
    }

    // ===== 갤러리 Lightbox =====

    // ===== 객실 옵션 바인딩 =====
    function bindRoomOption(){

    // ============================================================
    // 티오프 슬롯 시스템 (몽키 카드 그리드 패턴)
    // ============================================================

    // 국가별 기본 그린피 (1라운딩 1인 정가)
    const BASE_GREEN_FEE = { japan:180000, vietnam:200000, thailand:140000, philippines:150000 };
    // 시간대별 모디파이어
    const TIME_MOD = { morning:1.0, afternoon:0.9, twilight:0.7, night:0.5 };
    // 시간대 라벨
    const WINDOW_LABEL = { morning:'오전', afternoon:'오후', twilight:'트와일라잇', night:'야간' };

    // "06:00~10:30" → 8분 간격 슬롯 배열
    function expandSlots(range, interval=8){
      const [start, end] = range.split('~').map(s => s.trim());
      const [sh, sm] = start.split(':').map(Number);
      const [eh, em] = end.split(':').map(Number);
      const out = [];
      let h = sh, m = sm;
      while(h < eh || (h === eh && m <= em)){
        out.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
        m += interval;
        while(m >= 60){ h++; m -= 60; }
      }
      return out;
    }

    // 포함사항 라벨 자동 생성: "캐디+1/2카트 포함" / "1/2카트 포함" 등
    function buildInclusionLabel(g){
      const inc = g.inclusions || {};
      const parts = [];
      if(inc.caddyFee) parts.push('캐디');
      if(inc.cartFee){
        // cartPolicy로 1/2카트 또는 1카트 구분
        const half = /2인 1카트/.test(g.cartPolicy || '');
        parts.push(half ? '1/2카트' : '1카트');
      }
      return parts.length ? parts.join('+') + ' 포함' : '그린피만';
    }

    // 슬롯 가격 계산
    function computeSlotPrice(g, course, window){
      const base = BASE_GREEN_FEE[g.country] || 180000;
      const mod  = TIME_MOD[window] || 1.0;
      const designerPremium = course?.designer && course.designer !== '-' ? 1.1 : 1.0;
      const cart  = g.inclusions?.cartFee  ? 25000 : 0;
      const caddy = g.inclusions?.caddyFee ? 30000 : 0;
      return Math.round(base * mod * designerPremium + cart + caddy);
    }

    // 모든 슬롯 생성 (시간 × 코스) — 체크인 날짜 기준 모디파이어 적용
    function generateAllSlots(g){
      const teeOff = g.operatingInfo?.teeOff || {};
      const courseIds = g.courseIds || [];
      const slots = [];
      // 현재 선택된 슬롯 수(=라운딩 인덱스)를 기준으로 다음 라운딩 일자 계산
      const nextRoundIdx = selectedSlots.length;
      const roundDate = _slotDate(nextRoundIdx);
      const dayKind = roundDate ? _dayKind(roundDate, g) : 'weekday';
      let surcharge = 0;
      if(dayKind === 'weekend') surcharge = WEEKEND_SURCHARGE;
      else if(dayKind === 'holiday') surcharge = HOLIDAY_SURCHARGE;

      (g.teeTimeWindows || []).forEach(w => {
        const range = teeOff[w];
        if(!range) return;
        const times = expandSlots(range, 8);
        times.forEach(t => {
          courseIds.forEach((cid, ci) => {
            const course = D.GOLF_COURSES.find(c => c.id === cid);
            if(!course) return;
            const basePrice = computeSlotPrice(g, course, w);
            const price = Math.round(basePrice * (1 + surcharge));
            const channel = D.CHANNEL_MANAGERS[course.channelManager] || D.CHANNEL_MANAGERS.partner;
            slots.push({
              key: `${w}:${t}:${cid}`,
              window: w,
              time: t,
              hour: parseInt(t.split(':')[0]),
              courseId: cid,
              courseName: course.name,
              courseIdx: ci,
              inclLabel: buildInclusionLabel(g),
              price,
              basePrice,
              surcharge,
              dayKind,           // 'weekday' | 'weekend' | 'holiday'
              roundIdx: nextRoundIdx,
              channelManager: course.channelManager,
              channelShort: channel.short,
              realTime: !!course.realTimeBooking
            });
          });
        });
      });
      return slots;
    }

    // 시 단위로 그룹화
    function groupByHour(slots){
      const map = new Map();
      slots.forEach(s => {
        const h = String(s.hour).padStart(2,'0') + '시';
        if(!map.has(h)) map.set(h, []);
        map.get(h).push(s);
      });
      // 시간 정렬
      return Array.from(map.entries()).sort((a,b) => parseInt(a[0]) - parseInt(b[0]));
    }

    function renderTeeSlots(){
      const g = D.GOLFTELS.find(x => x.id === id);
      if(!g) return;
      const grid = document.getElementById('teeGrid');
      if(!grid) return;

      // 1. 모든 슬롯 생성
      let allSlots = generateAllSlots(g);

      // 2. 필터 적용
      if(teeFilter !== 'all'){
        allSlots = allSlots.filter(s => s.window === teeFilter);
      }

      // 3. "최저가만" — 같은 시간대에서 가장 싼 슬롯만 (코스 여러개 중 최저)
      if(teeOptions.cheapest){
        const byTime = new Map();
        allSlots.forEach(s => {
          const k = `${s.window}:${s.time}`;
          if(!byTime.has(k) || byTime.get(k).price > s.price) byTime.set(k, s);
        });
        allSlots = Array.from(byTime.values());
      }

      // 3-1. "실시간 예약" 토글 — 실시간 가능 슬롯만 (채널 매니저 연동된 코스)
      if(teeOptions.realtime){
        allSlots = allSlots.filter(s => s.realTime);
      }

      if(allSlots.length === 0){
        grid.innerHTML = `<div style="padding:30px;text-align:center;color:var(--ink-3);font-size:13px;">조건에 맞는 슬롯이 없습니다. 필터를 풀어보세요.</div>`;
        return;
      }

      // 4. 시 단위로 그룹화
      const groups = groupByHour(allSlots);

      // 5. HTML 렌더
      // 그룹 헤더에 표시할 day-kind (라운딩 N번째 일자 기준)
      const headerDayKind = allSlots[0]?.dayKind || 'weekday';
      const dayBadge = headerDayKind === 'holiday'
        ? `<span style="margin-left:8px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:900;background:linear-gradient(135deg,var(--accent),#F59E0B);color:#7C2D12;">🎌 공휴일 +15%</span>`
        : headerDayKind === 'weekend'
        ? `<span style="margin-left:8px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:900;background:#FEE2E2;color:#B91C1C;">📅 주말 +10%</span>`
        : `<span style="margin-left:8px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:900;background:#E0F2FE;color:#0369A1;">📅 주중 기본가</span>`;
      const nextR = (allSlots[0]?.roundIdx ?? 0) + 1;
      const roundHint = checkinDate
        ? `<div style="font-size:12px;color:var(--ink-2);font-weight:700;margin-bottom:10px;">${nextR}라운딩 슬롯 (체크인 +${(allSlots[0]?.roundIdx ?? 0)}일) ${dayBadge}</div>`
        : '';

      grid.innerHTML = roundHint + groups.map(([hourLabel, slots]) => `
        <div class="tee-hour-group">
          <div class="th-head">${hourLabel}</div>
          <div class="th-slots">
            ${slots.map(s => {
              const on = selectedSlots.some(x => x.key === s.key);
              const discount = s.window !== 'morning';
              const courseClass = s.courseIdx === 0 ? '' : 'alt';
              const dayMarker = s.dayKind === 'holiday' ? 'weekend' : (s.dayKind === 'weekend' ? 'weekend' : '');
              return `
                <button type="button" class="ts-card ${on?'on':''} ${dayMarker}" data-key="${s.key}" aria-pressed="${on}">
                  <div class="ts-top">
                    <span class="ts-time">${s.time}</span>
                    <span class="ts-course ${courseClass}" title="${s.courseName}">${s.courseName}</span>
                  </div>
                  <div class="ts-rt-row">
                    ${s.realTime
                      ? `<span class="ts-rt">⚡ 실시간</span>`
                      : `<span class="ts-rt quote">⏱ 견적 24h</span>`}
                    <span>· ${s.channelShort}</span>
                  </div>
                  <div class="ts-bot">
                    <span class="ts-incl">${s.inclLabel}</span>
                    <span class="ts-price ${discount?'discount':''}">${s.price.toLocaleString('ko-KR')}원</span>
                  </div>
                </button>
              `;
            }).join('')}
          </div>
        </div>
      `).join('');

      // 6. 슬롯 클릭 → 다중 선택 (rounds 횟수까지)
      grid.querySelectorAll('.ts-card').forEach(card => {
        card.addEventListener('click', () => {
          const key = card.dataset.key;
          const existing = selectedSlots.findIndex(x => x.key === key);
          if(existing >= 0){
            // 이미 선택됨 → 해제
            selectedSlots.splice(existing, 1);
          } else {
            // 새로 선택 — rounds 초과 시 가장 오래된 것 자동 제거 (FIFO)
            if(selectedSlots.length >= g.rounds){
              selectedSlots.shift();
            }
            const slot = allSlots.find(s => s.key === key);
            if(slot) selectedSlots.push(slot);
          }
          renderTeeSlots();   // 재렌더 (선택 상태 반영)
          updateTeeCounter();
          updateTeeMiniSummary();
        });
      });

      updateTeeCounter();
      updateTeeMiniSummary();
    }

    function updateTeeCounter(){
      const g = D.GOLFTELS.find(x => x.id === id);
      if(!g) return;
      const el = document.getElementById('teeCounter');
      if(!el) return;
      const n = selectedSlots.length;
      el.textContent = `슬롯 ${n}/${g.rounds} 선택`;
      el.classList.toggle('full', n === g.rounds);
    }

    function updateTeeMiniSummary(){
      const el = document.getElementById('teeMiniSummary');
      if(!el) return;
      if(selectedSlots.length === 0){
        el.classList.remove('on');
        el.innerHTML = '';
        return;
      }
      el.classList.add('on');
      el.innerHTML = `<div style="font-weight:900;margin-bottom:4px;">✓ 선택된 티오프</div>` +
        selectedSlots.map(s => `
          <div class="tms-line">
            ${WINDOW_LABEL[s.window] || ''} ${s.time} · ${s.courseName.replace(/^[^a-zA-Z가-힣]+/,'')}
          </div>
        `).join('');
    }

    function bindTeeOptions(){

      const real  = document.getElementById('optRealtime');
      if(cheap) cheap.addEventListener('change', () => { teeOptions.cheapest = cheap.checked; renderTeeSlots(); });

    // ===== Air price estimate (mock — country/city based) =====
    function getAirEstimate(){
      const g = D.GOLFTELS.find(x => x.id === id);
      if(!g) return 0;
      const map = { japan:380000, vietnam:430000, thailand:450000, philippines:420000 };
      return map[g.country] || 400000;
    }

    // ===== State =====
    let pax = 2;
    let airOn = false;
    let selectedRoomIdx = 0;  // roomOptions[0] = 기본 (2인 1실)
    let selectedSlots = [];   // [{ slotKey, window, time, courseId, courseName, price, includesLabel }]
    let teeFilter = 'all';
    let teeOptions = { cheapest:false, realtime:false };
    let checkinDate = null;   // Date object | null
    const WEEKEND_SURCHARGE = 0.10;   // 주말 그린피 +10%
    const HOLIDAY_SURCHARGE = 0.15;   // 공휴일 그린피 +15%

    function changePax(delta){
      pax = Math.max(1, Math.min(8, pax + delta));
      document.getElementById('paxNum').textContent = pax;
      document.getElementById('paxLabel').textContent = pax + '명';
      updateTotal();
    }

    function toggleAir(){
      airOn = !airOn;
      const t = document.getElementById('airToggle');
      const label = document.getElementById('prodLabel');
      const cta = document.getElementById('ctaBtn');
      t.classList.toggle('on', airOn);
      if(airOn){
        label.textContent = '✈️ 골프투어 (골프텔 + 항공)';
        label.classList.add('air');
        cta.classList.add('air');
        cta.textContent = '골프투어로 예약 →';
      } else {
        label.textContent = '⛳ 골프텔 (호텔+골프)';
        label.classList.remove('air');
        cta.classList.remove('air');
        cta.textContent = '예약 진행하기 →';

    function updateTotal(){
      const g = D.GOLFTELS.find(x => x.id === id);
      if(!g) return;
      const room = g.roomOptions?.[selectedRoomIdx] || { supplement:0 };
      const per = g.pricePerPerson + (room.supplement || 0) + (airOn ? getAirEstimate() : 0);
      document.getElementById('totalPrice').textContent = (per * pax).toLocaleString('ko-KR') + '원';
      document.getElementById('bpPrice').innerHTML = per.toLocaleString('ko-KR') + '원<small> ~</small>';
    }

    function bookNow(){
      const g = D.GOLFTELS.find(x => x.id === id);
      if(!g) return;
      const productType = airOn ? 'golftel-air' : 'golftel';
      const room = g.roomOptions?.[selectedRoomIdx] || { type:'2인 1실', supplement:0 };
      const per = g.pricePerPerson + (room.supplement || 0) + (airOn ? getAirEstimate() : 0);
      const total = per * pax;

      // localStorage에 임시 저장 → checkout이 읽음
      try {
        sessionStorage.setItem('omt_pending_booking', JSON.stringify({
          source:'golftel',
          productType,
          productId: g.id,
          productName: g.name + (airOn ? ' (+ 항공)' : ''),
          productImage: g.images?.[0],
          country: g.country,
          city: g.city,
          nights: g.nights,
          rounds: g.rounds,
          pax,
          pricePerPerson: per,
          total,
          ownership: D.OWNERSHIP[g.country]?.model,
          // 사용자 선택 (예약 확정 시 백엔드로 전달)
          roomOption: room.type,
          roomSupplement: room.supplement || 0,
          // 선택 슬롯들 (각 라운딩별 시간·코스) — ELLIS 백엔드가 골프장에 부킹 요청
          selectedSlots: selectedSlots.map(s => ({
            window: s.window, time: s.time, courseId: s.courseId, courseName: s.courseName, price: s.price
          }))
        }));
      } catch(e){}

      location.href = `checkout.html?gt=${encodeURIComponent(g.id)}&pax=${pax}&air=${airOn ? 1 : 0}`;
    }

    // 🛒 장바구니에 담기
    function addToCartFromGolftel(){
      const g = D.GOLFTELS.find(x => x.id === id);
      if(!g) return;
      const room = g.roomOptions?.[selectedRoomIdx] || { type:'2인 1실', supplement:0 };
      const per = g.pricePerPerson + (room.supplement || 0) + (airOn ? getAirEstimate() : 0);
      const total = per * pax;
      const productType = airOn ? 'golftel-air' : 'golftel';
      const skuLabel = airOn ? 'GOLFTEL_AIR' : 'GOLFTEL';

      State.addToCart({
        productId: g.id,
        productType,
        type: skuLabel,
        orig: D.OWNERSHIP[g.country]?.model === 'direct',
        img: g.images?.[0],
        name: g.name + (airOn ? ' (+ 항공)' : ''),
        sub: `${g.hotelName} · ⛳ ${g.rounds}라운딩 · 🏨 ${g.nights}박 · ${room.type}`,
        dates: '날짜 미정 · 결제 시 선택',
        pax: '성인 ' + pax + '명',
        paxCount: pax,
        price: total,
        // 골프텔 메타 (cart.html · checkout · complete · voucher 에서 활용)
        country: g.country,
        city: g.city,
        rounds: g.rounds,
        nights: g.nights,
        roomOption: room.type,
        ownership: D.OWNERSHIP[g.country]?.model,
        selectedSlots: selectedSlots.map(s => ({ window: s.window, time: s.time, courseId: s.courseId, courseName: s.courseName, price: s.price }))
      });

      // 토스트 + 장바구니 이동 옵션
      if(confirm('🛒 장바구니에 담았습니다. 장바구니로 이동할까요?')){
        location.href = 'cart.html';
      }
    }

    function bindTabs(){
      document.querySelectorAll('#tabs .tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#tabs .tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const target = btn.dataset.tab;
          document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.dataset.panel === target));
        });
      });
    }

    // Close popups on Esc (consistency w/ rest of site)
    document.addEventListener('keydown', e => {
      if(e.key === 'Escape') document.activeElement?.blur();
    });

    render();
  </script>
</body>
</html>
