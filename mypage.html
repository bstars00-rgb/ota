<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마이페이지 | 오마이트립</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#FF6B35;--primary-dark:#E85826;--primary-soft:#FFF0E8;--secondary:#1E88E5;--accent:#FFD23F;--success:#10B981;--danger:#EF4444;--ink:#1A1A1A;--ink-2:#4B5563;--ink-3:#9CA3AF;--line:#E5E7EB;--bg:#fff;--bg-soft:#F7F7F9;--radius:14px;--radius-lg:20px;--header-h:64px;--max-w:1280px;}
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{font-family:'Noto Sans KR',-apple-system,sans-serif;color:var(--ink);background:var(--bg-soft);line-height:1.55;}
    a{color:inherit;text-decoration:none;}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
    .container{max-width:var(--max-w);margin:0 auto;padding:0 24px;}
    .skip-link{position:absolute;left:-9999px;top:0;padding:10px 16px;background:#1A1A1A;color:#fff;z-index:999;font-weight:700;font-size:13px;border-radius:0 0 8px 0;}
    .skip-link:focus{left:0;}

    .header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
    .header-inner{height:var(--header-h);display:flex;align-items:center;gap:16px;}
    .logo{display:inline-flex;align-items:center;gap:8px;font-weight:900;font-size:18px;color:var(--ink);}
    .logo-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#FF9A6C);color:#fff;display:grid;place-items:center;font-weight:900;font-size:16px;}
    .logo-mark::after{content:"O";}
    .header-actions{margin-left:auto;display:flex;gap:6px;}
    .btn-ghost{padding:8px 14px;border-radius:10px;font-weight:600;font-size:13px;color:var(--ink-2);}

    .profile-hero{background:linear-gradient(135deg,#1A1A1A 0%,#2C1810 60%,var(--primary) 100%);color:#fff;padding:40px 24px 60px;position:relative;overflow:hidden;}
    .profile-hero::before{content:"";position:absolute;top:-60px;right:-60px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,210,63,.3),transparent 70%);}
    .profile-wrap{max-width:var(--max-w);margin:0 auto;display:flex;align-items:center;gap:20px;position:relative;flex-wrap:wrap;}
    .profile-av{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:grid;place-items:center;font-weight:900;font-size:34px;color:#fff;border:4px solid rgba(255,255,255,.2);flex-shrink:0;}
    .profile-info{flex:1;min-width:200px;}
    .profile-greet{font-size:13px;opacity:.8;margin-bottom:4px;}
    .profile-name{font-size:24px;font-weight:900;letter-spacing:-0.02em;margin-bottom:4px;}
    .profile-grade{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:var(--accent);color:#1A1A1A;border-radius:999px;font-size:12px;font-weight:900;}
    .profile-stats{display:flex;gap:24px;margin-top:16px;flex-wrap:wrap;}
    .ps{display:flex;flex-direction:column;}
    .ps-val{font-size:20px;font-weight:900;color:var(--accent);letter-spacing:-0.02em;}
    .ps-lb{font-size:11px;opacity:.75;margin-top:2px;}

    .my-layout{display:grid;grid-template-columns:240px 1fr;gap:24px;max-width:var(--max-w);margin:0 auto;padding:20px 24px 80px;align-items:flex-start;margin-top:-30px;}

    .side-nav{background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);padding:14px;position:sticky;top:calc(var(--header-h) + 16px);}
    .sn-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-weight:700;font-size:13px;color:var(--ink-2);cursor:pointer;}
    .sn-item:hover{background:var(--bg-soft);color:var(--ink);}
    .sn-item.active{background:var(--primary-soft);color:var(--primary);}
    .sn-item .ic{font-size:16px;}
    .sn-item .badge{margin-left:auto;font-size:10px;padding:2px 7px;background:var(--primary);color:#fff;border-radius:999px;font-weight:900;}
    .sn-divider{height:1px;background:var(--line);margin:8px 4px;}

    .my-main{min-width:0;}
    .panel-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px;}
    .panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
    .panel-title{margin:0;font-size:18px;font-weight:900;letter-spacing:-0.02em;}
    .panel-sub{font-size:13px;color:var(--ink-2);}

    .sub-tabs{display:flex;gap:4px;background:var(--bg-soft);border-radius:10px;padding:4px;flex-wrap:wrap;}
    .sub-tab{padding:8px 14px;border-radius:8px;font-weight:700;font-size:12px;color:var(--ink-3);}
    .sub-tab.active{background:#fff;color:var(--ink);}

    .book-list{display:flex;flex-direction:column;gap:12px;}
    .book-card{border:1px solid var(--line);border-radius:var(--radius);padding:16px;display:grid;grid-template-columns:100px 1fr auto;gap:14px;align-items:center;}
    .book-card.cancelled{opacity:.5;}
    .bc-thumb{aspect-ratio:1;border-radius:10px;background-size:cover;background-position:center;background-color:#eee;cursor:pointer;}
    .bc-status{display:inline-block;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:800;letter-spacing:.04em;margin-bottom:4px;}
    .bc-status.confirmed{background:#E8F5E9;color:var(--success);}
    .bc-status.pending{background:#FFF3E0;color:#F57C00;}
    .bc-status.completed{background:var(--bg-soft);color:var(--ink-3);}
    .bc-status.cancelled{background:#FEE;color:var(--danger);}
    .bc-name{font-size:14px;font-weight:800;cursor:pointer;}
    .bc-meta{font-size:12px;color:var(--ink-3);margin-top:3px;}
    .bc-num{font-size:11px;color:var(--ink-3);margin-top:4px;font-family:'Courier New',monospace;}
    .bc-right{display:flex;flex-direction:column;gap:6px;align-items:flex-end;min-width:130px;}
    .bc-price{font-size:15px;font-weight:900;color:var(--primary);}
    .bc-action{padding:7px 14px;border-radius:8px;background:var(--ink);color:#fff;font-weight:800;font-size:11px;white-space:nowrap;}
    .bc-action:hover{background:var(--primary);}
    .bc-action.ghost{background:var(--bg-soft);color:var(--ink-2);}
    .bc-action.danger{background:#fff;color:var(--danger);border:1px solid var(--danger);}
    .bc-action.danger:hover{background:var(--danger);color:#fff;}

    .empty-inner{padding:60px 24px;text-align:center;color:var(--ink-3);}
    .empty-inner h3{margin:0 0 6px;font-size:16px;color:var(--ink);}

    .coupon-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .coupon{display:grid;grid-template-columns:auto 1fr;gap:14px;padding:16px;border:1.5px dashed var(--primary);border-radius:12px;background:linear-gradient(135deg,#fff,var(--primary-soft));}
    .cp-amount{font-size:28px;font-weight:900;color:var(--primary);letter-spacing:-0.02em;padding-right:14px;border-right:1.5px dashed var(--primary);display:flex;flex-direction:column;justify-content:center;}
    .cp-amount small{font-size:11px;font-weight:700;color:var(--ink-3);}
    .cp-info .title{font-weight:800;font-size:13px;margin-bottom:3px;}
    .cp-info .terms{font-size:11px;color:var(--ink-2);}
    .cp-info .exp{font-size:11px;color:var(--danger);margin-top:5px;}

    .wish-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
    .wish-card{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;position:relative;cursor:pointer;transition:transform .15s;}
    .wish-card:hover{transform:translateY(-2px);}
    .wish-thumb{aspect-ratio:4/3;background-size:cover;background-position:center;background-color:#eee;}
    .wish-heart{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;display:grid;place-items:center;backdrop-filter:blur(8px);}
    .wish-body{padding:12px;}
    .wish-name{font-size:13px;font-weight:800;line-height:1.35;}
    .wish-price{font-size:15px;font-weight:900;color:var(--primary);margin-top:4px;}

    /* Review Modal */
    .modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.open{display:flex;}
    .modal{background:#fff;border-radius:20px;padding:28px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;}
    .modal h3{margin:0 0 6px;font-size:20px;font-weight:900;letter-spacing:-0.02em;}
    .modal .sub{color:var(--ink-2);font-size:13px;margin:0 0 18px;}
    .star-input{display:flex;gap:6px;font-size:32px;color:var(--line);margin-bottom:16px;cursor:pointer;}
    .star-input span{cursor:pointer;transition:color .15s;}
    .star-input span.on{color:var(--accent);}
    .modal textarea{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;outline:none;min-height:120px;resize:vertical;}
    .modal textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,107,53,.12);}
    .modal-actions{display:flex;gap:10px;margin-top:18px;}
    .modal-actions button{flex:1;padding:13px;border-radius:10px;font-weight:800;font-size:14px;}
    .modal-actions .cancel{background:var(--bg-soft);color:var(--ink-2);}
    .modal-actions .submit{background:var(--primary);color:#fff;}

    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(100px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-weight:700;font-size:14px;z-index:110;transition:transform .3s;}
    .toast.show{transform:translateX(-50%) translateY(0);}

    @media (max-width:1024px){.my-layout{grid-template-columns:1fr;margin-top:-20px;}.side-nav{position:static;display:flex;overflow-x:auto;padding:10px;}.side-nav::-webkit-scrollbar{display:none;}.sn-item{white-space:nowrap;}.sn-divider{display:none;}.wish-grid{grid-template-columns:1fr 1fr;}.coupon-grid{grid-template-columns:1fr;}}
    @media (max-width:768px){:root{--header-h:56px;}.profile-hero{padding:30px 18px 50px;}.panel-card{padding:18px;border-radius:var(--radius);}.book-card{grid-template-columns:72px 1fr;}.bc-right{grid-column:1/-1;border-top:1px dashed var(--line);padding-top:10px;flex-direction:row;justify-content:space-between;flex-wrap:wrap;}.wish-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <a class="skip-link" href="#omt-main">본문 바로가기</a>

  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-mark"></span><span>오마이트립</span></a>
      <div class="header-actions">
        <a href="cart.html" class="btn-ghost">🛒 장바구니</a>
        <a href="index.html" class="btn-ghost">← 홈</a>
      </div>
    </div>
  </header>

  <section class="profile-hero">
    <div class="profile-wrap">
      <div class="profile-av" id="profileAvatar">홍</div>
      <div class="profile-info">
        <div class="profile-greet">안녕하세요,</div>
        <div class="profile-name" id="profileName">홍길동 님</div>
        <span class="profile-grade">⭐ GOLD 등급 · 다음 VIP까지 2회 여행</span>
        <div class="profile-stats" id="profileStats"></div>
      </div>
    </div>
  </section>

  <main id="omt-main" class="my-layout">
    <aside class="side-nav">
      <div class="sn-item active" data-tab="bookings"><span class="ic">🎫</span><span>예약 내역</span><span class="badge" id="badgeBookings">0</span></div>
      <div class="sn-item" data-tab="wishlist"><span class="ic">❤️</span><span>찜한 상품</span><span class="badge" id="badgeWish">0</span></div>
      <div class="sn-item" data-tab="coupons"><span class="ic">🎟️</span><span>쿠폰함</span><span class="badge" id="badgeCoupons">0</span></div>
      <div class="sn-item" data-tab="points"><span class="ic">💰</span><span>포인트</span></div>
      <div class="sn-item" data-tab="reviews"><span class="ic">✏️</span><span>리뷰</span></div>
      <div class="sn-divider"></div>
      <div class="sn-item" data-tab="profile"><span class="ic">👤</span><span>내 정보</span></div>
      <div class="sn-item" data-tab="travelers"><span class="ic">👥</span><span>여행자 관리</span></div>
      <div class="sn-divider"></div>
      <div class="sn-item" onclick="if(confirm('로그아웃할까요?')){OMT.State.logout();location.href='login.html';}"><span class="ic">🚪</span><span>로그아웃</span></div>
    </aside>

    <section class="my-main">
      <div class="tab-panel" data-panel="bookings">
        <div class="panel-card">
          <div class="panel-head">
            <div><h2 class="panel-title">예약 내역</h2><div class="panel-sub" id="bookingsSub">로딩 중...</div></div>
            <div class="sub-tabs" id="bookingFilters">
              <button class="sub-tab active" data-filter="all">전체</button>
              <button class="sub-tab" data-filter="confirmed">예약 확정</button>
              <button class="sub-tab" data-filter="pending">입금 대기</button>
              <button class="sub-tab" data-filter="completed">여행 완료</button>
              <button class="sub-tab" data-filter="cancelled">취소</button>
            </div>
          </div>
          <div class="book-list" id="bookingList"></div>
        </div>
      </div>

      <div class="tab-panel" data-panel="wishlist" hidden>
        <div class="panel-card">
          <div class="panel-head"><h2 class="panel-title">❤️ 찜한 상품</h2><div class="panel-sub" id="wishSub"></div></div>
          <div class="wish-grid" id="wishGrid"></div>
        </div>
      </div>

      <div class="tab-panel" data-panel="coupons" hidden>
        <div class="panel-card">
          <div class="panel-head"><h2 class="panel-title">🎟️ 쿠폰함</h2><div class="panel-sub" id="couponSub"></div></div>
          <div class="coupon-grid" id="couponGrid"></div>
        </div>
      </div>

      <div class="tab-panel" data-panel="points" hidden>
        <div class="panel-card">
          <div class="panel-head"><h2 class="panel-title">💰 포인트</h2></div>
          <div style="padding:20px;background:linear-gradient(135deg,var(--ink),#2C2C2C);color:#fff;border-radius:14px;margin-bottom:16px;">
            <div style="font-size:12px;opacity:.7;margin-bottom:4px;">사용 가능 포인트</div>
            <div style="font-size:32px;font-weight:900;color:var(--accent);letter-spacing:-0.02em;" id="pointsBalance">0 P</div>
            <div style="font-size:11px;opacity:.6;margin-top:4px;">여행 1회 완료 시 결제액의 1% 자동 적립</div>
          </div>
          <div id="pointsHistory"></div>
        </div>
      </div>

      <div class="tab-panel" data-panel="reviews" hidden>
        <div class="panel-card">
          <div class="panel-head"><h2 class="panel-title">✏️ 작성한 리뷰</h2><div class="panel-sub" id="reviewSub"></div></div>
          <div class="book-list" id="reviewList"></div>
        </div>
      </div>

      <div class="tab-panel" data-panel="profile" hidden>
        <div class="panel-card">
          <div class="panel-head"><h2 class="panel-title">👤 내 정보 수정</h2></div>
          <div id="profileForm"></div>
        </div>
      </div>

      <div class="tab-panel" data-panel="travelers" hidden>
        <div class="panel-card">
          <div class="panel-head"><h2 class="panel-title">👥 여행자 관리</h2><div class="panel-sub">자주 쓰는 여행자 정보를 저장하세요</div></div>
          <div id="travelersList"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Review Modal -->
  <div class="modal-overlay" id="reviewModal">
    <div class="modal">
      <h3>리뷰 작성</h3>
      <p class="sub" id="reviewModalSub">이 상품 어떠셨어요?</p>
      <div class="star-input" id="starInput"><span data-s="1">★</span><span data-s="2">★</span><span data-s="3">★</span><span data-s="4">★</span><span data-s="5">★</span></div>
      <textarea id="reviewText" placeholder="여행은 어떠셨나요? 다른 여행자에게 도움되는 후기를 남겨주세요 (최소 20자)"></textarea>
      <div class="modal-actions">
        <button class="cancel" onclick="closeReviewModal()">취소</button>
        <button class="submit" onclick="submitReview()">작성 완료 (+5,000P)</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script src="state.js"></script>
  <script>
  const krw = OMT.krw;
  const toast = (msg) => { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); };

  /* ===== Profile ===== */
  const user = OMT.State.getUser();
  document.getElementById('profileAvatar').textContent = user.name.charAt(0);
  document.getElementById('profileName').textContent = user.name + ' 님';

  function renderProfileStats(){
    const bookings = OMT.State.getBookings();
    const wish = OMT.State.getWishlist();
    const points = OMT.State.getPointsBalance();
    document.getElementById('profileStats').innerHTML = `
      <div class="ps"><span class="ps-val">${bookings.length}</span><span class="ps-lb">총 여행 횟수</span></div>
      <div class="ps"><span class="ps-val">${bookings.filter(b => b.status==='confirmed'||b.status==='pending').length}</span><span class="ps-lb">진행 중 예약</span></div>
      <div class="ps"><span class="ps-val">${wish.length}</span><span class="ps-lb">찜한 상품</span></div>
      <div class="ps"><span class="ps-val">${points.toLocaleString('ko-KR')}P</span><span class="ps-lb">사용 가능 포인트</span></div>
    `;

    const bookActiveCount = bookings.filter(b => b.status==='confirmed'||b.status==='pending').length;
    document.getElementById('badgeBookings').textContent = bookActiveCount;
    document.getElementById('badgeWish').textContent = wish.length;
    document.getElementById('badgeCoupons').textContent = OMT.State.getAvailableCoupons().length;
  }

  /* ===== Bookings ===== */
  let bookingFilter = 'all';
  const PAY_LABELS = { kakao:'카카오페이', naver:'네이버페이', card:'신용카드', bank:'무통장입금' };

  function renderBookings(){
    const all = OMT.State.getBookings();
    const filtered = bookingFilter === 'all' ? all : all.filter(b => b.status === bookingFilter);
    document.getElementById('bookingsSub').textContent = `총 ${all.length}건 · 진행 중 ${all.filter(b=>b.status==='confirmed'||b.status==='pending').length}건`;

    if(filtered.length === 0){
      document.getElementById('bookingList').innerHTML = `<div class="empty-inner"><h3>해당 예약이 없어요</h3><p>다른 필터를 선택해보세요</p></div>`;
      return;
    }

    document.getElementById('bookingList').innerHTML = filtered.map(b => {
      const product = b.productId ? OMT.getProduct(b.productId) : null;
      const img = product?.images?.[0] || b.productImage || 'https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?auto=format&fit=crop&w=600&q=80';
      const name = product?.name || b.productName || '예약 상품';
      const statusLabel = { confirmed:'● 예약 확정', pending:'● 입금 대기', completed:'● 여행 완료', cancelled:'● 취소됨' }[b.status];

      const actions = [];
      if(b.status === 'confirmed' || b.status === 'pending'){
        actions.push(`<button class="bc-action" onclick="viewBooking('${b.bookingNumber}')">예약 확인</button>`);
        actions.push(`<button class="bc-action danger" onclick="cancelBooking('${b.id}')">예약 취소</button>`);
      }
      if(b.status === 'completed' && b.productId){
        const hasReview = OMT.State.getMyReviews().some(r => r.bookingId === b.id);
        if(!hasReview){
          actions.push(`<button class="bc-action" onclick="openReviewModal('${b.id}')">리뷰 쓰기 (+5,000P)</button>`);
        } else {
          actions.push(`<button class="bc-action ghost">리뷰 완료됨</button>`);
        }
      }
      if(b.productId){
        actions.push(`<button class="bc-action ghost" onclick="rebook('${b.productId}')">다시 예약</button>`);
      }

      return `
        <div class="book-card ${b.status==='cancelled'?'cancelled':''}">
          <div class="bc-thumb" style="background-image:url('${img}')" onclick="${b.productId?`location.href='product.html?id=${b.productId}'`:''}"></div>
          <div>
            <span class="bc-status ${b.status}">${statusLabel}</span>
            <div class="bc-name" onclick="${b.productId?`location.href='product.html?id=${b.productId}'`:''}">${name}</div>
            <div class="bc-meta">${b.dates} · 성인 ${b.paxCount}명 · ${PAY_LABELS[b.paymentMethod]||b.paymentMethod}</div>
            <div class="bc-num">예약번호: ${b.bookingNumber}</div>
          </div>
          <div class="bc-right">
            <div class="bc-price">${krw(b.total)}</div>
            ${actions.join('')}
          </div>
        </div>
      `;
    }).join('');
  }

  window.viewBooking = (bn) => { location.href = 'complete.html?bk=' + bn; };
  window.cancelBooking = (id) => {
    if(confirm('예약을 취소하시겠습니까?\n(출발 3일 전 이후는 환불 불가)')){
      OMT.State.cancelBooking(id);
      renderBookings(); renderProfileStats();
      toast('예약이 취소되었어요');
    }
  };
  window.rebook = (pid) => { location.href = 'product.html?id=' + pid; };

  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      bookingFilter = btn.dataset.filter;
      renderBookings();
    });
  });

  /* ===== Wishlist ===== */
  function renderWishlist(){
    const wish = OMT.State.getWishlist();
    document.getElementById('wishSub').textContent = `총 ${wish.length}개`;
    if(wish.length === 0){
      document.getElementById('wishGrid').innerHTML = `<div class="empty-inner" style="grid-column:1/-1;"><h3>찜한 상품이 없어요</h3><p>상품 페이지에서 ❤️ 아이콘을 눌러보세요</p></div>`;
      return;
    }
    document.getElementById('wishGrid').innerHTML = wish.map(pid => {
      const p = OMT.getProduct(pid);
      if(!p) return '';
      return `
        <div class="wish-card" onclick="location.href='product.html?id=${p.id}'">
          <div class="wish-thumb" style="background-image:url('${p.images?.[0]}')"></div>
          <span class="wish-heart" onclick="event.stopPropagation();unwish('${p.id}');">❤️</span>
          <div class="wish-body"><div class="wish-name">${p.name}</div><div class="wish-price">${krw(p.price)}~</div></div>
        </div>`;
    }).join('');
  }
  window.unwish = (id) => { OMT.State.toggleWishlist(id); renderWishlist(); renderProfileStats(); toast('찜 목록에서 제거됨'); };

  /* ===== Coupons ===== */
  function renderCoupons(){
    const coupons = OMT.State.getAvailableCoupons();
    document.getElementById('couponSub').textContent = `사용 가능 ${coupons.length}개`;
    if(coupons.length === 0){
      document.getElementById('couponGrid').innerHTML = `<div class="empty-inner" style="grid-column:1/-1;"><h3>사용 가능한 쿠폰이 없어요</h3></div>`;
      return;
    }
    document.getElementById('couponGrid').innerHTML = coupons.map(c => `
      <div class="coupon">
        <div class="cp-amount">${c.type==='flat'?c.amount.toLocaleString('ko-KR'):c.amount}<small>${c.type==='flat'?'원':'% 할인'}</small></div>
        <div class="cp-info">
          <div class="title">${c.title}</div>
          <div class="terms">${c.terms}</div>
          <div class="exp">~ ${c.expires} 만료</div>
        </div>
      </div>
    `).join('');
  }

  /* ===== Points ===== */
  function renderPoints(){
    const balance = OMT.State.getPointsBalance();
    document.getElementById('pointsBalance').textContent = balance.toLocaleString('ko-KR') + ' P';
    const history = OMT.DATA.POINTS_HISTORY;
    document.getElementById('pointsHistory').innerHTML = `
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead style="background:var(--bg-soft);"><tr>
          <th style="padding:10px;text-align:left;font-weight:800;">날짜</th>
          <th style="padding:10px;text-align:left;font-weight:800;">내역</th>
          <th style="padding:10px;text-align:right;font-weight:800;">변동</th>
        </tr></thead>
        <tbody>
          ${history.map(h => `
            <tr style="border-bottom:1px solid var(--line);">
              <td style="padding:10px;">${h.date}</td>
              <td style="padding:10px;">${h.label}</td>
              <td style="padding:10px;text-align:right;color:${h.delta>0?'var(--success)':'var(--danger)'};font-weight:800;">${h.delta>0?'+ ':'- '}${Math.abs(h.delta).toLocaleString('ko-KR')}P</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  /* ===== My Reviews ===== */
  function renderMyReviews(){
    const reviews = OMT.State.getMyReviews();
    document.getElementById('reviewSub').textContent = `총 ${reviews.length}개`;
    if(reviews.length === 0){
      document.getElementById('reviewList').innerHTML = `<div class="empty-inner"><h3>작성한 리뷰가 없어요</h3><p>여행 완료 후 리뷰를 작성하면 5,000P를 드려요!</p></div>`;
      return;
    }
    document.getElementById('reviewList').innerHTML = reviews.map(r => {
      const p = OMT.getProduct(r.productId);
      return `
        <div class="book-card">
          <div class="bc-thumb" style="background-image:url('${p?.images?.[0]||''}')" onclick="location.href='product.html?id=${r.productId}'"></div>
          <div>
            <div style="color:var(--accent);margin-bottom:4px;">${'★'.repeat(r.score)}${'☆'.repeat(5-r.score)}</div>
            <div class="bc-name">${p?.name||'상품'}</div>
            <div class="bc-meta" style="font-style:italic;color:var(--ink-2);margin-top:4px;">"${r.text}"</div>
            <div class="bc-num">${r.date} 작성</div>
          </div>
          <div class="bc-right"><span style="font-weight:900;color:var(--primary);font-size:14px;">${r.score}/5</span></div>
        </div>
      `;
    }).join('');
  }

  /* ===== Review Modal ===== */
  let reviewState = { bookingId:null, productId:null, score:5 };

  window.openReviewModal = (bookingId) => {
    const b = OMT.State.getBookings().find(x => x.id === bookingId);
    if(!b) return;
    reviewState = { bookingId, productId: b.productId, score: 5 };
    const p = OMT.getProduct(b.productId);
    document.getElementById('reviewModalSub').textContent = p ? `"${p.name}" 어떠셨나요?` : '이 상품 어떠셨어요?';
    document.getElementById('reviewText').value = '';
    document.querySelectorAll('.star-input span').forEach((s,i) => s.classList.toggle('on', i < 5));
    document.getElementById('reviewModal').classList.add('open');
  };
  window.closeReviewModal = () => document.getElementById('reviewModal').classList.remove('open');
  window.submitReview = () => {
    const text = document.getElementById('reviewText').value.trim();
    if(text.length < 20){ toast('최소 20자 이상 작성해주세요'); return; }
    OMT.State.addReview({
      productId: reviewState.productId,
      bookingId: reviewState.bookingId,
      score: reviewState.score,
      text,
      travelType: '구매 확인', duration: ''
    });
    OMT.State.addPoints(5000, '리뷰 작성 보너스');
    closeReviewModal();
    renderMyReviews(); renderBookings(); renderProfileStats();
    toast('리뷰 등록 완료! +5,000P 적립');
  };

  document.querySelectorAll('.star-input span').forEach((s,i) => {
    s.addEventListener('click', () => {
      reviewState.score = i + 1;
      document.querySelectorAll('.star-input span').forEach((el,j) => el.classList.toggle('on', j <= i));
    });
  });

  /* ===== Profile form ===== */
  function renderProfileForm(){
    document.getElementById('profileForm').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div><label style="font-size:12px;font-weight:700;color:var(--ink-2);">한글 이름</label><input type="text" value="${user.name}" style="width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;margin-top:5px;"/></div>
        <div><label style="font-size:12px;font-weight:700;color:var(--ink-2);">영문 이름</label><input type="text" value="${user.nameEn}" style="width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;margin-top:5px;"/></div>
        <div><label style="font-size:12px;font-weight:700;color:var(--ink-2);">이메일</label><input type="email" value="${user.email}" style="width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;margin-top:5px;"/></div>
        <div><label style="font-size:12px;font-weight:700;color:var(--ink-2);">연락처</label><input type="tel" value="${user.phone}" style="width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;margin-top:5px;"/></div>
      </div>
      <button style="margin-top:14px;padding:12px 24px;background:var(--primary);color:#fff;border-radius:10px;font-weight:900;font-size:13px;" onclick="alert('저장됨 (프로토타입)')">정보 저장</button>
    `;
  }

  function renderTravelers(){
    const list = user.travelers || [];
    document.getElementById('travelersList').innerHTML = list.map(t => `
      <div class="book-card" style="grid-template-columns:1fr auto;">
        <div>
          <div class="bc-name">${t.name} (${t.relation})</div>
          <div class="bc-meta">${t.nameEn} · ${t.birth} · ${t.phone}</div>
        </div>
        <div class="bc-right"><button class="bc-action">수정</button></div>
      </div>
    `).join('') + `<button style="width:100%;margin-top:14px;padding:12px;background:var(--bg-soft);color:var(--ink);border-radius:10px;font-weight:700;font-size:13px;">+ 여행자 추가</button>`;
  }

  /* ===== Tab switching ===== */
  document.querySelectorAll('.sn-item[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sn-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-panel').forEach(p => p.hidden = p.dataset.panel !== tab);
      // Lazy render per tab
      if(tab === 'wishlist') renderWishlist();
      if(tab === 'coupons') renderCoupons();
      if(tab === 'points') renderPoints();
      if(tab === 'reviews') renderMyReviews();
      if(tab === 'profile') renderProfileForm();
      if(tab === 'travelers') renderTravelers();
    });
  });

  /* INIT */
  renderProfileStats();
  renderBookings();
  // Open tab from URL hash (#bookings, #wishlist, etc.)
  if(location.hash){
    const t = location.hash.slice(1);
    document.querySelector(`.sn-item[data-tab="${t}"]`)?.click();
  }
  </script>
</body>
</html>
