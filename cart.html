<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장바구니 | 오마이트립</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#FF6B35;--primary-dark:#E85826;--primary-soft:#FFF0E8;--secondary:#1E88E5;--accent:#FFD23F;--success:#10B981;--danger:#EF4444;--ink:#1A1A1A;--ink-2:#4B5563;--ink-3:#9CA3AF;--line:#E5E7EB;--bg:#fff;--bg-soft:#F7F7F9;--radius:14px;--radius-lg:20px;--header-h:64px;--max-w:1200px;}
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{font-family:'Noto Sans KR',-apple-system,sans-serif;color:var(--ink);background:var(--bg-soft);line-height:1.55;}
    a{color:inherit;text-decoration:none;}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
    .container{max-width:var(--max-w);margin:0 auto;padding:0 24px;}
    .skip-link{position:absolute;left:-9999px;top:0;padding:10px 16px;background:#1A1A1A;color:#fff;z-index:999;font-weight:700;font-size:13px;border-radius:0 0 8px 0;}
    .skip-link:focus{left:0;}

    .header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
    .header-inner{height:var(--header-h);display:flex;align-items:center;gap:16px;}
    .logo{display:inline-flex;align-items:center;gap:8px;font-weight:900;font-size:18px;color:var(--ink);}
    .logo-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#FF9A6C);color:#fff;display:grid;place-items:center;font-weight:900;font-size:16px;}
    .logo-mark::after{content:"O";}
    .page-title{margin-left:16px;font-size:15px;font-weight:700;color:var(--ink-2);}
    .header-actions{margin-left:auto;display:flex;gap:6px;}
    .btn-ghost{padding:8px 14px;border-radius:10px;font-weight:600;font-size:13px;color:var(--ink-2);}

    .page-head{padding:24px 24px 16px;max-width:var(--max-w);margin:0 auto;}
    .page-head h1{margin:0 0 4px;font-size:26px;font-weight:900;letter-spacing:-0.02em;}
    .page-head p{margin:0;color:var(--ink-2);font-size:14px;}

    .cart-grid{display:grid;grid-template-columns:1fr 380px;gap:20px;padding:0 24px 80px;max-width:var(--max-w);margin:0 auto;align-items:flex-start;}
    .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);padding:20px;margin-bottom:14px;}
    .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
    .card-title{margin:0;font-size:16px;font-weight:900;}
    .card-actions{display:flex;gap:8px;}
    .card-actions button{padding:6px 10px;border-radius:6px;font-size:11px;font-weight:700;background:var(--bg-soft);color:var(--ink-2);}

    .cart-item{display:grid;grid-template-columns:auto 100px 1fr auto;gap:14px;padding:14px 0;border-top:1px dashed var(--line);align-items:center;}
    .cart-item:first-child{border-top:none;padding-top:0;}
    .ci-thumb{aspect-ratio:1;border-radius:10px;background-size:cover;background-position:center;background-color:#eee;cursor:pointer;}
    .ci-info{min-width:0;cursor:pointer;}
    .ci-tags{display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap;}
    .ci-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--primary-soft);color:var(--primary);font-weight:800;}
    .ci-tag.orig{background:linear-gradient(135deg,var(--primary),#FF9A6C);color:#fff;}
    .ci-name{font-size:14px;font-weight:800;line-height:1.35;}
    .ci-sub{font-size:12px;color:var(--ink-3);margin-top:2px;}
    .ci-date{font-size:11px;color:var(--ink-2);margin-top:4px;}
    .ci-right{text-align:right;display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
    .ci-price{font-size:16px;font-weight:900;color:var(--primary);letter-spacing:-0.02em;}
    .ci-controls{display:flex;gap:4px;}
    .ci-btn{width:28px;height:28px;border-radius:6px;background:var(--bg-soft);display:grid;place-items:center;font-size:12px;color:var(--ink-2);}
    .ci-btn.del:hover{background:#FEE;color:var(--danger);}
    .ci-check{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--line);background:#fff;position:relative;cursor:pointer;flex-shrink:0;}
    .ci-check.checked{background:var(--primary);border-color:var(--primary);}
    .ci-check.checked::after{content:"";position:absolute;left:5px;top:1px;width:5px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);}

    .coupon-row{display:flex;gap:8px;}
    .coupon-row input{flex:1;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;outline:none;}
    .coupon-row button{padding:0 18px;background:var(--ink);color:#fff;border-radius:10px;font-weight:800;font-size:13px;}
    .applied-coupon{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--success);color:#fff;border-radius:8px;margin-top:10px;font-size:12px;font-weight:700;}
    .applied-coupon button{color:#fff;font-weight:900;}
    .coupon-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
    .coupon-opt{display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--bg-soft);border-radius:10px;font-size:12px;cursor:pointer;border:1.5px solid transparent;}
    .coupon-opt:hover{border-color:var(--primary);}
    .coupon-opt .amt{font-weight:900;color:var(--primary);font-size:14px;}

    .sum-panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);padding:22px;position:sticky;top:calc(var(--header-h) + 16px);}
    .sum-panel h3{margin:0 0 14px;font-size:16px;font-weight:900;}
    .sum-row{display:flex;justify-content:space-between;font-size:14px;color:var(--ink-2);padding:6px 0;}
    .sum-row.discount{color:var(--primary);font-weight:700;}
    .sum-div{height:1px;background:var(--line);margin:12px 0;}
    .sum-grand{display:flex;justify-content:space-between;align-items:baseline;padding:14px;background:var(--ink);color:#fff;border-radius:12px;margin:12px 0;}
    .sum-grand .lb{font-size:12px;opacity:.7;}
    .sum-grand .pr{font-size:24px;font-weight:900;color:var(--accent);letter-spacing:-0.02em;}
    .sum-cta{width:100%;padding:16px;border-radius:12px;background:var(--primary);color:#fff;font-weight:900;font-size:15px;box-shadow:0 6px 20px rgba(255,107,53,.35);}
    .sum-cta:disabled{background:var(--line);color:var(--ink-3);cursor:not-allowed;box-shadow:none;}

    .empty{background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);padding:80px 24px;text-align:center;color:var(--ink-2);}
    .empty-ico{font-size:56px;margin-bottom:14px;}
    .empty h2{margin:0 0 6px;font-size:20px;}
    .empty p{margin:0 0 20px;font-size:14px;color:var(--ink-3);}
    .empty a{display:inline-block;padding:12px 24px;background:var(--primary);color:#fff;border-radius:10px;font-weight:900;font-size:14px;}

    .rec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
    .rec-card{background:var(--bg-soft);border-radius:12px;overflow:hidden;transition:transform .15s;}
    .rec-card:hover{transform:translateY(-2px);}
    .rec-thumb{aspect-ratio:4/3;background-size:cover;background-position:center;background-color:#eee;}
    .rec-body{padding:12px;}
    .rec-name{font-size:12px;font-weight:800;line-height:1.35;}
    .rec-price{font-size:14px;font-weight:900;color:var(--primary);margin-top:4px;}

    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(100px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-weight:700;font-size:14px;z-index:100;transition:transform .3s;pointer-events:none;}
    .toast.show{transform:translateX(-50%) translateY(0);}

    @media (max-width:1024px){.cart-grid{grid-template-columns:1fr;}.sum-panel{position:static;}.rec-grid{grid-template-columns:1fr 1fr;}}
    @media (max-width:768px){:root{--header-h:56px;}.page-title{display:none;}.cart-item{grid-template-columns:auto 72px 1fr;}.ci-right{grid-column:1/-1;border-top:1px dashed var(--line);padding-top:10px;flex-direction:row;justify-content:space-between;align-items:center;}.rec-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <a class="skip-link" href="#omt-main">본문 바로가기</a>

  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-mark"></span><span>오마이트립</span></a>
      <span class="page-title">장바구니</span>
      <div class="header-actions">
        <a href="index.html" class="btn-ghost">← 쇼핑 계속하기</a>
      </div>
    </div>
  </header>

  <div class="page-head">
    <h1>🛒 장바구니</h1>
    <p id="itemSummary">담긴 상품 확인 중...</p>
  </div>

  <main id="omt-main" class="cart-grid" style="display:none;">
    <section>
      <div class="card" id="itemsCard">
        <div class="card-head">
          <h3 class="card-title">예약 상품</h3>
          <div class="card-actions">
            <button onclick="selectAll(true)">전체 선택</button>
            <button onclick="selectAll(false)">전체 해제</button>
            <button onclick="removeSelected()" style="color:var(--danger);">선택 삭제</button>
          </div>
        </div>
        <div id="itemsList"></div>
      </div>

      <div class="card">
        <div class="card-head"><h3 class="card-title">🎟️ 쿠폰 / 프로모션</h3></div>
        <div class="coupon-row">
          <input type="text" id="couponInput" placeholder="쿠폰 코드 입력 (예: OMTSPRING25)"/>
          <button onclick="applyCoupon()">적용</button>
        </div>
        <div id="appliedCoupon"></div>
        <div class="coupon-list" id="couponList"></div>
      </div>

      <div class="card">
        <div class="card-head"><h3 class="card-title">✨ 추천 상품</h3></div>
        <div class="rec-grid" id="recGrid"></div>
      </div>
    </section>

    <aside class="sum-panel" id="sumPanel">
      <h3>결제 예정 금액</h3>
      <div id="sumRows"></div>
      <div class="sum-div"></div>
      <div class="sum-grand">
        <div><div class="lb">총 결제 금액</div><div style="font-size:11px;opacity:.6;" id="sumSummary">0개 상품</div></div>
        <div class="pr" id="sumTotal">0원</div>
      </div>
      <button class="sum-cta" id="sumCta" onclick="goCheckout()" disabled>결제하기</button>
      <ul style="list-style:none;padding:12px 0 0;margin:0;display:flex;flex-direction:column;gap:5px;font-size:11px;color:var(--ink-3);">
        <li>✓ 안전한 SSL 암호화 결제</li><li>✓ 24시간 내 예약 확정</li><li>✓ 카카오톡 실시간 알림</li>
      </ul>
    </aside>
  </main>

  <main id="emptyMain" class="cart-grid" style="display:none;grid-template-columns:1fr;">
    <div class="empty">
      <div class="empty-ico">🛒</div>
      <h2>장바구니가 비어있어요</h2>
      <p>담긴 상품이 없어요. 지금 여행을 계획해보세요!</p>
      <a href="index.html">홈으로 가기 →</a>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script src="state.js"></script>
  <script>
  let appliedCoupon = null;
  const krw = OMT.krw;
  const toast = (msg) => { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); };

  // Seed cart if completely empty (first visit)
  if(OMT.State.getCart().length === 0){
    // Add a couple of seed items for demo
    OMT.State.addToCart({
      productId:'prod-jp-01', type:'ORIGINAL', orig:true,
      img:'https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?auto=format&fit=crop&w=600&q=80',
      name:'[단독] 오사카 벚꽃 3박4일 프리미엄',
      sub:'티웨이 + 호텔 그란비아 + USJ', dates:'2026.05.10 - 2026.05.13', pax:'성인 2명', paxCount:2, price:1378000
    });
    OMT.State.addToCart({
      productId:'prod-vn-01', type:'ORIGINAL', orig:true,
      img:'https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&w=600&q=80',
      name:'다낭 풀빌라 4박5일 올인클루시브',
      sub:'비엣젯 + 프리미어빌리지', dates:'2026.06.07 - 2026.06.12', pax:'성인 2명', paxCount:2, price:2580000
    });
  }

  function renderItems(){
    const cart = OMT.State.getCart();
    if(cart.length === 0){
      document.getElementById('omt-main').style.display = 'none';
      document.getElementById('emptyMain').style.display = '';
      document.getElementById('itemSummary').textContent = '담긴 상품이 없어요';
      return;
    }
    document.getElementById('omt-main').style.display = '';
    document.getElementById('emptyMain').style.display = 'none';

    document.getElementById('itemsList').innerHTML = cart.map(it => `
      <div class="cart-item" data-cartid="${it.cartId}">
        <div class="ci-check ${it.checked?'checked':''}" onclick="toggleCheck('${it.cartId}')"></div>
        <div class="ci-thumb" style="background-image:url('${it.img}')" onclick="goToProduct('${it.productId||''}')"></div>
        <div class="ci-info" onclick="goToProduct('${it.productId||''}')">
          <div class="ci-tags"><span class="ci-tag ${it.orig?'orig':''}">${it.type}</span></div>
          <div class="ci-name">${it.name}</div>
          <div class="ci-sub">${it.sub||''}</div>
          <div class="ci-date">📅 ${it.dates||'-'} · ${it.pax||'-'}</div>
        </div>
        <div class="ci-right">
          <div class="ci-price">${krw(it.price)}</div>
          <div class="ci-controls">
            <button class="ci-btn del" title="삭제" onclick="removeItem('${it.cartId}')">🗑</button>
          </div>
        </div>
      </div>
    `).join('');

    const checked = cart.filter(i => i.checked).length;
    document.getElementById('itemSummary').textContent = `총 ${cart.length}개 상품 · 선택된 ${checked}개`;
  }

  window.toggleCheck = (id) => {
    const cur = OMT.State.getCart().find(i => i.cartId === id);
    OMT.State.updateCartItem(id, { checked: !cur.checked });
    renderItems(); renderSummary();
  };
  window.selectAll = (on) => {
    OMT.State.getCart().forEach(i => OMT.State.updateCartItem(i.cartId, { checked: on }));
    renderItems(); renderSummary();
  };
  window.removeItem = (id) => {
    const item = OMT.State.getCart().find(i => i.cartId === id);
    if(!item) return;
    if(confirm(`"${item.name}"을(를) 삭제할까요?`)){
      OMT.State.removeFromCart(id);
      renderItems(); renderSummary();
      toast('삭제되었어요');
    }
  };
  window.removeSelected = () => {
    const selected = OMT.State.getCart().filter(i => i.checked);
    if(selected.length === 0){ toast('선택된 상품이 없어요'); return; }
    if(confirm(`선택된 ${selected.length}개 삭제할까요?`)){
      selected.forEach(i => OMT.State.removeFromCart(i.cartId));
      renderItems(); renderSummary();
      toast(`${selected.length}개 삭제됨`);
    }
  };
  window.goToProduct = (id) => { if(id) location.href = 'product.html?id='+id; };

  /* Coupons */
  window.applyCoupon = () => {
    const code = document.getElementById('couponInput').value.trim().toUpperCase();
    if(!code) return;
    const coupon = OMT.DATA.COUPONS.find(c => c.code === code);
    if(!coupon){ toast('유효하지 않은 쿠폰이에요'); return; }
    appliedCoupon = coupon;
    document.getElementById('couponInput').value = '';
    renderSummary();
    toast('쿠폰이 적용됐어요');
  };
  window.selectCoupon = (code) => {
    const coupon = OMT.DATA.COUPONS.find(c => c.code === code);
    if(!coupon) return;
    appliedCoupon = coupon;
    renderSummary();
    toast('쿠폰 적용됨');
  };
  window.removeCoupon = () => { appliedCoupon = null; renderSummary(); };

  function calculateDiscount(subtotal){
    if(!appliedCoupon) return 0;
    if(appliedCoupon.minAmount && subtotal < appliedCoupon.minAmount) return 0;
    if(appliedCoupon.type === 'flat') return appliedCoupon.amount;
    if(appliedCoupon.type === 'percent'){
      const d = Math.round(subtotal * appliedCoupon.amount / 100);
      return appliedCoupon.maxAmount ? Math.min(d, appliedCoupon.maxAmount) : d;
    }
    return 0;
  }

  function renderSummary(){
    const selected = OMT.State.getCart().filter(i => i.checked);
    const sub = selected.reduce((s,i) => s + i.price, 0);
    const bundleDisc = selected.length >= 2 ? Math.round(sub * 0.07) : 0;
    const couponDisc = calculateDiscount(sub - bundleDisc);
    const total = Math.max(0, sub - bundleDisc - couponDisc);

    document.getElementById('sumRows').innerHTML = `
      <div class="sum-row"><span>상품 금액 (${selected.length}개)</span><span>${krw(sub)}</span></div>
      ${bundleDisc > 0 ? `<div class="sum-row discount"><span>번들 할인 (-7%, 2개↑)</span><span>- ${krw(bundleDisc)}</span></div>` : ''}
      ${couponDisc > 0 ? `<div class="sum-row discount"><span>쿠폰 할인 (${appliedCoupon.code})</span><span>- ${krw(couponDisc)}</span></div>` : ''}
    `;
    document.getElementById('sumTotal').textContent = krw(total);
    document.getElementById('sumSummary').textContent = `${selected.length}개 상품`;
    document.getElementById('sumCta').disabled = selected.length === 0;
    document.getElementById('sumCta').textContent = selected.length === 0 ? '결제하기' : `${krw(total)} 결제`;

    document.getElementById('appliedCoupon').innerHTML = appliedCoupon ? `
      <div class="applied-coupon">
        <span>✓ ${appliedCoupon.code} · ${appliedCoupon.title}</span>
        <button onclick="removeCoupon()">✕</button>
      </div>` : '';

    // Render coupon list
    const available = OMT.State.getAvailableCoupons().filter(c => !appliedCoupon || c.code !== appliedCoupon.code);
    document.getElementById('couponList').innerHTML = available.map(c => `
      <div class="coupon-opt" onclick="selectCoupon('${c.code}')">
        <div>
          <div style="font-weight:800;">${c.title}</div>
          <div style="color:var(--ink-3);font-size:11px;">${c.terms} · ${c.code}</div>
        </div>
        <span class="amt">${c.type==='flat'?krw(c.amount):c.amount+'%'}</span>
      </div>
    `).join('');
  }

  window.goCheckout = () => {
    const selected = OMT.State.getCart().filter(i => i.checked);
    if(selected.length === 0) return;

    const sub = selected.reduce((s,i) => s + i.price, 0);
    const bundleDisc = selected.length >= 2 ? Math.round(sub * 0.07) : 0;
    const couponDisc = calculateDiscount(sub - bundleDisc);
    const total = Math.max(0, sub - bundleDisc - couponDisc);

    // Use first item's productId as representative
    const first = selected[0];
    let payload = null;
    if(first.productId){
      payload = OMT.productAsPackage(first.productId, first.paxCount || 2, first.dates);
    }
    if(!payload){
      payload = {
        flight:{airline:'묶음 결제',number:'CART',out:{dep:'--:--',arr:'--:--',depAp:'ICN',arrAp:'DST',dur:'-'},ret:{dep:'--:--',arr:'--:--',depAp:'DST',arrAp:'ICN',dur:'-'},direct:true,price:Math.round(sub*0.4)},
        hotel:{name:selected.map(i=>i.name).join(' + '), areaLabel:'복합 패키지', price:Math.round(sub*0.6/3)},
        activities:[],
        paxCount: first.paxCount || 2, nights: 3, dates: first.dates
      };
    }
    payload.final = total;
    payload.source = 'cart';
    payload.cartItemIds = selected.map(i => i.cartId);
    payload.couponCode = appliedCoupon?.code;
    payload.discount = bundleDisc + couponDisc;
    payload.subtotal = sub;
    sessionStorage.setItem('omt_package', JSON.stringify(payload));
    location.href = 'checkout.html';
  };

  /* Recommended products */
  function renderRec(){
    const recs = OMT.DATA.PRODUCTS.filter(p => p.originalFlag).slice(0, 3);
    document.getElementById('recGrid').innerHTML = recs.map(r => `
      <a class="rec-card" href="product.html?id=${r.id}">
        <div class="rec-thumb" style="background-image:url('${r.images?.[0]}')"></div>
        <div class="rec-body"><div class="rec-name">${r.name}</div><div class="rec-price">${krw(r.price)}~</div></div>
      </a>
    `).join('');
  }

  renderItems();
  renderSummary();
  renderRec();
  </script>
</body>
</html>
