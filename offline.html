<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오프라인 | 오마이트립</title>
  <meta name="theme-color" content="#FF6B35" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#FF6B35;--golf:#0B6E4F;--accent:#FFD23F;
      --ink:#1A1A1A;--ink-2:#4B5563;--ink-3:#9CA3AF;
      --line:#E5E7EB;--bg:#fff;--bg-soft:#F7F7F9;
    }
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;padding:0;height:100%;}
    body{
      font-family:'Noto Sans KR',-apple-system,sans-serif;color:var(--ink);
      background:linear-gradient(135deg,#FFF5F0 0%,#FFEDE0 50%,var(--bg-soft) 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:24px;text-align:center;-webkit-font-smoothing:antialiased;
    }
    a{color:inherit;text-decoration:none;}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

    .offline-card{
      max-width:420px;width:100%;background:#fff;border-radius:24px;
      padding:36px 28px;box-shadow:0 20px 60px rgba(255,107,53,.12);
      animation:fadeUp .5s ease;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

    .icon-wrap{
      width:80px;height:80px;border-radius:24px;
      background:linear-gradient(135deg,var(--primary),#FF9A6C);
      display:grid;place-items:center;margin:0 auto 22px;
      font-size:38px;color:#fff;position:relative;
      animation:wobble 2s ease-in-out infinite;
    }
    @keyframes wobble{
      0%,100%{transform:rotate(0);}
      25%{transform:rotate(-5deg);}
      75%{transform:rotate(5deg);}
    }
    .icon-wrap .signal{
      position:absolute;top:-4px;right:-4px;font-size:22px;
      animation:signalPulse 1.5s ease-in-out infinite;
    }
    @keyframes signalPulse{
      0%,100%{opacity:1;transform:scale(1);}
      50%{opacity:.4;transform:scale(.85);}
    }

    h1{
      font-size:22px;font-weight:900;letter-spacing:-0.02em;margin:0 0 10px;
    }
    .desc{
      font-size:14px;color:var(--ink-2);line-height:1.6;margin:0 0 26px;
    }

    .actions{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
    .btn{
      width:100%;padding:14px;border-radius:12px;font-weight:900;font-size:14px;
      transition:transform .15s, box-shadow .15s;
    }
    .btn-primary{
      background:var(--primary);color:#fff;
      box-shadow:0 6px 16px rgba(255,107,53,.3);
    }
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(255,107,53,.4);}
    .btn-ghost{background:var(--bg-soft);color:var(--ink-2);}
    .btn-ghost:hover{background:#EEEEEE;color:var(--ink);}

    .cached-section{
      padding-top:22px;border-top:1px solid var(--line);
    }
    .cached-title{
      font-size:11px;font-weight:900;color:var(--ink-3);letter-spacing:.06em;
      text-transform:uppercase;margin-bottom:12px;
    }
    .cached-list{display:flex;flex-direction:column;gap:6px;}
    .cached-link{
      display:flex;align-items:center;gap:10px;padding:10px 12px;
      background:var(--bg-soft);border-radius:10px;
      font-size:13px;font-weight:700;color:var(--ink);
      transition:background .15s;
    }
    .cached-link:hover{background:#EEE;}
    .cached-link .ic{font-size:16px;flex-shrink:0;}
    .cached-link .arrow{margin-left:auto;color:var(--ink-3);}

    .status-pill{
      display:inline-flex;align-items:center;gap:6px;
      padding:4px 10px;border-radius:999px;font-size:11px;font-weight:800;
      background:#FEE2E2;color:#B91C1C;margin-bottom:14px;
    }
    .status-pill .dot{
      width:6px;height:6px;border-radius:50%;background:currentColor;
      animation:dotBlink 1s ease-in-out infinite;
    }
    @keyframes dotBlink{0%,100%{opacity:1;}50%{opacity:.3;}}

    .status-pill.online{background:#D1FAE5;color:#065F46;}

    .tip{
      margin-top:24px;font-size:11px;color:var(--ink-3);
    }
    .tip strong{color:var(--ink-2);}
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="status-pill" id="statusPill">
      <span class="dot"></span>
      <span id="statusText">오프라인 — 네트워크 연결 끊김</span>
    </div>

    <div class="icon-wrap">
      📡
      <span class="signal">❌</span>
    </div>

    <h1>인터넷에 연결되지 않았어요</h1>
    <p class="desc">
      네트워크 연결 상태를 확인해주세요.<br>
      Wi-Fi가 켜져 있거나 모바일 데이터를 사용 중인지 점검해주세요.
    </p>

    <div class="actions">
      <button class="btn btn-primary" onclick="tryAgain()">🔄 다시 시도</button>
      <button class="btn btn-ghost" onclick="history.back()">← 이전 페이지로</button>
    </div>

    <div class="cached-section">
      <div class="cached-title">💾 캐시된 페이지 (오프라인 가능)</div>
      <div class="cached-list">
        <a href="index.html" class="cached-link">
          <span class="ic">🏠</span>
          <span>오마이트립 홈</span>
          <span class="arrow">›</span>
        </a>
        <a href="golftels.html" class="cached-link">
          <span class="ic">⛳</span>
          <span>골프텔 리스트 (8개)</span>
          <span class="arrow">›</span>
        </a>
        <a href="mypage.html" class="cached-link">
          <span class="ic">👤</span>
          <span>마이페이지 (내 예약)</span>
          <span class="arrow">›</span>
        </a>
      </div>
    </div>

    <p class="tip">
      💡 <strong>오마이트립 PWA</strong>는 핵심 페이지를 캐시에 저장해두기 때문에<br>
      오프라인에서도 일부 기능을 이용하실 수 있어요.
    </p>
  </div>

  <script>
    function tryAgain(){
      if(navigator.onLine){
        location.reload();
      } else {
        const btn = event.target;
        const original = btn.textContent;
        btn.textContent = '🔌 여전히 오프라인 상태예요';
        btn.style.background = '#9CA3AF';
        setTimeout(() => {
          btn.textContent = original;
          btn.style.background = '';
        }, 2000);
      }
    }

    // online/offline 이벤트 리스닝
    window.addEventListener('online', () => {
      const pill = document.getElementById('statusPill');
      const text = document.getElementById('statusText');
      pill.classList.add('online');
      text.textContent = '온라인 복귀! 페이지 새로고침 중...';
      setTimeout(() => location.reload(), 1200);
    });
    window.addEventListener('offline', () => {
      const pill = document.getElementById('statusPill');
      const text = document.getElementById('statusText');
      pill.classList.remove('online');
      text.textContent = '오프라인 — 네트워크 연결 끊김';
    });

    // 초기 상태 체크
    if(navigator.onLine){
      // 페이지가 offline.html에 왔는데 onLine === true면 일시적 fetch 실패일 수 있음
      const pill = document.getElementById('statusPill');
      const text = document.getElementById('statusText');
      pill.classList.add('online');
      text.textContent = '연결 복구됨 — 다시 시도해보세요';
    }
  </script>
</body>
</html>
