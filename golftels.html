<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>골프텔 검색 | 오마이트립</title>
  <meta name="description" content="오마이트립 골프텔 — 골프와 호텔이 하나로. 일본·베트남·태국·필리핀의 라운딩 패키지." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#FF6B35;--primary-dark:#E85826;--primary-soft:#FFF1EA;
      --secondary:#1E88E5;--accent:#FFD23F;
      --golf:#0B6E4F;--golf-dark:#075440;--golf-soft:#E6F4EE;
      --success:#10B981;--danger:#EF4444;
      --ink:#15161B;--ink-2:#52565F;--ink-3:#9AA0A8;
      --line:#ECEAE3;--bg:#FFFFFF;--bg-soft:#F7F5F1;
      --radius-sm:10px;--radius:16px;--radius-lg:24px;--radius-pill:999px;
      --shadow-sm:0 1px 2px rgba(20,21,26,.04), 0 2px 8px rgba(20,21,26,.05);
      --shadow:0 10px 30px rgba(20,21,26,.08);
      --shadow-lg:0 24px 60px rgba(20,21,26,.13);
      --ease:cubic-bezier(.4,.14,.2,1);
      --header-h:64px;--max-w:1280px;
    }
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{font-family:'Noto Sans KR',-apple-system,sans-serif;color:var(--ink);background:var(--bg-soft);line-height:1.55;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none;}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
    input,select{font-family:inherit;}
    .container{max-width:var(--max-w);margin:0 auto;padding:0 24px;}
    .skip-link{position:absolute;left:-9999px;top:0;padding:10px 16px;background:#1A1A1A;color:#fff;z-index:999;font-weight:700;font-size:13px;border-radius:0 0 8px 0;}
    .skip-link:focus{left:0;}

    /* Header */
    .header{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
    .header-inner{height:var(--header-h);display:flex;align-items:center;gap:16px;}
    .logo{display:inline-flex;align-items:center;gap:8px;font-weight:900;font-size:18px;color:var(--ink);}
    .logo-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#FF9A6C);color:#fff;display:grid;place-items:center;font-weight:900;font-size:16px;}
    .logo-mark::after{content:"O";}
    .gnb{display:flex;gap:4px;margin-left:12px;}
    .gnb a{padding:8px 12px;border-radius:var(--radius-sm);font-weight:700;font-size:14px;color:var(--ink-2);transition:background .3s var(--ease), color .3s var(--ease);}
    .gnb a:hover{background:var(--bg-soft);color:var(--ink);}
    .gnb a.active{background:var(--golf-soft);color:var(--golf);}
    .header-actions{margin-left:auto;display:flex;gap:6px;align-items:center;}
    .btn-ghost{padding:8px 14px;border-radius:10px;font-weight:600;font-size:13px;color:var(--ink-2);}
    .btn-ghost:hover{background:var(--bg-soft);color:var(--ink);}
    .btn-ai{padding:8px 14px;border-radius:10px;font-weight:800;font-size:13px;color:#fff;background:linear-gradient(135deg,#7B68EE,#9F7AEA);}

    /* Hero */
    .hero{
      background:linear-gradient(135deg, var(--golf-dark) 0%, var(--golf) 60%, #11876A 100%);
      color:#fff;padding:50px 0 100px;position:relative;overflow:hidden;
    }
    .hero::before{
      content:"⛳";position:absolute;top:-20px;right:-20px;font-size:280px;opacity:.07;
      transform:rotate(-15deg);pointer-events:none;
    }
    .hero-inner{position:relative;z-index:1;}
    .hero-eyebrow{font-size:12px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;opacity:.85;margin-bottom:14px;}
    .hero-title{font-size:clamp(42px,5vw,50px);font-weight:900;line-height:1.15;margin:0 0 14px;letter-spacing:-0.035em;word-break:keep-all;}
    .hero-title strong{color:var(--accent);}
    .hero-sub{font-size:16px;font-weight:500;opacity:.92;max-width:560px;margin:0;}

    /* Search bar */
    .search-wrap{position:relative;z-index:5;margin-top:-44px;margin-bottom:32px;}
    .search-form{
      background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);
      display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr 1fr auto;
      overflow:hidden;
    }
    .sf-field{
      padding:14px 18px;border-right:1px solid var(--line);
      display:flex;flex-direction:column;gap:2px;
    }
    .sf-field:last-of-type{border-right:none;}
    .sf-field label{font-size:11px;font-weight:800;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;}
    .sf-field select, .sf-field input{
      border:none;outline:none;font-size:15px;font-weight:800;color:var(--ink);
      background:transparent;padding:2px 0;width:100%;letter-spacing:-0.01em;
    }
    .search-btn{
      padding:0 32px;background:linear-gradient(135deg,var(--primary),#FF9A6C);color:#fff;
      font-weight:900;font-size:15px;display:inline-flex;align-items:center;justify-content:center;gap:6px;
      transition:background .3s var(--ease), box-shadow .3s var(--ease);
    }
    .search-btn:hover{background:var(--primary-dark);}

    /* Filter strip */
    .filters{
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      padding:14px 0 18px;
    }
    .filters .label{font-size:12px;font-weight:800;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;margin-right:4px;}
    .chip{
      padding:8px 14px;border-radius:var(--radius-pill);background:#fff;border:1.5px solid var(--line);
      font-weight:700;font-size:13px;color:var(--ink-2);transition:transform .3s var(--ease), box-shadow .3s var(--ease), border-color .3s var(--ease), background .3s var(--ease), color .3s var(--ease);cursor:pointer;
      display:inline-flex;align-items:center;gap:6px;
    }
    .chip:hover{border-color:var(--golf);color:var(--golf);}
    .chip.active{background:var(--golf);border-color:var(--golf);color:#fff;}
    .chip .count{
      background:rgba(255,255,255,.25);padding:1px 6px;border-radius:999px;font-size:11px;font-weight:800;
    }
    .chip:not(.active) .count{background:var(--bg-soft);color:var(--ink-3);}

    /* Sort + result count bar */
    .results-bar{
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 0 16px;border-top:1px solid var(--line);
    }
    .result-count{font-size:14px;font-weight:700;color:var(--ink-2);}
    .result-count strong{color:var(--golf);font-weight:900;}
    .sort-select{
      border:1.5px solid var(--line);border-radius:10px;padding:8px 14px;
      background:#fff;font-weight:700;font-size:13px;color:var(--ink);cursor:pointer;
    }
    .sort-select:focus{outline:none;border-color:var(--golf);}

    /* Card grid */
    .grid{display:grid;grid-template-columns:1fr;gap:22px;padding-bottom:72px;}

    .card{
      background:#fff;border-radius:var(--radius-lg);overflow:hidden;
      display:grid;grid-template-columns:320px 1fr auto;gap:0;
      transition:transform .3s var(--ease), box-shadow .3s var(--ease), border-color .3s var(--ease);cursor:pointer;
      border:1px solid var(--line);
      position:relative;
    }
    .card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:transparent;}
    .card:hover .slot-popover{display:block;}

    /* 슬롯 미리보기 popover */
    .slot-popover{
      display:none;position:absolute;top:calc(100% - 6px);left:24px;right:24px;
      background:#1A1A1A;color:#fff;border-radius:12px;padding:14px;
      box-shadow:0 12px 36px rgba(0,0,0,.35);z-index:30;
      animation:slotFadeIn .2s ease;
    }
    @keyframes slotFadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
    .slot-popover::before{
      content:"";position:absolute;top:-8px;left:24px;
      border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:8px solid #1A1A1A;
    }
    .slot-popover-head{
      display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
      font-size:11px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;
    }
    .slot-popover-head .live{color:var(--golf,#0B6E4F);background:#10B981;color:#fff;padding:2px 6px;border-radius:4px;display:inline-flex;align-items:center;gap:4px;}
    .slot-popover-head .live::before{content:"";width:5px;height:5px;border-radius:50%;background:#fff;animation:slotPulse 1s infinite;}
    @keyframes slotPulse{0%,100%{opacity:1;}50%{opacity:.3;}}
    .slot-popover .slots{display:flex;gap:6px;flex-wrap:wrap;}
    .slot-popover .slot{
      padding:6px 12px;background:rgba(255,255,255,.08);border-radius:6px;
      font-size:12px;font-weight:800;color:#fff;font-family:'JetBrains Mono',monospace;
    }
    .slot-popover .slot.full{background:rgba(239,68,68,.18);color:#FCA5A5;text-decoration:line-through;}
    .slot-popover .meta{
      margin-top:8px;padding-top:8px;border-top:1px dashed rgba(255,255,255,.15);
      font-size:11px;color:rgba(255,255,255,.7);display:flex;justify-content:space-between;
    }
    .slot-popover .meta strong{color:#FFD23F;}

    .card-img{
      background-size:cover;background-position:center;background-color:var(--bg-soft);
      position:relative;min-height:240px;
    }
    .card-img .badge{
      position:absolute;top:12px;left:12px;
      padding:5px 11px;border-radius:999px;font-size:11px;font-weight:900;
      letter-spacing:.02em;display:inline-flex;align-items:center;gap:5px;
      box-shadow:0 2px 8px rgba(0,0,0,.18);
    }
    .badge-direct{background:linear-gradient(135deg, var(--golf-dark), var(--golf));color:#fff;}
    .badge-direct::before{content:"⭐";}
    .badge-franchise{background:#fff;color:var(--ink);border:1px solid var(--line);}
    .badge-franchise::before{content:"🤝";}

    .card-body{padding:22px 24px;display:flex;flex-direction:column;gap:8px;min-width:0;}
    .card-country{
      font-size:11px;font-weight:800;color:var(--golf);letter-spacing:.06em;text-transform:uppercase;
      display:inline-flex;align-items:center;gap:4px;
    }
    .card-title{font-size:20px;font-weight:900;color:var(--ink);letter-spacing:-0.035em;margin:0;line-height:1.2;word-break:keep-all;}
    .card-tagline{font-size:13px;color:var(--ink-2);font-weight:500;margin:0 0 4px;}

    .card-specs{
      display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:6px;font-size:13px;
    }
    .spec{display:inline-flex;align-items:center;gap:5px;color:var(--ink-2);font-weight:600;}
    .spec strong{color:var(--ink);font-weight:800;}
    .spec-divider{color:var(--ink-3);}

    .card-includes{
      display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;
    }
    .incl{
      font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;
      background:var(--golf-soft);color:var(--golf-dark);
    }
    .incl.off{background:var(--bg-soft);color:var(--ink-3);text-decoration:line-through;}

    .card-meta{
      display:flex;align-items:center;gap:10px;margin-top:10px;font-size:13px;color:var(--ink-2);
    }
    .rating{
      display:inline-flex;align-items:center;gap:4px;background:var(--primary-soft);color:var(--primary-dark);
      font-weight:900;padding:2px 8px;border-radius:6px;
    }

    .card-side{
      padding:22px 24px;border-left:1px solid var(--line);background:var(--bg-soft);
      display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;gap:12px;
      min-width:200px;
    }
    .price-block{text-align:right;}
    .price-meta{font-size:11px;color:var(--ink-3);font-weight:600;margin-bottom:2px;}
    .price-old{font-size:13px;color:var(--ink-3);text-decoration:line-through;}
    .price-new{font-size:24px;font-weight:900;color:var(--ink);letter-spacing:-0.02em;line-height:1.1;}
    .price-new .unit{font-size:13px;color:var(--ink-2);font-weight:700;margin-left:2px;}
    .price-basis{font-size:11px;color:var(--ink-3);font-weight:600;margin-top:2px;}
    .btn-detail{
      padding:11px 22px;border-radius:var(--radius-sm);background:var(--golf);color:#fff;
      font-weight:900;font-size:14px;width:100%;text-align:center;
      transition:background .3s var(--ease), box-shadow .3s var(--ease);
    }
    .btn-detail:hover{background:var(--golf-dark);}

    /* Empty state */
    .empty{
      text-align:center;padding:80px 20px;color:var(--ink-3);
    }
    .empty .icon{font-size:64px;margin-bottom:16px;}
    .empty .title{font-size:18px;font-weight:800;color:var(--ink-2);margin-bottom:6px;}

    /* Responsive */
    @media (max-width: 980px){
      .gnb{display:none;}
      .header-actions .btn-ai, .header-actions .btn-ghost:not(:last-child){display:none;}
      .hero-title{font-size:32px;}
      .search-form{grid-template-columns:1fr 1fr;}
      .sf-field{border-right:none;border-bottom:1px solid var(--line);}
      .sf-field:nth-child(odd){border-right:1px solid var(--line);}
      .search-btn{grid-column:1 / -1;padding:16px;}
      .card{grid-template-columns:1fr;}
      .card-img{min-height:200px;}
      .card-side{border-left:none;border-top:1px solid var(--line);align-items:stretch;flex-direction:row;justify-content:space-between;align-items:center;}
      .btn-detail{width:auto;}
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">본문 바로가기</a>

  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="오마이트립 홈">
        <span class="logo-mark" aria-hidden="true"></span>
        <span>오마이트립</span>
      </a>
      <nav class="gnb" aria-label="주요 메뉴">
        <a href="golftels.html" class="active">⛳ 골프텔</a>
        <a href="country.html?c=japan">일본</a>
        <a href="country.html?c=vietnam">베트남</a>
        <a href="country.html?c=thailand">태국</a>
        <a href="country.html?c=philippines">필리핀</a>
        <a href="feed.html">▶ 피드</a>
      </nav>
      <div class="header-actions">
        <a href="ai-planner.html" class="btn-ai">AI 플래너</a>
        <a href="mypage.html" class="btn-ghost">마이페이지</a>
      </div>
    </div>
  </header>

  <main id="main">
    <!-- Hero -->
    <section class="hero">
      <div class="container hero-inner">
        <div class="hero-eyebrow">⛳ OhMyTrip · Golftel</div>
        <h1 class="hero-title">골프와 호텔이 하나로,<br/><strong>오마이트립 골프텔</strong></h1>
        <p class="hero-sub">일본·베트남 직영 코스부터 태국·필리핀 파트너 명문 코스까지. 라운딩·픽업·식사·캐디까지 묶어 한 번에 예약.</p>
      </div>
    </section>

    <!-- Search bar -->
    <div class="container search-wrap">
      <form class="search-form" id="searchForm" onsubmit="event.preventDefault(); applyFilters();">
        <div class="sf-field">
          <label for="fCountry">국가</label>
          <select id="fCountry">
            <option value="">전체 국가</option>
            <option value="japan">🗻 일본 (직영)</option>
            <option value="vietnam">🌊 베트남 (직영)</option>
            <option value="thailand">🛕 태국 (파트너)</option>
            <option value="philippines">🏖️ 필리핀 (파트너)</option>
          </select>
        </div>
        <div class="sf-field">
          <label for="fCity">도시</label>
          <select id="fCity">
            <option value="">전체 도시</option>
          </select>
        </div>
        <div class="sf-field">
          <label for="fRounds">라운딩 횟수</label>
          <select id="fRounds">
            <option value="">전체</option>
            <option value="2">2회 이상</option>
            <option value="3">3회 이상</option>
            <option value="4">4회 이상</option>
          </select>
        </div>
        <div class="sf-field">
          <label for="fPrice">1인 가격대</label>
          <select id="fPrice">
            <option value="">전체</option>
            <option value="800000">~ 80만원</option>
            <option value="1200000">~ 120만원</option>
            <option value="1600000">~ 160만원</option>
          </select>
        </div>
        <div class="sf-field">
          <label for="fCheckin">📅 체크인 (선택)</label>
          <input type="date" id="fCheckin" style="border:none;outline:none;font-size:14px;font-weight:800;color:var(--ink);background:transparent;width:100%;font-family:inherit;letter-spacing:-0.01em;" />
        </div>
        <button type="submit" class="search-btn">🔍 검색</button>
      </form>

      <!-- Quick chips -->
      <div class="filters">
        <span class="label">빠른 필터</span>
        <button type="button" class="chip" data-quick="all">전체 <span class="count" id="cntAll">0</span></button>
        <button type="button" class="chip" data-quick="direct">⭐ OMT 직영만 <span class="count" id="cntDirect">0</span></button>
        <button type="button" class="chip" data-quick="franchise">🤝 OMT 파트너 <span class="count" id="cntFranchise">0</span></button>
        <button type="button" class="chip" data-quick="unlimited">무제한 라운딩</button>
        <button type="button" class="chip" data-quick="halfboard">조·석식 포함</button>
        <a href="golftel-builder.html" style="margin-left:auto;padding:8px 16px;border-radius:999px;background:linear-gradient(135deg,var(--golf-dark),var(--golf));color:#fff;font-weight:900;font-size:13px;display:inline-flex;align-items:center;gap:6px;text-decoration:none;box-shadow:0 4px 12px rgba(11,110,79,.25);">🛠️ 직접 조립하기 →</a>
      </div>

      <!-- 상세 필터 (몽키 스타일) -->
      <div class="filters" style="padding-top:0;">
        <span class="label">카트</span>
        <button type="button" class="chip" data-cart="1-1">🚗 1인 1카트</button>
        <button type="button" class="chip" data-cart="2-1">🚗 2인 1카트</button>
        <span class="label" style="margin-left:14px;">시설</span>
        <button type="button" class="chip" data-fac="korean-staff">🇰🇷 한국인 상주</button>
        <button type="button" class="chip" data-fac="pool">🏊 수영장</button>
        <button type="button" class="chip" data-fac="beach">🏖️ 프라이빗 비치</button>
        <button type="button" class="chip" data-fac="shuttle">🚐 셔틀</button>
        <button type="button" class="chip" data-fac="driving-range">🎯 드라이빙 레인지</button>
      </div>
    </div>

    <div class="container">
      <div class="results-bar">
        <div class="result-count">총 <strong id="resCount">0</strong>개의 골프텔</div>
        <select class="sort-select" id="sortSel" onchange="renderList()">
          <option value="recommend">추천순</option>
          <option value="price-asc">가격 낮은순</option>
          <option value="price-desc">가격 높은순</option>
          <option value="rating">평점순</option>
          <option value="rounds">라운딩 많은순</option>
        </select>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </main>

  <script src="data.js"></script>
  <script>
    const D = window.OMT.DATA;
    const fCountry = document.getElementById('fCountry');
    const fCity = document.getElementById('fCity');
    const fRounds = document.getElementById('fRounds');
    const fPrice = document.getElementById('fPrice');
    const sortSel = document.getElementById('sortSel');
    const grid = document.getElementById('grid');
    const resCount = document.getElementById('resCount');

    let quick = 'all';
    let cartFilter = null;     // '1-1' or '2-1'
    let facFilters = new Set(); // 'korean-staff' etc.
    let checkinDate = null;    // 선택 시 카드에 가산률 미리보기 표시
    let workingList = [...D.GOLFTELS];

    // 체크인 → 라운딩별 주말 카운트 → 평균 가산률 계산
    function _previewSurcharge(g){
      if(!checkinDate) return null;
      const N = g.rounds || 0;
      if(!N) return null;
      let weekendCount = 0;
      for(let i=0;i<N;i++){
        const d = new Date(checkinDate); d.setDate(d.getDate() + i);
        if(d.getDay() === 0 || d.getDay() === 6) weekendCount++;
      }
      return { weekendCount, pct: Math.round((weekendCount * 10) / N) };  // 평균 +X%
    }

    // City options bound to country
    function populateCities(){
      const country = fCountry.value;
      const cities = country
        ? [...new Set(D.GOLFTELS.filter(g => g.country === country).map(g => g.city))]
        : [...new Set(D.GOLFTELS.map(g => g.city))];
      fCity.innerHTML = '<option value="">전체 도시</option>' +
        cities.map(c => `<option value="${c}">${c}</option>`).join('');
    }
    fCountry.addEventListener('change', populateCities);

    // 체크인 날짜 바인딩
    const fCheckin = document.getElementById('fCheckin');
    if(fCheckin){
      // 기본 min = 오늘
      const today = new Date();
      fCheckin.min = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      fCheckin.addEventListener('change', () => {
        if(fCheckin.value){
          const [y,m,d] = fCheckin.value.split('-').map(Number);
          checkinDate = new Date(y, m-1, d);
        } else {
          checkinDate = null;
        }
        renderList();
      });
    }

    // Quick chips
    document.querySelectorAll('.chip[data-quick]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.chip[data-quick]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        quick = btn.dataset.quick;
        applyFilters();
      });
    });

    // Cart filter (single-select toggle)
    document.querySelectorAll('.chip[data-cart]').forEach(btn => {
      btn.addEventListener('click', () => {
        const v = btn.dataset.cart;
        if(cartFilter === v){
          cartFilter = null;
          btn.classList.remove('active');
        } else {
          cartFilter = v;
          document.querySelectorAll('.chip[data-cart]').forEach(b => b.classList.toggle('active', b === btn));
        }
        applyFilters();
      });
    });

    // Facility filters (multi-select toggle)
    document.querySelectorAll('.chip[data-fac]').forEach(btn => {
      btn.addEventListener('click', () => {
        const f = btn.dataset.fac;
        if(facFilters.has(f)){
          facFilters.delete(f);
          btn.classList.remove('active');
        } else {
          facFilters.add(f);
          btn.classList.add('active');
        }
        applyFilters();
      });
    });

    function applyFilters(){
      const country = fCountry.value;
      const city = fCity.value;
      const minRounds = fRounds.value ? Number(fRounds.value) : null;
      const maxPrice = fPrice.value ? Number(fPrice.value) : null;

      workingList = D.GOLFTELS.filter(g => {
        if(country && g.country !== country) return false;
        if(city && g.city !== city) return false;
        if(minRounds && g.rounds < minRounds) return false;
        if(maxPrice && g.pricePerPerson > maxPrice) return false;

        const ownership = D.OWNERSHIP[g.country]?.model;
        if(quick === 'direct' && ownership !== 'direct') return false;
        if(quick === 'franchise' && ownership !== 'franchise') return false;
        if(quick === 'unlimited' && !/언리미티드|무제한/.test(g.name)) return false;
        if(quick === 'halfboard' && !(g.inclusions?.breakfast && g.inclusions?.dinner)) return false;

        // 카트 필터
        if(cartFilter === '1-1' && !/1인 1카트/.test(g.cartPolicy || '')) return false;
        if(cartFilter === '2-1' && !/2인 1카트/.test(g.cartPolicy || '')) return false;
        // 시설 필터 (AND — 모든 선택된 시설 보유)
        if(facFilters.size > 0){
          const gFac = new Set(g.facilities || []);
          for(const f of facFilters) if(!gFac.has(f)) return false;
        }
        return true;
      });
      renderList();
      updateCounts();
    }

    function updateCounts(){
      document.getElementById('cntAll').textContent = D.GOLFTELS.length;
      document.getElementById('cntDirect').textContent = D.GOLFTELS.filter(g => D.OWNERSHIP[g.country]?.model === 'direct').length;
      document.getElementById('cntFranchise').textContent = D.GOLFTELS.filter(g => D.OWNERSHIP[g.country]?.model === 'franchise').length;
    }

    function sortList(list){
      const v = sortSel.value;
      const sorted = [...list];
      if(v === 'price-asc')  sorted.sort((a,b) => a.pricePerPerson - b.pricePerPerson);
      if(v === 'price-desc') sorted.sort((a,b) => b.pricePerPerson - a.pricePerPerson);
      if(v === 'rating')     sorted.sort((a,b) => b.rating - a.rating);
      if(v === 'rounds')     sorted.sort((a,b) => b.rounds - a.rounds);
      if(v === 'recommend'){
        // 직영 + 평점 가중치
        sorted.sort((a,b) => {
          const aDirect = D.OWNERSHIP[a.country]?.model === 'direct' ? 1 : 0;
          const bDirect = D.OWNERSHIP[b.country]?.model === 'direct' ? 1 : 0;
          if(aDirect !== bDirect) return bDirect - aDirect;
          return b.rating - a.rating;
        });
      }
      return sorted;
    }

    function renderList(){
      const list = sortList(workingList);
      resCount.textContent = list.length;

      if(list.length === 0){
        grid.innerHTML = `
          <div class="empty">
            <div class="icon">⛳</div>
            <div class="title">조건에 맞는 골프텔이 없습니다</div>
            <div>필터를 줄이거나 다른 국가를 선택해보세요.</div>
          </div>`;
        return;
      }

      grid.innerHTML = list.map(g => {
        const own = D.OWNERSHIP[g.country] || {};
        const country = D.COUNTRIES[g.country] || {};
        const inc = g.inclusions || {};
        const courses = (g.courseIds || []).map(id => D.GOLF_COURSES.find(c => c.id === id)).filter(Boolean);
        const courseName = courses[0]?.name || '명문 코스';
        const moreCourses = courses.length > 1 ? ` 외 ${courses.length - 1}개` : '';
        const badge = own.model === 'direct'
          ? `<span class="badge badge-direct">OMT 직영</span>`
          : `<span class="badge badge-franchise">OMT 파트너</span>`;

        const incChip = (label, on) => `<span class="incl ${on ? '' : 'off'}">${label}</span>`;

        // 슬롯 미리보기 (mock — 시드 기반 결정적 가용/완판 분포)
        const seed = g.id.split('').reduce((a,c) => a + c.charCodeAt(0), 0);
        const SLOT_TIMES = ['06:00','06:30','07:00','07:30','08:00','08:30','11:00','11:30','14:00'];
        const slotHtml = SLOT_TIMES.slice(0, 6).map((t, i) => {
          const isFull = (seed + i) % 5 === 0;   // 약 20% 완판
          return `<span class="slot${isFull ? ' full' : ''}">${t}</span>`;
        }).join('');
        const todayBookings = (seed % 7) + 12;   // 12~18건 mock
        const realtime = courses[0]?.realTimeBooking !== false;

        return `
          <article class="card" onclick="location.href='golftel.html?id=${g.id}'">
            <div class="card-img" style="background-image:url('${g.images?.[0] || ''}')">
              ${badge}
            </div>
            <div class="card-body">
              <div class="card-country">${country.name || g.country} · ${g.city}</div>
              <h2 class="card-title">${g.name}</h2>
              <p class="card-tagline">${g.tagline || ''}</p>
              <div class="card-specs">
                <span class="spec">🏨 <strong>${g.nights}박</strong></span>
                <span class="spec-divider">·</span>
                <span class="spec">⛳ <strong>${g.rounds}라운딩</strong></span>
                <span class="spec-divider">·</span>
                <span class="spec">📍 ${courseName}${moreCourses}</span>
              </div>
              <div class="card-includes">
                ${incChip('그린피', inc.greenFee)}
                ${incChip('카트', inc.cartFee)}
                ${incChip('캐디', inc.caddyFee)}
                ${incChip('픽업', inc.airportPickup)}
                ${incChip('셔틀', inc.golfShuttle)}
                ${incChip('조식', inc.breakfast)}
                ${incChip('석식', inc.dinner)}
              </div>
              <div class="card-meta">
                <span class="rating">★ ${(g.reviewStats?.rating || g.rating/2).toFixed(1)}</span>
                <span>리뷰 ${(g.reviewStats?.count || g.reviews || 0).toLocaleString('ko-KR')}건</span>
                <span>· ${g.hotelName}</span>
                ${g.cartPolicy ? `<span style="color:var(--ink-3);">· 🚗 ${g.cartPolicy}</span>` : ''}
                ${(g.facilities || []).includes('korean-staff') ? `<span style="padding:1px 6px;background:#FEF3C7;color:#92400E;border-radius:4px;font-weight:800;font-size:11px;">🇰🇷 한국인 상주</span>` : ''}
              </div>
              ${(g.reviewStats?.positives || []).length ? `
                <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;">
                  <span style="font-size:11px;font-weight:800;color:var(--ink-3);margin-right:4px;align-self:center;">👍</span>
                  ${(g.reviewStats.positives || []).slice(0, 3).map(p => `
                    <span style="display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:6px;background:var(--golf-soft);color:var(--golf-dark);font-size:11px;font-weight:700;">
                      ${p.tag} <span style="font-weight:900;">${p.n}</span>
                    </span>
                  `).join('')}
                </div>
              ` : ''}
            </div>
            <div class="card-side">
              <div class="price-block">
                <div class="price-meta">2인 1실 기준</div>
                ${g.oldPricePerPerson ? `<div class="price-old">${g.oldPricePerPerson.toLocaleString('ko-KR')}원</div>` : ''}
                <div class="price-new">${g.pricePerPerson.toLocaleString('ko-KR')}<span class="unit">원~</span></div>
                <div class="price-basis">1인 가격 · 항공 별도</div>
                ${(() => {
                  const pv = _previewSurcharge(g);
                  if(!pv) return '';
                  if(pv.pct === 0) return `<div style="margin-top:6px;padding:4px 8px;background:#E0F2FE;color:#0369A1;font-size:10px;font-weight:900;border-radius:5px;text-align:center;">✓ 전 라운딩 주중</div>`;
                  return `<div style="margin-top:6px;padding:4px 8px;background:#FEE2E2;color:#B91C1C;font-size:10px;font-weight:900;border-radius:5px;text-align:center;">⚠️ 주말 ${pv.weekendCount}회 · +${pv.pct}% 예상</div>`;
                })()}
              </div>
              <div style="display:flex;gap:6px;align-items:center;">
                <a href="golftel.html?id=${g.id}" class="btn-detail" onclick="event.stopPropagation();" style="flex:1;text-align:center;">자세히 보기</a>
                <a href="group-booking.html?golftelId=${g.id}" onclick="event.stopPropagation();" title="4인+ 단체 견적" style="padding:8px 12px;background:linear-gradient(135deg,#FF6B35,#FFD23F);color:#fff;border-radius:6px;font-size:11px;font-weight:900;text-decoration:none;white-space:nowrap;letter-spacing:.02em;">👥 단체 견적</a>
              </div>
            </div>
            <!-- 슬롯 미리보기 (hover popover) -->
            <div class="slot-popover">
              <div class="slot-popover-head">
                <span>🕐 오늘 가용 티오프</span>
                ${realtime ? '<span class="live">⚡ 실시간</span>' : '<span class="live" style="background:#F59E0B;">⏱ 견적 24h</span>'}
              </div>
              <div class="slots">${slotHtml}</div>
              <div class="meta">
                <span>완판은 취소선</span>
                <span><strong>${todayBookings}</strong>건 오늘 예약 중</span>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    // Initial render
    function init(){
      // Read URL params (?c=japan)
      const params = new URLSearchParams(location.search);
      const c = params.get('c') || params.get('country');
      if(c && D.COUNTRIES[c]){ fCountry.value = c; }
      populateCities();
      document.querySelector('.chip[data-quick="all"]').classList.add('active');
      applyFilters();
    }
    init();
  </script>
</body>
</html>
