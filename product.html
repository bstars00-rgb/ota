<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상품 상세 | 오마이트립</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#FF6B35;--primary-dark:#E85826;--primary-soft:#FFF0E8;--secondary:#1E88E5;--accent:#FFD23F;--success:#10B981;--danger:#EF4444;--ink:#1A1A1A;--ink-2:#4B5563;--ink-3:#9CA3AF;--line:#E5E7EB;--bg:#fff;--bg-soft:#F7F7F9;--radius:14px;--radius-lg:20px;--shadow:0 6px 20px rgba(0,0,0,.08);--header-h:64px;--max-w:1200px;}
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{font-family:'Noto Sans KR',-apple-system,sans-serif;color:var(--ink);background:var(--bg-soft);line-height:1.55;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none;}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
    .container{max-width:var(--max-w);margin:0 auto;padding:0 24px;}
    .skip-link{position:absolute;left:-9999px;top:0;padding:10px 16px;background:#1A1A1A;color:#fff;z-index:999;font-weight:700;font-size:13px;border-radius:0 0 8px 0;}
    .skip-link:focus{left:0;}

    .header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
    .header-inner{height:var(--header-h);display:flex;align-items:center;gap:16px;}
    .logo{display:inline-flex;align-items:center;gap:8px;font-weight:900;font-size:18px;color:var(--ink);}
    .logo-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#FF9A6C);color:#fff;display:grid;place-items:center;font-weight:900;font-size:16px;}
    .logo-mark::after{content:"O";}
    .header-actions{margin-left:auto;display:flex;gap:6px;align-items:center;}
    .btn-ghost{padding:8px 14px;border-radius:10px;font-weight:600;font-size:13px;color:var(--ink-2);position:relative;}
    .btn-ghost:hover{background:var(--bg-soft);color:var(--ink);}
    .cart-badge{position:absolute;top:2px;right:2px;min-width:18px;height:18px;border-radius:999px;background:var(--primary);color:#fff;font-size:10px;font-weight:900;padding:0 5px;display:grid;place-items:center;}

    .breadcrumb{padding:14px 0;font-size:13px;color:var(--ink-3);border-bottom:1px solid var(--line);background:#fff;}
    .breadcrumb .sep{margin:0 8px;}
    .breadcrumb a:hover{color:var(--primary);}

    .gallery{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:repeat(2,220px);gap:6px;margin:20px auto;padding:0 24px;max-width:var(--max-w);border-radius:var(--radius-lg);overflow:hidden;}
    .gallery > div{background-size:cover;background-position:center;background-color:#eee;cursor:pointer;transition:filter .15s;}
    .gallery > div:hover{filter:brightness(.92);}
    .gallery .g-main{grid-row:1/span 2;}

    .detail-layout{display:grid;grid-template-columns:1fr 380px;gap:24px;padding:0 24px 80px;max-width:var(--max-w);margin:0 auto;align-items:flex-start;}

    .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px;}
    .product-head{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;align-items:center;}
    .tag{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:800;background:var(--primary-soft);color:var(--primary);}
    .tag.orig{background:linear-gradient(135deg,var(--primary),#FF9A6C);color:#fff;}
    .tag.country{background:var(--secondary);color:#fff;}
    .heart-btn{margin-left:auto;width:36px;height:36px;border-radius:50%;background:var(--bg-soft);display:grid;place-items:center;font-size:18px;color:var(--ink-3);transition:all .15s;}
    .heart-btn:hover{background:#FEE;color:#E63946;}
    .heart-btn.active{background:#FEE;color:#E63946;}
    .p-title{margin:0 0 6px;font-size:26px;font-weight:900;letter-spacing:-0.02em;}
    .p-sub{margin:0 0 14px;color:var(--ink-2);font-size:14px;}
    .p-stats{display:flex;gap:16px;align-items:center;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);flex-wrap:wrap;}
    .p-stat{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-2);}
    .p-stat .v{font-weight:800;color:var(--ink);font-size:14px;}
    .p-score-badge{padding:4px 10px;background:var(--primary);color:#fff;border-radius:6px;font-weight:900;font-size:13px;}

    .detail-tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:20px;overflow-x:auto;}
    .detail-tabs::-webkit-scrollbar{display:none;}
    .dt-tab{padding:12px 18px;font-weight:700;font-size:14px;color:var(--ink-3);position:relative;white-space:nowrap;}
    .dt-tab.active{color:var(--primary);}
    .dt-tab.active::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:3px;background:var(--primary);border-radius:3px 3px 0 0;}

    .section-h{font-size:18px;font-weight:900;margin:0 0 14px;letter-spacing:-0.02em;}
    .section-h .sub{font-size:12px;color:var(--ink-3);font-weight:600;margin-left:8px;}

    .sched{display:flex;flex-direction:column;gap:14px;}
    .sched-day{display:grid;grid-template-columns:80px 1fr;gap:14px;}
    .sched-label{font-weight:900;font-size:13px;color:var(--primary);padding-top:4px;}
    .sched-body{display:flex;flex-direction:column;gap:8px;}
    .sched-item{display:flex;gap:12px;padding:12px 14px;background:var(--bg-soft);border-radius:10px;font-size:13px;}
    .sched-item .ic{font-size:18px;flex-shrink:0;}

    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
    .inc-list,.exc-list{display:flex;flex-direction:column;gap:6px;font-size:13px;}
    .inc-list li,.exc-list li{display:flex;gap:8px;padding:4px 0;}
    .inc-list li::before{content:"✓";color:var(--success);font-weight:900;}
    .exc-list li::before{content:"✕";color:var(--ink-3);font-weight:900;}

    .review-summary{display:grid;grid-template-columns:auto 1fr;gap:20px;padding:16px;background:var(--bg-soft);border-radius:12px;margin-bottom:16px;}
    .rs-score{text-align:center;}
    .rs-score .big{font-size:40px;font-weight:900;color:var(--primary);line-height:1;letter-spacing:-0.04em;}
    .rs-score .lbl{font-size:12px;color:var(--ink-3);margin-top:4px;}
    .rs-stars{color:var(--accent);letter-spacing:3px;font-size:14px;}
    .rs-bars{display:flex;flex-direction:column;gap:8px;}
    .rs-bar{display:grid;grid-template-columns:60px 1fr 40px;gap:10px;align-items:center;font-size:12px;}
    .rs-bar-track{height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
    .rs-bar-fill{height:100%;background:var(--primary);}

    .review-list{display:flex;flex-direction:column;gap:12px;}
    .review{padding:14px;border:1px solid var(--line);border-radius:12px;}
    .rv-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
    .rv-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;display:grid;place-items:center;font-weight:900;font-size:13px;}
    .rv-name{font-weight:800;font-size:13px;}
    .rv-meta{font-size:11px;color:var(--ink-3);}
    .rv-score{margin-left:auto;padding:3px 8px;background:var(--primary);color:#fff;border-radius:5px;font-weight:900;font-size:12px;}
    .rv-text{font-size:13px;color:var(--ink-2);margin:0;line-height:1.6;}

    .book-panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);padding:22px;position:sticky;top:calc(var(--header-h) + 16px);}
    .bp-price-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
    .bp-lb{font-size:12px;color:var(--ink-3);}
    .bp-old{font-size:13px;color:var(--ink-3);text-decoration:line-through;}
    .bp-price{font-size:32px;font-weight:900;color:var(--primary);letter-spacing:-0.02em;}
    .bp-price small{font-size:13px;font-weight:600;color:var(--ink-2);}
    .bp-tag{display:inline-block;padding:3px 8px;background:#FEE4DC;color:var(--primary-dark);font-size:11px;font-weight:800;border-radius:5px;margin-top:6px;}
    .bp-field{margin-top:14px;}
    .bp-field label{display:block;font-size:11px;font-weight:800;color:var(--ink-2);margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase;}
    .bp-field input,.bp-field select{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-weight:700;color:var(--ink);background:#fff;outline:none;}
    .pax-steppers{display:flex;gap:8px;}
    .pax-stepper{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:9px 10px;}
    .ps-top{font-size:11px;color:var(--ink-3);font-weight:700;}
    .ps-ctrl{display:flex;justify-content:space-between;align-items:center;margin-top:3px;}
    .ps-btn{width:24px;height:24px;border-radius:50%;background:var(--bg-soft);display:grid;place-items:center;font-weight:900;font-size:13px;}
    .ps-btn:disabled{color:var(--ink-3);cursor:not-allowed;}
    .ps-val{font-weight:900;font-size:14px;}
    .bp-total{display:flex;justify-content:space-between;align-items:baseline;margin-top:16px;padding:14px;background:var(--ink);color:#fff;border-radius:10px;}
    .bp-total .lb{font-size:12px;opacity:.7;}
    .bp-total .pr{font-size:22px;font-weight:900;color:var(--accent);letter-spacing:-0.02em;}
    .bp-cta{width:100%;padding:15px;border-radius:12px;background:var(--primary);color:#fff;font-weight:900;font-size:15px;margin-top:12px;box-shadow:0 6px 20px rgba(255,107,53,.35);}
    .bp-cta:hover{background:var(--primary-dark);}
    .bp-cart{width:100%;padding:12px;border-radius:12px;background:#fff;border:1.5px solid var(--line);color:var(--ink);font-weight:800;font-size:13px;margin-top:8px;}
    .bp-cart:hover{border-color:var(--primary);color:var(--primary);}
    .bp-trust{margin-top:14px;display:flex;flex-direction:column;gap:6px;font-size:11px;color:var(--ink-3);list-style:none;padding:14px 0 0;}
    .bp-trust li::before{content:"✓ ";color:var(--success);font-weight:900;}

    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(100px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-weight:700;font-size:14px;z-index:100;transition:transform .3s;pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,.25);}
    .toast.show{transform:translateX(-50%) translateY(0);}

    @media (max-width:1024px){
      .detail-layout{grid-template-columns:1fr;}
      .book-panel{position:static;}
      .gallery{grid-template-columns:1fr 1fr;grid-template-rows:200px 150px 150px;}
      .gallery .g-main{grid-row:1;grid-column:1/-1;}
      .two-col{grid-template-columns:1fr;}
    }
    @media (max-width:768px){
      :root{--header-h:56px;}
      .gallery{grid-template-columns:1fr;grid-template-rows:240px;margin:0;padding:0;border-radius:0;}
      .gallery > div:not(.g-main){display:none;}
      .card{padding:18px;border-radius:var(--radius);}
      .p-title{font-size:20px;}
      .detail-layout{padding:0 14px 100px;gap:14px;}
      .bp-price{font-size:24px;}
      .mobile-book-bar{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:55;background:#fff;border-top:1px solid var(--line);padding:12px 14px calc(12px + env(safe-area-inset-bottom));align-items:center;gap:10px;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
      .mobile-book-bar .info{flex:1;}
      .mobile-book-bar .info .lb{font-size:10px;color:var(--ink-3);font-weight:700;}
      .mobile-book-bar .info .pr{font-size:18px;font-weight:900;color:var(--primary);letter-spacing:-0.02em;}
      .mobile-book-bar button{padding:13px 22px;background:var(--primary);color:#fff;border-radius:10px;font-weight:900;font-size:14px;}
    }
    .mobile-book-bar{display:none;}
  </style>
</head>
<body>
  <a class="skip-link" href="#omt-main">본문 바로가기</a>

  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-mark"></span><span>오마이트립</span></a>
      <div class="header-actions">
        <a href="cart.html" class="btn-ghost" id="cartLink">🛒 장바구니</a>
        <a href="ai-planner.html" class="btn-ghost">✦ AI</a>
        <a href="mypage.html" class="btn-ghost">MY</a>
      </div>
    </div>
  </header>

  <div class="breadcrumb">
    <div class="container" id="breadcrumbBody"></div>
  </div>

  <div class="gallery" id="gallery"></div>

  <main id="omt-main" class="detail-layout">
    <section>
      <div class="card">
        <div class="product-head" id="productHead"></div>
        <h1 class="p-title" id="productTitle"></h1>
        <p class="p-sub" id="productSub"></p>
        <div class="p-stats" id="productStats"></div>
      </div>

      <div class="card">
        <div class="detail-tabs" role="tablist">
          <button class="dt-tab active" data-tab="schedule">일정</button>
          <button class="dt-tab" data-tab="includes">포함/불포함</button>
          <button class="dt-tab" data-tab="info">상세 정보</button>
          <button class="dt-tab" data-tab="reviews">리뷰 <span id="reviewCountBadge"></span></button>
          <button class="dt-tab" data-tab="refund">취소/환불</button>
        </div>

        <div class="tab-panel" data-panel="schedule" id="panelSchedule"></div>
        <div class="tab-panel" data-panel="includes" hidden id="panelIncludes"></div>
        <div class="tab-panel" data-panel="info" hidden id="panelInfo"></div>
        <div class="tab-panel" data-panel="reviews" hidden id="panelReviews"></div>
        <div class="tab-panel" data-panel="refund" hidden>
          <h2 class="section-h">취소 및 환불 규정</h2>
          <table style="width:100%;border-collapse:collapse;font-size:13px;">
            <thead><tr style="background:var(--bg-soft);"><th style="padding:10px;text-align:left;font-weight:800;">취소 시점</th><th style="padding:10px;text-align:right;font-weight:800;">환불율</th></tr></thead>
            <tbody>
              <tr style="border-bottom:1px solid var(--line);"><td style="padding:10px;">출발 30일 전</td><td style="padding:10px;text-align:right;color:var(--success);font-weight:800;">100%</td></tr>
              <tr style="border-bottom:1px solid var(--line);"><td style="padding:10px;">출발 21일 전</td><td style="padding:10px;text-align:right;font-weight:800;">90%</td></tr>
              <tr style="border-bottom:1px solid var(--line);"><td style="padding:10px;">출발 14일 전</td><td style="padding:10px;text-align:right;font-weight:800;">70%</td></tr>
              <tr style="border-bottom:1px solid var(--line);"><td style="padding:10px;">출발 7일 전</td><td style="padding:10px;text-align:right;font-weight:800;">50%</td></tr>
              <tr><td style="padding:10px;">출발 3일 전 이내</td><td style="padding:10px;text-align:right;color:var(--primary);font-weight:800;">환불 불가</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <aside class="book-panel" id="bookPanel"></aside>
  </main>

  <div class="mobile-book-bar" id="mobileBookBar"></div>

  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script src="state.js"></script>
  <script>
  /* ==========================================================================
     URL param → load product
     ========================================================================== */
  const params = new URLSearchParams(location.search);
  const productId = params.get('id') || 'prod-jp-01';
  const product = OMT.getProduct(productId);

  if(!product){
    document.body.innerHTML = `<div style="padding:80px;text-align:center;font-family:'Noto Sans KR';">
      <h1>상품을 찾을 수 없습니다</h1>
      <p>ID: ${productId}</p>
      <a href="index.html" style="color:#FF6B35;font-weight:700;">→ 홈으로</a>
    </div>`;
    throw new Error('Product not found');
  }

  // Track recently viewed
  OMT.State.addRecentlyViewed(productId);

  const country = OMT.DATA.COUNTRIES[product.country];
  const city = product.city;
  const paxState = { adults: 2, children: 0 };
  const toast = (msg) => {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  };

  /* ==========================================================================
     RENDER
     ========================================================================== */
  function renderBreadcrumb(){
    document.getElementById('breadcrumbBody').innerHTML = `
      <a href="index.html">홈</a><span class="sep">›</span>
      <a href="country.html?c=${product.country}">${country.flag} ${country.name.replace('한국인의 ','')}</a><span class="sep">›</span>
      <a href="hotels.html?country=${product.country}">${product.category === 'package' ? '패키지' : '상품'}</a><span class="sep">›</span>
      <span style="color:var(--ink);font-weight:600;">${product.name}</span>
    `;
  }

  function renderGallery(){
    const images = product.images && product.images.length ? product.images : ['https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?auto=format&fit=crop&w=1600&q=80'];
    const padded = [...images];
    while(padded.length < 5) padded.push(images[0]);
    document.getElementById('gallery').innerHTML = `
      <div class="g-main" style="background-image:url('${padded[0]}')"></div>
      <div style="background-image:url('${padded[1]}')"></div>
      <div style="background-image:url('${padded[2]}')"></div>
      <div style="background-image:url('${padded[3]}')"></div>
      <div style="background-image:url('${padded[4]}')"></div>
    `;
  }

  function renderHead(){
    const wished = OMT.State.isWished(product.id);
    document.getElementById('productHead').innerHTML = `
      ${product.directRun ? '<span class="tag orig" style="background:linear-gradient(135deg,var(--primary),#FF9A6C);">🏠 OMT 직영</span>' : (product.originalFlag ? '<span class="tag orig">ORIGINAL</span>' : '')}
      <span class="tag country">${country.flag} ${country.name.replace('한국인의 ','')}</span>
      <span class="tag">${product.category === 'package' ? '패키지' : product.category}</span>
      <button class="heart-btn ${wished?'active':''}" onclick="toggleHeart()" aria-label="찜하기">${wished?'❤️':'🤍'}</button>
    `;
    document.getElementById('productTitle').textContent = product.name;
    document.getElementById('productSub').textContent = product.subtitle || '';

    const reviews = OMT.State.getReviewsForProduct(product.id);
    const liveCount = Math.floor(Math.random() * 1500) + 200;
    document.getElementById('productStats').innerHTML = `
      <span class="p-stat"><span class="p-score-badge">${product.score}</span><span class="v">${product.score >= 9 ? '매우 좋음' : '좋음'}</span></span>
      <span class="p-stat">리뷰 <span class="v">${reviews.length}개</span></span>
      <span class="p-stat">${product.nights}박 ${product.nights+1}일</span>
      <span class="p-stat">지금 <span class="v" style="color:var(--primary);">${liveCount.toLocaleString('ko-KR')}명이 보는 중</span></span>
    `;
    document.getElementById('reviewCountBadge').textContent = '(' + reviews.length + ')';
  }

  function renderSchedule(){
    const it = product.itinerary && product.itinerary.length ? product.itinerary : [
      { day:1, label:'도착', items:[{icon:'✈️',title:'출국',desc:'항공편 출발'},{icon:'🏨',title:'호텔 체크인'}] },
      { day:2, label:'자유여행', items:[{icon:'🗓️',title:'자유 일정',desc:'포함된 액티비티 이용 또는 자유 관광'}] }
    ];
    document.getElementById('panelSchedule').innerHTML = `
      <h2 class="section-h">여행 일정 <span class="sub">${product.nights}박 ${product.nights+1}일</span></h2>
      <div class="sched">
        ${it.map(d => `
          <div class="sched-day">
            <div class="sched-label">DAY ${d.day}<br><small style="color:var(--ink-3);font-weight:600;font-size:11px;">${d.label}</small></div>
            <div class="sched-body">
              ${d.items.map(i => `<div class="sched-item"><span class="ic">${i.icon}</span><div><strong>${i.title}</strong>${i.desc?'<br>'+i.desc:''}</div></div>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function renderIncludes(){
    const incs = product.includes || [];
    const excs = product.excludes || ['중식/석식','개인 쇼핑','옵션 투어'];
    document.getElementById('panelIncludes').innerHTML = `
      <h2 class="section-h">포함 / 불포함</h2>
      <div class="two-col">
        <div><h3 style="font-size:14px;margin:0 0 10px;color:var(--success);">✓ 포함 사항</h3>
          <ul class="inc-list" style="padding:0;list-style:none;">${incs.map(i => `<li>${i}</li>`).join('')}</ul></div>
        <div><h3 style="font-size:14px;margin:0 0 10px;color:var(--ink-3);">✕ 불포함 사항</h3>
          <ul class="exc-list" style="padding:0;list-style:none;">${excs.map(i => `<li>${i}</li>`).join('')}</ul></div>
      </div>
    `;
  }

  function renderInfo(){
    document.getElementById('panelInfo').innerHTML = `
      <h2 class="section-h">상세 정보</h2>
      <p style="font-size:14px;color:var(--ink-2);line-height:1.7;">${product.description || '상세 설명이 곧 업데이트됩니다.'}</p>
      <h3 style="font-size:14px;margin:20px 0 8px;">✦ 이 상품 이런 분께 추천합니다</h3>
      <ul style="padding-left:18px;font-size:13px;color:var(--ink-2);">
        <li>${country.name.replace('한국인의 ','')} 여행이 처음인 분</li>
        <li>편하고 알찬 일정을 선호하시는 분</li>
        <li>가성비와 품질을 모두 원하시는 분</li>
      </ul>
      <h3 style="font-size:14px;margin:20px 0 8px;">✦ 유의사항</h3>
      <ul style="padding-left:18px;font-size:13px;color:var(--ink-2);">
        <li>여권 유효기간 6개월 이상 필수</li>
        <li>항공권 발권 후 이름 변경 불가</li>
        <li>호텔 체크인 15:00 / 체크아웃 11:00</li>
      </ul>
    `;
  }

  function renderReviews(){
    const reviews = OMT.State.getReviewsForProduct(product.id);
    const avg = reviews.length ? (reviews.reduce((s,r)=>s+r.score, 0) / reviews.length).toFixed(1) : product.score;
    document.getElementById('panelReviews').innerHTML = `
      <h2 class="section-h">고객 리뷰 <span class="sub">${reviews.length}개</span></h2>
      <div class="review-summary">
        <div class="rs-score">
          <div class="big">${avg}</div>
          <div class="rs-stars">★★★★★</div>
          <div class="lbl">${avg >= 9 ? '매우 좋음' : '좋음'}</div>
        </div>
        <div class="rs-bars">
          <div class="rs-bar"><span>위치</span><span class="rs-bar-track"><span class="rs-bar-fill" style="width:96%;"></span></span><span>9.6</span></div>
          <div class="rs-bar"><span>청결도</span><span class="rs-bar-track"><span class="rs-bar-fill" style="width:94%;"></span></span><span>9.4</span></div>
          <div class="rs-bar"><span>시설</span><span class="rs-bar-track"><span class="rs-bar-fill" style="width:91%;"></span></span><span>9.1</span></div>
          <div class="rs-bar"><span>가성비</span><span class="rs-bar-track"><span class="rs-bar-fill" style="width:89%;"></span></span><span>8.9</span></div>
          <div class="rs-bar"><span>서비스</span><span class="rs-bar-track"><span class="rs-bar-fill" style="width:95%;"></span></span><span>9.5</span></div>
        </div>
      </div>
      <div class="review-list">
        ${reviews.slice(0,5).map(r => `
          <div class="review">
            <div class="rv-head">
              <div class="rv-av">${r.userInitial}</div>
              <div><div class="rv-name">${r.userName}</div><div class="rv-meta">${r.date} · ${r.travelType||'여행'} · ${r.duration||''}</div></div>
              <span class="rv-score">${r.score}</span>
            </div>
            <p class="rv-text">${r.text}</p>
          </div>
        `).join('') || `<div style="padding:40px;text-align:center;color:var(--ink-3);background:var(--bg-soft);border-radius:12px;">아직 리뷰가 없어요. 첫 리뷰를 남겨주세요!</div>`}
      </div>
    `;
  }

  function renderBookPanel(){
    const priceFmt = OMT.krw(product.price);
    document.getElementById('bookPanel').innerHTML = `
      <div class="bp-price-row"><span class="bp-lb">1인 최저가</span><span class="bp-old">${OMT.krw(product.oldPrice)}</span></div>
      <div class="bp-price">${priceFmt}<small>~</small></div>
      <span class="bp-tag">${Math.round((1 - product.price/product.oldPrice)*100)}% 할인${product.directRun?' · OMT 직영 최저가':(product.originalFlag?' · 단독 특가':'')}</span>

      <div class="bp-field"><label>출발 날짜</label>
        <select id="bpDate">
          <option>2026.05.10 (금)</option>
          <option>2026.05.17 (금)</option>
          <option>2026.05.24 (금)</option>
          <option>2026.06.07 (금)</option>
          <option>2026.06.14 (금)</option>
        </select>
      </div>

      <div class="bp-field"><label>인원 선택</label>
        <div class="pax-steppers">
          <div class="pax-stepper">
            <div class="ps-top">성인</div>
            <div class="ps-ctrl"><button class="ps-btn" onclick="stepPax('adults',-1)">−</button><span class="ps-val" id="adultVal">2</span><button class="ps-btn" onclick="stepPax('adults',1)">+</button></div>
          </div>
          <div class="pax-stepper">
            <div class="ps-top">아동</div>
            <div class="ps-ctrl"><button class="ps-btn" onclick="stepPax('children',-1)">−</button><span class="ps-val" id="childVal">0</span><button class="ps-btn" onclick="stepPax('children',1)">+</button></div>
          </div>
        </div>
      </div>

      <div class="bp-total">
        <div><div class="lb">총 결제 금액</div><div style="font-size:11px;opacity:.6;" id="paxSum">성인 2명</div></div>
        <div class="pr" id="bpTotal">${OMT.krw(product.price*2)}</div>
      </div>

      <button class="bp-cta" onclick="bookNow()">바로 예약하기 →</button>
      <button class="bp-cart" onclick="addToCart()">🛒 장바구니 담기</button>

      <ul class="bp-trust"><li>오마이트립 신뢰 보장</li><li>출발 30일 전 무료 취소</li><li>24시간 한국어 카카오 상담</li></ul>
    `;
  }

  function renderMobileBar(){
    document.getElementById('mobileBookBar').innerHTML = `
      <div class="info"><div class="lb">1인부터</div><div class="pr">${OMT.krw(product.price)}~</div></div>
      <button onclick="bookNow()">예약하기 →</button>
    `;
  }

  /* ==========================================================================
     INTERACTIONS
     ========================================================================== */
  function computeTotal(){
    return product.price * paxState.adults + Math.round(product.price * 0.7) * paxState.children;
  }
  function updatePaxUI(){
    document.getElementById('adultVal').textContent = paxState.adults;
    document.getElementById('childVal').textContent = paxState.children;
    const sum = `성인 ${paxState.adults}명${paxState.children>0?' + 아동 '+paxState.children+'명':''}`;
    document.getElementById('paxSum').textContent = sum;
    document.getElementById('bpTotal').textContent = OMT.krw(computeTotal());
  }
  window.stepPax = (key, delta) => {
    if(key === 'adults') paxState.adults = Math.max(1, Math.min(9, paxState.adults + delta));
    else paxState.children = Math.max(0, Math.min(6, paxState.children + delta));
    updatePaxUI();
  };

  window.toggleHeart = () => {
    OMT.State.toggleWishlist(product.id);
    renderHead();
    toast(OMT.State.isWished(product.id) ? '찜 목록에 추가됨 ❤️' : '찜 목록에서 제거됨');
  };

  window.bookNow = () => {
    const payload = OMT.productAsPackage(product.id, paxState.adults + paxState.children, document.getElementById('bpDate').value);
    payload.final = computeTotal();
    payload.source = 'product-detail';
    payload.paxCount = paxState.adults + paxState.children;
    sessionStorage.setItem('omt_package', JSON.stringify(payload));
    location.href = 'checkout.html';
  };

  window.addToCart = () => {
    OMT.State.addToCart({
      productId: product.id,
      type: product.originalFlag ? 'ORIGINAL' : (product.category === 'package' ? '패키지' : '상품'),
      orig: !!product.originalFlag,
      img: product.images?.[0],
      name: product.name,
      sub: product.subtitle,
      dates: document.getElementById('bpDate').value,
      pax: `성인 ${paxState.adults}명${paxState.children>0?' + 아동 '+paxState.children+'명':''}`,
      paxCount: paxState.adults + paxState.children,
      price: computeTotal()
    });
    updateCartBadge();
    toast('🛒 장바구니에 담았어요');
  };

  function updateCartBadge(){
    const count = OMT.State.cartCount();
    const link = document.getElementById('cartLink');
    if(!link) return;
    let badge = link.querySelector('.cart-badge');
    if(count > 0){
      if(!badge){ badge = document.createElement('span'); badge.className='cart-badge'; link.appendChild(badge); }
      badge.textContent = count;
    } else if(badge){ badge.remove(); }
  }

  /* Tab switching */
  document.querySelectorAll('.dt-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.dt-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p => p.hidden = p.dataset.panel !== btn.dataset.tab);
    });
  });

  /* INIT */
  renderBreadcrumb();
  renderGallery();
  renderHead();
  renderSchedule();
  renderIncludes();
  renderInfo();
  renderReviews();
  renderBookPanel();
  renderMobileBar();
  updateCartBadge();
  updatePaxUI();
  </script>
</body>
</html>
