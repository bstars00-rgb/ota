<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="description" content="오마이AI - 항공부터 액티비티까지, AI가 완벽한 여행을 설계해드려요" />
  <title>오마이AI | 오마이트립</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* =========================================
       Design Tokens (shared)
       ========================================= */
    :root{
      --primary: #FF6B35;
      --primary-dark: #E85826;
      --primary-soft: #FFF0E8;
      --secondary: #1E88E5;
      --secondary-soft: #E3F2FD;
      --accent: #FFD23F;
      --ink: #1A1A1A;
      --ink-2: #4B5563;
      --ink-3: #9CA3AF;
      --line: #E5E7EB;
      --bg: #FFFFFF;
      --bg-soft: #F7F7F9;
      --ai-bubble: #F0F7FF;
      --ai-bubble-ink: #0D3B66;
      --user-bubble: #1A1A1A;
      --user-bubble-ink: #FFFFFF;
      --radius: 14px;
      --radius-lg: 20px;
      --shadow: 0 6px 20px rgba(0,0,0,.08);
      --shadow-lg: 0 20px 40px rgba(0,0,0,.12);
      --header-h: 64px;
      --max-w: 1280px;
      --chat-max: 760px;
    }

    /* Reset */
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    html,body{height:100%;}
    body{
      font-family:'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--ink);
      background: var(--bg-soft);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    a{color:inherit; text-decoration:none;}
    button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
    img{display:block; max-width:100%;}
    input{font-family:inherit;}

    .container{max-width: var(--max-w); margin: 0 auto; padding: 0 24px;}

    /* =========================================
       Page shell (lock-height)
       ========================================= */
    .page{
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg-soft);
    }

    /* =========================================
       Header
       ========================================= */
    .header{
      flex-shrink: 0;
      background: #fff;
      border-bottom: 1px solid var(--line);
      z-index: 10;
    }
    .header-inner{
      height: var(--header-h);
      display:flex; align-items:center; gap:16px;
    }
    .logo{
      display:inline-flex; align-items:center; gap:8px;
      font-weight:900; font-size:18px; letter-spacing:-0.02em; color: var(--ink);
    }
    .logo-mark{
      width:30px; height:30px; border-radius:9px;
      background: linear-gradient(135deg, var(--primary), #FF9A6C);
      color:#fff; display:grid; place-items:center; font-weight:900; font-size:16px;
      box-shadow: 0 4px 12px rgba(255,107,53,.35);
    }
    .logo-mark::after{content:"O";}
    .header-actions{margin-left:auto; display:flex; align-items:center; gap:6px;}
    .btn-back{
      padding:8px 14px; border-radius:10px;
      font-weight:700; font-size:13px; color: var(--ink-2);
      display:inline-flex; align-items:center; gap:6px;
    }
    .btn-back:hover{background: var(--bg-soft); color: var(--ink);}
    .btn-restart{
      padding:8px 14px; border-radius:10px;
      font-weight:700; font-size:13px; color: var(--primary);
      background: var(--primary-soft);
      display:inline-flex; align-items:center; gap:6px;
    }
    .btn-restart:hover{background: #FFE4D4;}

    /* =========================================
       Chat Shell
       ========================================= */
    .chat-shell{
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: var(--chat-max);
      margin: 0 auto;
      padding: 0 16px;
    }

    /* =========================================
       Chat Branding Head
       ========================================= */
    .chat-head{
      flex-shrink: 0;
      padding: 20px 8px 14px;
      text-align: center;
    }
    .ai-mark{
      width: 56px; height: 56px;
      margin: 0 auto 12px;
      border-radius: 18px;
      background: linear-gradient(135deg, #1E88E5, #42A5F5 60%, var(--primary));
      display: grid; place-items: center;
      font-size: 26px; color: #fff;
      box-shadow: 0 12px 28px rgba(30,136,229,.35);
      animation: floaty 3.2s ease-in-out infinite;
    }
    .ai-mark::after{content:"✦";}
    @keyframes floaty{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-4px); }
    }
    .chat-head h1{
      margin: 0 0 4px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }
    .chat-head h1 .brand{
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .chat-head p{
      margin: 0;
      font-size: 13px;
      color: var(--ink-2);
    }

    /* =========================================
       Chat Body (messages)
       ========================================= */
    .chat-body{
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px 4px 24px;
      scroll-behavior: smooth;
    }
    .chat-body::-webkit-scrollbar{width: 6px;}
    .chat-body::-webkit-scrollbar-thumb{background: #d0d3d9; border-radius: 3px;}

    .msg{
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      animation: fadeUp .35s ease;
    }
    @keyframes fadeUp{
      from{ opacity: 0; transform: translateY(8px); }
      to  { opacity: 1; transform: translateY(0); }
    }
    .msg-avatar{
      flex-shrink: 0;
      width: 34px; height: 34px;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 15px; color: #fff;
      background: linear-gradient(135deg, #1E88E5, var(--primary));
      box-shadow: 0 4px 10px rgba(30,136,229,.25);
    }
    .msg-avatar::after{content: "✦";}
    .msg-content{
      min-width: 0;
      max-width: calc(100% - 50px);
    }
    .bubble{
      display: inline-block;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      word-break: keep-all;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .msg-bot .bubble{
      background: var(--ai-bubble);
      color: var(--ai-bubble-ink);
      border-bottom-left-radius: 6px;
      box-shadow: 0 1px 2px rgba(13,59,102,.06);
    }

    .msg-user{
      justify-content: flex-end;
    }
    .msg-user .msg-avatar{ display: none; }
    .msg-user .msg-content{ display: flex; justify-content: flex-end; max-width: 85%; }
    .msg-user .bubble{
      background: var(--user-bubble);
      color: var(--user-bubble-ink);
      border-bottom-right-radius: 6px;
    }

    /* Typing indicator */
    .typing-dots{
      display: inline-flex; gap: 4px; align-items: center;
      padding: 4px 2px;
    }
    .typing-dots span{
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--ai-bubble-ink);
      opacity: .4;
      animation: blink 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2){ animation-delay: .2s; }
    .typing-dots span:nth-child(3){ animation-delay: .4s; }
    @keyframes blink{
      0%,80%,100%{ opacity: .3; transform: scale(.8); }
      40%{ opacity: 1; transform: scale(1); }
    }

    /* Typing caret on messages being typed */
    .bubble.typing-live::after{
      content:"▍";
      display:inline-block;
      margin-left:1px;
      color: var(--secondary);
      animation: caret 1s steps(2) infinite;
    }
    @keyframes caret{
      50%{ opacity: 0; }
    }

    /* =========================================
       Quick Replies
       ========================================= */
    .quick-replies{
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 6px 0 14px 44px;
      animation: fadeUp .35s ease;
    }
    .quick-replies button{
      padding: 10px 14px;
      background: #fff;
      border: 1.5px solid var(--line);
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      color: var(--ink);
      transition: all .15s;
    }
    .quick-replies button:hover{
      border-color: var(--secondary);
      color: var(--secondary);
      background: var(--secondary-soft);
      transform: translateY(-1px);
    }

    /* =========================================
       Loading Block (AI thinking)
       ========================================= */
    .thinking{
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px 16px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      margin: 4px 0 14px 44px;
      animation: fadeUp .35s ease;
    }
    .thinking-row{
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--ink-2);
    }
    .thinking-row .spin{
      width: 14px; height: 14px;
      border: 2px solid var(--line);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }
    .thinking-row.done .spin{
      border-color: var(--success, #10B981);
      border-top-color: var(--success, #10B981);
      animation: none;
    }
    .thinking-row.done::after{
      content:"✓";
      margin-left: auto;
      color: #10B981;
      font-weight: 900;
    }

    /* =========================================
       Recommendation Cards
       ========================================= */
    .rec-group{
      margin: 6px 0 14px 44px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeUp .5s ease;
    }
    .rec-card{
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 140px 1fr;
      transition: transform .2s, box-shadow .2s;
    }
    .rec-card:hover{ transform: translateY(-2px); box-shadow: var(--shadow); }
    .rec-img{
      background-size: cover;
      background-position: center;
      background-color: #eee;
    }
    .rec-body{
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .rec-tier{
      display: inline-flex;
      align-self: flex-start;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .rec-tier.t1{ background: #E8F5E9; color:#2E7D32; }
    .rec-tier.t2{ background: var(--secondary-soft); color: var(--secondary-dark, #1565C0); }
    .rec-tier.t3{ background: linear-gradient(135deg, var(--primary), #FF9A6C); color: #fff; }
    .rec-title{
      font-weight: 800;
      font-size: 15px;
      line-height: 1.35;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    .rec-compo{
      font-size: 12px; color: var(--ink-2);
      display: flex; flex-direction: column; gap: 2px;
      margin-bottom: 10px;
      flex: 1;
    }
    .rec-compo strong{ color: var(--ink); margin-right: 4px; }
    .rec-price-row{
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
    }
    .rec-label{ font-size: 11px; color: var(--ink-3); }
    .rec-price{ font-size: 18px; font-weight: 900; color: var(--primary); letter-spacing: -0.02em; }
    .rec-book{
      padding: 10px 16px;
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      font-weight: 800;
      font-size: 13px;
      white-space: nowrap;
      transition: background .15s;
    }
    .rec-book:hover{ background: var(--primary-dark); }

    .rec-more{
      margin: 6px 0 14px 44px;
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .rec-more button{
      padding: 10px 14px;
      background: #fff;
      border: 1.5px solid var(--line);
      border-radius: 999px;
      font-weight: 700; font-size: 13px; color: var(--ink);
    }
    .rec-more button:hover{ border-color: var(--primary); color: var(--primary); }

    /* =========================================
       Input Dock
       ========================================= */
    .chat-input{
      flex-shrink: 0;
      padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
      background: rgba(247,247,249,.9);
      backdrop-filter: saturate(180%) blur(12px);
      border-top: 1px solid var(--line);
    }
    .chat-input-inner{
      max-width: var(--chat-max);
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: #fff;
      border: 1.5px solid var(--line);
      border-radius: 24px;
      padding: 6px 6px 6px 12px;
      transition: border-color .15s, box-shadow .15s;
    }
    .chat-input-inner:focus-within{
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(30,136,229,.12);
    }
    .mic-btn, .send-btn{
      width: 40px; height: 40px;
      border-radius: 50%;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: background .15s, color .15s;
    }
    .mic-btn{ color: var(--ink-3); }
    .mic-btn:hover{ background: var(--bg-soft); color: var(--ink); }
    .send-btn{
      background: var(--primary);
      color: #fff;
    }
    .send-btn:hover{ background: var(--primary-dark); }
    .send-btn:disabled{ background: var(--line); color: var(--ink-3); cursor: not-allowed; }
    .chat-input-inner textarea{
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      padding: 10px 6px;
      font-size: 15px;
      font-family: inherit;
      color: var(--ink);
      background: transparent;
      max-height: 120px;
      line-height: 1.4;
    }
    .chat-hint{
      text-align: center;
      font-size: 11px;
      color: var(--ink-3);
      margin-top: 6px;
    }

    /* =========================================
       Responsive
       ========================================= */
    @media (max-width: 768px){
      :root{ --header-h: 56px; }
      .container{ padding: 0 14px; }
      .chat-shell{ padding: 0 12px; }
      .chat-head{ padding: 14px 8px 10px; }
      .ai-mark{ width: 48px; height: 48px; font-size: 22px; border-radius: 14px; }
      .chat-head h1{ font-size: 20px; }
      .chat-head p{ font-size: 12px; }

      .msg-avatar{ width: 30px; height: 30px; font-size: 13px; }
      .bubble{ font-size: 14px; padding: 11px 14px; }
      .quick-replies{ margin-left: 40px; }
      .quick-replies button{ padding: 9px 12px; font-size: 12px; }

      .rec-group, .rec-more, .thinking{ margin-left: 40px; }
      .rec-card{ grid-template-columns: 110px 1fr; }
      .rec-img{ min-height: 100%; }
      .rec-body{ padding: 12px; }
      .rec-title{ font-size: 14px; }
      .rec-price{ font-size: 16px; }
      .rec-book{ padding: 8px 12px; font-size: 12px; }

      .chat-input{ padding: 8px 12px calc(8px + env(safe-area-inset-bottom)); }

      .btn-back span, .btn-restart span{ display: none; }
    }

    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{ animation-duration:.01ms!important; transition-duration:.01ms!important; }
    }
  </style>
</head>

  <div class="page">

    <!-- ================================
         HEADER

    <header class="header">
      <div class="container header-inner">
        <a href="index.html" class="logo" aria-label="오마이트립 홈">

    <!-- ================================
         CHAT SHELL
         ================================ -->
    <main class="chat-shell" aria-label="AI 여행 플래너 대화">

      <div class="chat-head">
        <div class="ai-mark" aria-hidden="true"></div>
        <h1><span class="brand">오마이AI</span></h1>
        <p>항공부터 액티비티까지, AI가 완벽한 여행을 설계해드려요</p>
      </div>

      <!-- Messages -->
      <div class="chat-body" id="chatBody" role="log" aria-live="polite" aria-atomic="false">
        <!-- messages appended by JS -->
      </div>

      <!-- Input dock -->
      <div class="chat-input">
        <form class="chat-input-inner" id="chatForm">
          <button type="button" class="mic-btn" aria-label="음성 입력 (곧 제공 예정)" onclick="handleMic()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="2" width="6" height="12" rx="3"/>
              <path d="M5 10a7 7 0 0014 0"/>

            </svg>
          </button>
          <textarea
            id="userInput"
            rows="1"
            placeholder="자유롭게 질문해보세요 (예: 골프 포함해서 짜줘)"

          ></textarea>
          <button type="submit" class="send-btn" id="sendBtn" aria-label="전송" disabled>

              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </form>

      </div>
    </main>
  </div>

       SCRIPTS

  <script src="state.js"></script>

      { tier:'t3', tierLabel:'프리미엄 추천', title:'푸켓 빈쯔찌 올인클루시브 4박5일',

    ],
    '필리핀': [
      { tier:'t1', tierLabel:'가성비 추천', title:'마닐라 3박4일 시티 가성비',

        price: 459000 },
      { tier:'t2', tierLabel:'밸런스 추천', title:'세부 4박5일 막탄 리조트',
        img:'https://images.unsplash.com/photo-1552465011-b4e21bf6e79a?auto=format&fit=crop&w=600&q=80',
        flight:'인천 → 세부 · 세부퍼시픽', hotel:'크림슨 리조트 앤 스파 4박', extra:'호핑투어 + 지프니 시티투어',
        price: 890000 },
      { tier:'t3', tierLabel:'프리미엄 추천', title:'보라카이 샹그릴라 4박5일',
        img:'https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=600&q=80',
        flight:'인천 → 칼리보 · 필리핀항공', hotel:'샹그릴라 보라카이 4박', extra:'프라이빗 비치 + 선셋 세일링',
        price: 1690000 }
    ]
  };

  /* =========================================================================
     CONVERSATION FLOW (state machine)
     ========================================================================= */
  const FLOW = {
    greeting: {
      messages: [
        '안녕하세요! 저는 오마이트립의 AI 여행 플래너 ✦ 오마이AI예요.',
        '몇 가지만 알려주시면 딱 맞는 여행 상품을 추천해드릴게요.\n\n먼저, 어디로 여행 가고 싶으세요? 🌏'
      ],
      quickReplies: [
        { label:'🇯🇵 일본',      handler: () => pickChoice('일본',    'destination', 'style') },
        { label:'🇻🇳 베트남',    handler: () => pickChoice('베트남',  'destination', 'style') },
        { label:'🇹🇭 태국',      handler: () => pickChoice('태국',    'destination', 'style') },
        { label:'🇵🇭 필리핀',    handler: () => pickChoice('필리핀',  'destination', 'style') },
        { label:'✏️ 직접 입력',  handler: () => requestTextInput('destination', '가고 싶은 나라나 도시를 입력해주세요.', 'style') }
      ]
    },
    style: {
      messages: (s) => [
        `${s.destination} 좋죠! ${emojiFor(s.destination)} 어떤 스타일의 여행을 원하시나요?`
      ],
      quickReplies: [
        { label:'🏙️ 도시 관광',   handler: () => pickChoice('도시 관광',   'style', 'duration') },
        { label:'♨️ 온천/료칸',   handler: () => pickChoice('온천/료칸',   'style', 'duration') },
        { label:'⛳ 골프',          handler: () => pickChoice('골프',          'style', 'duration') },
        { label:'🍣 맛집 투어',    handler: () => pickChoice('맛집 투어',    'style', 'duration') },
        { label:'🛍️ 쇼핑',         handler: () => pickChoice('쇼핑',         'style', 'duration') }
      ]
    },
    duration: {
      messages: ['출발 날짜와 여행 기간을 알려주세요 📅\n\n(가장 가까운 주말 기준으로 찾아드릴게요)'],
      quickReplies: [
        { label:'1박 2일',    handler: () => pickChoice('1박 2일',    'duration', 'pax') },
        { label:'2박 3일',    handler: () => pickChoice('2박 3일',    'duration', 'pax') },
        { label:'3박 4일',    handler: () => pickChoice('3박 4일',    'duration', 'pax') },
        { label:'5박 이상',   handler: () => pickChoice('5박 이상',   'duration', 'pax') }
      ]
    },
    pax: {
      messages: ['몇 명이서 여행하시나요? 👥'],
      quickReplies: [
        { label:'🙋 혼자',         handler: () => pickChoice('혼자',        'pax', 'budget') },
        { label:'👫 2명',          handler: () => pickChoice('2명',         'pax', 'budget') },
        { label:'👨‍👩‍👧 3~4명',    handler: () => pickChoice('3~4명',       'pax', 'budget') },
        { label:'👥 5명 이상',     handler: () => pickChoice('5명 이상',    'pax', 'budget') }
      ]
    },
    budget: {
      messages: ['예산은 어느 정도로 생각하시나요? (1인 기준) 💰'],
      quickReplies: [
        { label:'💸 30만원 이하',  handler: () => pickChoice('30만원 이하',  'budget', 'loading') },
        { label:'💳 50만원대',     handler: () => pickChoice('50만원대',     'budget', 'loading') },
        { label:'💎 100만원대',    handler: () => pickChoice('100만원대',    'budget', 'loading') },
        { label:'🚀 제한 없음',    handler: () => pickChoice('제한 없음',    'budget', 'loading') }
      ]
    },
    loading: {
      async run(){
        await addBotMessage('완벽한 조건이네요! 🔍');
        await addBotMessage('딱 맞는 여행을 찾아볼게요...');
        await showThinking([
          '항공 스케줄 조회 중...',
          '호텔 가용성 확인 중...',
          '추천 상품 매칭 중...'
        ]);
        goTo('results');
      }
    },
    results: {
      async run(){
        const dest = state.destination;
        const summary = `정리해드리면: ${dest} / ${state.style} / ${state.duration} / ${state.pax} / ${state.budget}\n\n이 조건에 딱 맞는 여행 추천 3가지를 준비했어요! ✨`;
        await addBotMessage(summary);
        renderRecommendations(dest);
        renderAfterResultsActions();
      }
    }
  };

  /* =========================================================================
     HELPERS
     ========================================================================= */
  const chatBody = document.getElementById('chatBody');
  const userInput = document.getElementById('userInput');
  const sendBtn   = document.getElementById('sendBtn');
  const chatForm  = document.getElementById('chatForm');

  function emojiFor(country){
    return { '일본':'🇯🇵', '베트남':'🇻🇳', '태국':'🇹🇭', '필리핀':'🇵🇭' }[country] || '🌏';
  }

  function scrollToBottom(smooth = true){
    chatBody.scrollTo({ top: chatBody.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
  }

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  /* Add a user message instantly */
  function addUserMessage(text){
    const msg = document.createElement('div');
    msg.className = 'msg msg-user';
    msg.innerHTML = `
      <div class="msg-content">
        <div class="bubble"></div>
      </div>`;
    msg.querySelector('.bubble').textContent = text;
    chatBody.appendChild(msg);
    scrollToBottom();
  }

  /* Add a bot message with typing indicator → typed-out animation */
  async function addBotMessage(text, { typingDelay = 650, speed = 22 } = {}){
    // 1) typing dots
    const typingNode = document.createElement('div');
    typingNode.className = 'msg msg-bot';
    typingNode.innerHTML = `
      <div class="msg-avatar" aria-hidden="true"></div>
      <div class="msg-content">
        <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
      </div>`;
    chatBody.appendChild(typingNode);
    scrollToBottom();
    await sleep(typingDelay);

    // 2) convert to message and type out chars
    const bubble = typingNode.querySelector('.bubble');
    bubble.innerHTML = '';
    bubble.classList.add('typing-live');
    await typeInto(bubble, text, speed);
    bubble.classList.remove('typing-live');
  }

  function typeInto(element, text, speed){
    return new Promise(resolve => {
      let i = 0;
      const id = setInterval(() => {
        if(i >= text.length){
          clearInterval(id);
          resolve();
          return;
        }
        element.textContent += text[i++];
        // throttle autoscroll to avoid jitter
        if(i % 3 === 0) scrollToBottom(false);
      }, speed);
    });
  }

  /* Render quick replies at end of chat */
  function renderQuickReplies(replies){
    const wrap = document.createElement('div');
    wrap.className = 'quick-replies';
    wrap.dataset.kind = 'quick';
    replies.forEach(r => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = r.label;
      btn.addEventListener('click', () => {
        // remove all current quick-reply groups so history stays clean
        document.querySelectorAll('.quick-replies').forEach(el => el.remove());
        r.handler();
      });
      wrap.appendChild(btn);
    });
    chatBody.appendChild(wrap);
    scrollToBottom();
  }

  /* Loading checklist */
  async function showThinking(steps){
    const box = document.createElement('div');
    box.className = 'thinking';
    steps.forEach((s, i) => {
      box.insertAdjacentHTML('beforeend', `
        <div class="thinking-row" data-idx="${i}">
          <div class="spin"></div>
          <span>${s}</span>
        </div>`);
    });
    chatBody.appendChild(box);
    scrollToBottom();

    for(let i = 0; i < steps.length; i++){
      await sleep(700 + Math.random() * 400);
      box.querySelector(`[data-idx="${i}"]`)?.classList.add('done');
    }
    await sleep(400);
  }

  /* Render 3 recommendation cards */
  function renderRecommendations(destination){
    const recs = RECOMMENDATIONS[destination] || RECOMMENDATIONS['일본'];
    const group = document.createElement('div');
    group.className = 'rec-group';
    group.innerHTML = recs.map((r, i) => `
      <article class="rec-card">
        <div class="rec-img" style="background-image:url('${r.img}')" role="img" aria-label="${r.title}"></div>
        <div class="rec-body">
          <span class="rec-tier ${r.tier}">${r.tierLabel}</span>
          <h3 class="rec-title">${r.title}</h3>
          <div class="rec-compo">
            <div><strong>✈️ 항공</strong>${r.flight}</div>
            <div><strong>🏨 호텔</strong>${r.hotel}</div>
            <div><strong>🎫 포함</strong>${r.extra}</div>
          </div>
          <div class="rec-price-row">
            <div>
              <div class="rec-label">1인 총 비용</div>
              <div class="rec-price">${r.price.toLocaleString('ko-KR')}원~</div>
            </div>
            <button class="rec-book" data-idx="${i}">이 상품으로 예약하기 →</button>
          </div>
        </div>
      </article>
    `).join('');
    chatBody.appendChild(group);

    // Map destination → productIds (tier: 가성비 / 밸런스 / 프리미엄)
    const PRODUCT_MAP = {
      '일본':   ['prod-jp-03','prod-jp-02','prod-jp-01'],
      '베트남': ['prod-vn-02','prod-vn-03','prod-vn-01'],
      '태국':   ['prod-th-01','prod-th-02','prod-th-03'],
      '필리핀': ['prod-ph-02','prod-ph-01','prod-ph-01']
    };
    const productIds = PRODUCT_MAP[destination] || PRODUCT_MAP['일본'];

    group.querySelectorAll('.rec-book').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = +btn.dataset.idx;
        const pid = productIds[idx] || productIds[0];
        // TODO: API 연동 - POST /api/cart { productId, source:'ai-planner', context: state }
        location.href = 'product.html?id=' + pid;
      });
    });

    scrollToBottom();
  }

  /* Render post-results follow-up actions */
  function renderAfterResultsActions(){
    const wrap = document.createElement('div');
    wrap.className = 'rec-more';
    wrap.innerHTML = `
      <button data-a="refine">🔧 조건 바꾸기</button>
      <button data-a="restart">↻ 처음부터 다시</button>
      <button data-a="save">💾 여행 저장</button>
    `;
    chatBody.appendChild(wrap);
    wrap.querySelector('[data-a="refine"]').addEventListener('click', async () => {
      wrap.remove();
      await addBotMessage('어떤 조건을 바꿔볼까요? 아래 단계부터 다시 안내해드릴게요.');
      goTo('style');
    });
    wrap.querySelector('[data-a="restart"]').addEventListener('click', restart);
    wrap.querySelector('[data-a="save"]').addEventListener('click', () => {
      // TODO: API 연동 - POST /api/ai-planner/save { state }
      alert('로그인 후 마이페이지에서 다시 볼 수 있어요 (프로토타입)');
    });
    scrollToBottom();
  }

  /* =========================================================================
     FLOW CONTROL
     ========================================================================= */
  function pickChoice(value, stateKey, next){
    state[stateKey] = value;
    addUserMessage(value);
    goTo(next);
  }

  function requestTextInput(stateKey, promptText, next){
    state.awaitingText = { key: stateKey, next };
    addBotMessage(promptText);
    userInput.focus();
  }

  async function goTo(stepName){
    state.current = stepName;
    const step = FLOW[stepName];
    if(!step){ console.warn('Unknown step:', stepName); return; }

    // Dedicated run() for custom steps (loading, results)
    if(typeof step.run === 'function'){
      await step.run();
      return;
    }

    const messages = typeof step.messages === 'function' ? step.messages(state) : step.messages;
    for(const m of messages){
      await addBotMessage(m);
    }
    if(step.quickReplies && step.quickReplies.length){
      renderQuickReplies(step.quickReplies);
    }
  }

  function restart(){
    Object.assign(state, {
      destination: null, style: null, duration: null, pax: null, budget: null,
      current: 'greeting', awaitingText: null
    });
    chatBody.innerHTML = '';
    goTo('greeting');
  }

  /* =========================================================================
     USER TEXT INPUT
     ========================================================================= */
  function autoGrow(){
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    sendBtn.disabled = userInput.value.trim().length === 0;
  }
  userInput.addEventListener('input', autoGrow);
  userInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      chatForm.requestSubmit();
    }
  });

  chatForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = userInput.value.trim();
    if(!text) return;

    addUserMessage(text);
    userInput.value = '';
    autoGrow();

    // If waiting for a specific answer (e.g., "직접 입력" destination)
    if(state.awaitingText){
      const { key, next } = state.awaitingText;
      state[key] = text;
      state.awaitingText = null;
      goTo(next);
      return;
    }

    // Otherwise, free-form question.
    // TODO: AI API 연동 - fetch('/api/ai-planner', {
    //   method: 'POST',
    //   headers: { 'Content-Type': 'application/json' },
    //   body: JSON.stringify({ message: text, context: state })
    // })
    // 위 엔드포인트는 OpenAI ChatCompletion 또는 Claude Messages API 프록시.
    // 응답 스트리밍 시 typeInto() 대신 ReadableStream chunk를 그대로 bubble에 append.

    await sleep(400);
    await addBotMessage(
      '좋은 질문이에요! 현재는 프로토타입이라 AI 응답 서버가 연결되지 않았어요.\n\n' +
      '출시 버전에서는 여기서 실시간 맞춤 답변을 받을 수 있어요. 지금은 위 버튼으로 단계별 추천을 받아보세요 ✨'
    );
  });

  function handleMic(){
    // TODO: Web Speech API 또는 /api/ai-planner/transcribe (Whisper) 연동
    alert('🎙 음성 입력은 곧 제공됩니다 (프로토타입)');
  }

  /* Restart button */
  document.getElementById('restartBtn').addEventListener('click', () => {
    if(confirm('대화를 처음부터 다시 시작할까요?')) restart();
  });

  /* =========================================================================
     MOBILE: keep chat scrolled to bottom when keyboard opens
     ========================================================================= */
  userInput.addEventListener('focus', () => {
    setTimeout(() => scrollToBottom(true), 300);
  });
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', () => {
      scrollToBottom(false);
    });
  }

  /* =========================================================================
     INIT
     ========================================================================= */
  window.addEventListener('load', async () => {
    if(urlQuery){
      // User arrived via AI search; greet & acknowledge
      await addBotMessage(`안녕하세요! "${urlQuery}" 관련해서 도와드릴게요 ✦`);
      await addBotMessage('먼저 몇 가지만 확인할게요. 어디로 여행 가고 싶으세요?');
      renderQuickReplies(FLOW.greeting.quickReplies);
    } else {
      goTo('greeting');
    }
  });
  </script>
</body>
