<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="description" content="오마이AI - 항공부터 액티비티까지, AI가 완벽한 여행을 설계해드려요" />
  <title>오마이AI | 오마이트립</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* =========================================
       Design Tokens (shared)
       ========================================= */
    :root{
      --primary: #FF6B35;
      --primary-dark: #E85826;
      --primary-soft: #FFF0E8;
      --secondary: #1E88E5;
      --secondary-soft: #E3F2FD;
      --accent: #FFD23F;
      --ink: #1A1A1A;
      --ink-2: #4B5563;
      --ink-3: #9CA3AF;
      --line: #E5E7EB;
      --bg: #FFFFFF;
      --bg-soft: #F7F7F9;
      --ai-bubble: #F0F7FF;
      --ai-bubble-ink: #0D3B66;
      --user-bubble: #1A1A1A;
      --user-bubble-ink: #FFFFFF;
      --radius: 14px;
      --radius-lg: 20px;
      --shadow: 0 6px 20px rgba(0,0,0,.08);
      --shadow-lg: 0 20px 40px rgba(0,0,0,.12);
      --header-h: 64px;
      --max-w: 1280px;
      --chat-max: 760px;
    }

    /* Reset */
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    html,body{height:100%;}
    body{
      font-family:'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--ink);
      background: var(--bg-soft);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    a{color:inherit; text-decoration:none;}
    button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
    img{display:block; max-width:100%;}
    input{font-family:inherit;}

    .container{max-width: var(--max-w); margin: 0 auto; padding: 0 24px;}

    /* =========================================
       Page shell (lock-height)
       ========================================= */
    .page{
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg-soft);
    }

    /* =========================================
       Header
       ========================================= */
    .header{
      flex-shrink: 0;
      background: #fff;
      border-bottom: 1px solid var(--line);
      z-index: 10;
    }
    .header-inner{
      height: var(--header-h);
      display:flex; align-items:center; gap:16px;
    }
    .logo{
      display:inline-flex; align-items:center; gap:8px;
      font-weight:900; font-size:18px; letter-spacing:-0.02em; color: var(--ink);
    }
    .logo-mark{
      width:30px; height:30px; border-radius:9px;
      background: linear-gradient(135deg, var(--primary), #FF9A6C);
      color:#fff; display:grid; place-items:center; font-weight:900; font-size:16px;
      box-shadow: 0 4px 12px rgba(255,107,53,.35);
    }
    .logo-mark::after{content:"O";}
    .header-actions{margin-left:auto; display:flex; align-items:center; gap:6px;}
    .btn-back{
      padding:8px 14px; border-radius:10px;
      font-weight:700; font-size:13px; color: var(--ink-2);
      display:inline-flex; align-items:center; gap:6px;
    }
    .btn-back:hover{background: var(--bg-soft); color: var(--ink);}
    .btn-restart{
      padding:8px 14px; border-radius:10px;
      font-weight:700; font-size:13px; color: var(--primary);
      background: var(--primary-soft);
      display:inline-flex; align-items:center; gap:6px;
    }
    .btn-restart:hover{background: #FFE4D4;}

    /* =========================================
       Chat Shell
       ========================================= */
    .chat-shell{
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: var(--chat-max);
      margin: 0 auto;
      padding: 0 16px;
    }

    /* =========================================
       Chat Branding Head
       ========================================= */
    .chat-head{
      flex-shrink: 0;
      padding: 20px 8px 14px;
      text-align: center;
    }
    .ai-mark{
      width: 56px; height: 56px;
      margin: 0 auto 12px;
      border-radius: 18px;
      background: linear-gradient(135deg, #1E88E5, #42A5F5 60%, var(--primary));
      display: grid; place-items: center;
      font-size: 26px; color: #fff;
      box-shadow: 0 12px 28px rgba(30,136,229,.35);
      animation: floaty 3.2s ease-in-out infinite;
    }
    .ai-mark::after{content:"✦";}
    @keyframes floaty{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-4px); }
    }
    .chat-head h1{
      margin: 0 0 4px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }
    .chat-head h1 .brand{
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .chat-head p{
      margin: 0;
      font-size: 13px;
      color: var(--ink-2);
    }

    /* =========================================
       Chat Body (messages)
       ========================================= */
    .chat-body{
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px 4px 24px;
      scroll-behavior: smooth;
    }
    .chat-body::-webkit-scrollbar{width: 6px;}
    .chat-body::-webkit-scrollbar-thumb{background: #d0d3d9; border-radius: 3px;}

    .msg{
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      animation: fadeUp .35s ease;
    }
    @keyframes fadeUp{
      from{ opacity: 0; transform: translateY(8px); }
      to  { opacity: 1; transform: translateY(0); }
    }
    .msg-avatar{
      flex-shrink: 0;
      width: 34px; height: 34px;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 15px; color: #fff;
      background: linear-gradient(135deg, #1E88E5, var(--primary));
      box-shadow: 0 4px 10px rgba(30,136,229,.25);
    }
    .msg-avatar::after{content: "✦";}
    .msg-content{
      min-width: 0;
      max-width: calc(100% - 50px);
    }
    .bubble{
      display: inline-block;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      word-break: keep-all;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .msg-bot .bubble{
      background: var(--ai-bubble);
      color: var(--ai-bubble-ink);
      border-bottom-left-radius: 6px;
      box-shadow: 0 1px 2px rgba(13,59,102,.06);
    }

    .msg-user{
      justify-content: flex-end;
    }
    .msg-user .msg-avatar{ display: none; }
    .msg-user .msg-content{ display: flex; justify-content: flex-end; max-width: 85%; }
    .msg-user .bubble{
      background: var(--user-bubble);
      color: var(--user-bubble-ink);
      border-bottom-right-radius: 6px;
    }

    /* Typing indicator */
    .typing-dots{
      display: inline-flex; gap: 4px; align-items: center;
      padding: 4px 2px;
    }
    .typing-dots span{
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--ai-bubble-ink);
      opacity: .4;
      animation: blink 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2){ animation-delay: .2s; }
    .typing-dots span:nth-child(3){ animation-delay: .4s; }
    @keyframes blink{
      0%,80%,100%{ opacity: .3; transform: scale(.8); }
      40%{ opacity: 1; transform: scale(1); }
    }

    /* Typing caret on messages being typed */
    .bubble.typing-live::after{
      content:"▍";
      display:inline-block;
      margin-left:1px;
      color: var(--secondary);
      animation: caret 1s steps(2) infinite;
    }
    @keyframes caret{
      50%{ opacity: 0; }
    }

    /* =========================================
       Quick Replies
       ========================================= */
    .quick-replies{
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 6px 0 14px 44px;
      animation: fadeUp .35s ease;
    }
    .quick-replies button{
      padding: 10px 14px;
      background: #fff;
      border: 1.5px solid var(--line);
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      color: var(--ink);
      transition: all .15s;
    }
    .quick-replies button:hover{
      border-color: var(--secondary);
      color: var(--secondary);
      background: var(--secondary-soft);
      transform: translateY(-1px);
    }

    /* =========================================
       Loading Block (AI thinking)
       ========================================= */
    .thinking{
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px 16px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      margin: 4px 0 14px 44px;
      animation: fadeUp .35s ease;
    }
    .thinking-row{
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--ink-2);
    }
    .thinking-row .spin{
      width: 14px; height: 14px;
      border: 2px solid var(--line);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }
    .thinking-row.done .spin{
      border-color: var(--success, #10B981);
      border-top-color: var(--success, #10B981);
      animation: none;
    }
    .thinking-row.done::after{
      content:"✓";
      margin-left: auto;
      color: #10B981;
      font-weight: 900;
    }

    /* =========================================
       Recommendation Cards
       ========================================= */
    .rec-group{
      margin: 6px 0 14px 44px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeUp .5s ease;
    }
    .rec-card{
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 140px 1fr;
      transition: transform .2s, box-shadow .2s;
    }
    .rec-card:hover{ transform: translateY(-2px); box-shadow: var(--shadow); }
    .rec-img{
      background-size: cover;
      background-position: center;
      background-color: #eee;
    }
    .rec-body{
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .rec-tier{
      display: inline-flex;
      align-self: flex-start;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .rec-tier.t1{ background: #E8F5E9; color:#2E7D32; }
    .rec-tier.t2{ background: var(--secondary-soft); color: var(--secondary-dark, #1565C0); }
    .rec-tier.t3{ background: linear-gradient(135deg, var(--primary), #FF9A6C); color: #fff; }
    .rec-title{
      font-weight: 800;
      font-size: 15px;
      line-height: 1.35;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    .rec-compo{
      font-size: 12px; color: var(--ink-2);
      display: flex; flex-direction: column; gap: 2px;
      margin-bottom: 10px;
      flex: 1;
    }
    .rec-compo strong{ color: var(--ink); margin-right: 4px; }
    .rec-price-row{
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
    }
    .rec-label{ font-size: 11px; color: var(--ink-3); }
    .rec-price{ font-size: 18px; font-weight: 900; color: var(--primary); letter-spacing: -0.02em; }
    .rec-book{
      padding: 10px 16px;
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      font-weight: 800;
      font-size: 13px;
      white-space: nowrap;
      transition: background .15s;
    }
    .rec-book:hover{ background: var(--primary-dark); }

    .rec-more{
      margin: 6px 0 14px 44px;
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .rec-more button{
      padding: 10px 14px;
      background: #fff;
      border: 1.5px solid var(--line);
      border-radius: 999px;
      font-weight: 700; font-size: 13px; color: var(--ink);
    }
    .rec-more button:hover{ border-color: var(--primary); color: var(--primary); }

    /* =========================================
       Input Dock
       ========================================= */
    .chat-input{
      flex-shrink: 0;
      padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
      background: rgba(247,247,249,.9);
      backdrop-filter: saturate(180%) blur(12px);
      border-top: 1px solid var(--line);
    }
    .chat-input-inner{
      max-width: var(--chat-max);
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: #fff;
      border: 1.5px solid var(--line);
      border-radius: 24px;
      padding: 6px 6px 6px 12px;
      transition: border-color .15s, box-shadow .15s;
    }
    .chat-input-inner:focus-within{
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(30,136,229,.12);
    }
    .mic-btn, .send-btn{
      width: 40px; height: 40px;
      border-radius: 50%;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: background .15s, color .15s;
    }
    .mic-btn{ color: var(--ink-3); }
    .mic-btn:hover{ background: var(--bg-soft); color: var(--ink); }
    .send-btn{
      background: var(--primary);
      color: #fff;
    }
    .send-btn:hover{ background: var(--primary-dark); }
    .send-btn:disabled{ background: var(--line); color: var(--ink-3); cursor: not-allowed; }
    .chat-input-inner textarea{
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      padding: 10px 6px;
      font-size: 15px;
      font-family: inherit;
      color: var(--ink);
      background: transparent;
      max-height: 120px;
      line-height: 1.4;
    }
    .chat-hint{
      text-align: center;
      font-size: 11px;
      color: var(--ink-3);
      margin-top: 6px;
    }

    /* =========================================
       Responsive
       ========================================= */
    @media (max-width: 768px){
      :root{ --header-h: 56px; }
      .container{ padding: 0 14px; }
      .chat-shell{ padding: 0 12px; }
      .chat-head{ padding: 14px 8px 10px; }
      .ai-mark{ width: 48px; height: 48px; font-size: 22px; border-radius: 14px; }
      .chat-head h1{ font-size: 20px; }
      .chat-head p{ font-size: 12px; }

      .msg-avatar{ width: 30px; height: 30px; font-size: 13px; }
      .bubble{ font-size: 14px; padding: 11px 14px; }
      .quick-replies{ margin-left: 40px; }
      .quick-replies button{ padding: 9px 12px; font-size: 12px; }

      .rec-group, .rec-more, .thinking{ margin-left: 40px; }
      .rec-card{ grid-template-columns: 110px 1fr; }
      .rec-img{ min-height: 100%; }
      .rec-body{ padding: 12px; }
      .rec-title{ font-size: 14px; }
      .rec-price{ font-size: 16px; }
      .rec-book{ padding: 8px 12px; font-size: 12px; }

      .chat-input{ padding: 8px 12px calc(8px + env(safe-area-inset-bottom)); }

      .btn-back span, .btn-restart span{ display: none; }
    }

    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{ animation-duration:.01ms!important; transition-duration:.01ms!important; }
    }
  </style>
</head>

  <div class="page">

    <!-- ================================
         HEADER
         ================================ -->
    <header class="header">
      <div class="container header-inner">
        <a href="index.html" class="logo" aria-label="오마이트립 홈">

    <!-- ================================
         CHAT SHELL
         ================================ -->
    <main class="chat-shell" aria-label="AI 여행 플래너 대화">

      <div class="chat-head">
        <div class="ai-mark" aria-hidden="true"></div>
        <h1><span class="brand">오마이AI</span></h1>
        <p>항공부터 액티비티까지, AI가 완벽한 여행을 설계해드려요</p>

      <!-- Messages -->
      <div class="chat-body" id="chatBody" role="log" aria-live="polite" aria-atomic="false">
        <!-- messages appended by JS -->
      </div>

      <!-- Input dock -->
      <div class="chat-input">
        <form class="chat-input-inner" id="chatForm">
          <button type="button" class="mic-btn" id="micBtn" aria-label="음성 입력" onclick="handleMic()" title="음성으로 질문하기">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="2" width="6" height="12" rx="3"/>

            </svg>
          </button>
          <textarea
            id="userInput"
            rows="1"
            placeholder="자유롭게 질문해보세요 (예: 골프 포함해서 짜줘)"

          ></textarea>
          <button type="submit" class="send-btn" id="sendBtn" aria-label="전송" disabled>

              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </form>

      </div>
    </main>
  </div>

       SCRIPTS

  <script src="state.js"></script>

  /* Add a bot message with typing indicator → typed-out animation */
  async function addBotMessage(text, { typingDelay = 650, speed = 22 } = {}){
    // 1) typing dots
    const typingNode = document.createElement('div');
    typingNode.className = 'msg msg-bot';
    typingNode.innerHTML = `
      <div class="msg-avatar" aria-hidden="true"></div>
      <div class="msg-content">
        <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
      </div>`;
    chatBody.appendChild(typingNode);
    scrollToBottom();
    await sleep(typingDelay);

    // 2) convert to message and type out chars
    const bubble = typingNode.querySelector('.bubble');
    bubble.innerHTML = '';
    bubble.classList.add('typing-live');
    await typeInto(bubble, text, speed);
    bubble.classList.remove('typing-live');
  }

  function typeInto(element, text, speed){
    return new Promise(resolve => {
      let i = 0;
      const id = setInterval(() => {
        if(i >= text.length){
          clearInterval(id);
          resolve();
          return;
        }
        element.textContent += text[i++];
        // throttle autoscroll to avoid jitter
        if(i % 3 === 0) scrollToBottom(false);
      }, speed);
    });
  }

  const COUNTRY_SLUG = { '일본':'japan', '베트남':'vietnam', '태국':'thailand', '필리핀':'philippines' };
  function isGolfIntent(){
    const styleText = (state.style || '').toLowerCase();
    if(/골프|라운딩|티오프|⛳/.test(styleText)) return true;
    // 자유 입력 질문에서 골프 키워드
    const q = (state.q || '').toLowerCase();
    if(/골프|라운딩|티오프|골프장/.test(q)) return true;
    return false;
  }

  function recommendGolftels(destination){
    const slug = COUNTRY_SLUG[destination];
    if(!slug) return null;
    const candidates = window.OMT?.DATA?.GOLFTELS?.filter(g => g.country === slug) || [];
    if(candidates.length < 2) return null;
    // 가격 정렬해서 3티어 분리
    const sorted = [...candidates].sort((a,b) => (a.pricePerPerson || 0) - (b.pricePerPerson || 0));
    const t1 = sorted[0];                                 // 가성비 (최저가)
    const t3 = sorted[sorted.length - 1];                 // 프리미엄 (최고가)
    const t2 = sorted[Math.floor(sorted.length / 2)] || t1; // 밸런스 (중간)
    const out = [];
    [{ g:t1, tier:'t1', tierLabel:'가성비 추천' },
     { g:t2, tier:'t2', tierLabel:'밸런스 추천' },
     { g:t3, tier:'t3', tierLabel:'프리미엄 추천' }].forEach(({g, tier, tierLabel}) => {
      if(out.some(x => x.id === g.id)) return;  // 중복 회피
      const own = window.OMT.DATA.OWNERSHIP[g.country];
      const courses = (g.courseIds || []).map(cid => window.OMT.DATA.GOLF_COURSES.find(c => c.id === cid)?.name).filter(Boolean);
      out.push({
        id: g.id, tier, tierLabel, title: g.name,
        img: g.images?.[0],
        hotel: `${g.hotelName} (${g.nights}박)`,
        rounds: `${g.rounds}회 라운딩 · ${courses.join(' · ') || '명문 코스'}`,
        ownership: own.label,
        ownershipModel: own.model,
        price: g.pricePerPerson,
        isGolftel: true
      });
    });
    return out;
  }

     사용자 프로필 자동 인식 — 등급·선호 국가
     ========================================================================= */
  function loadUserProfile(){
    if(!window.OMT?.State) return null;
    const user = window.OMT.State.getUser?.() || null;
    const bookings = window.OMT.State.getBookings?.() || [];
    // 가장 많이 예약한 국가
    const countryCounts = {};
    bookings.forEach(b => {
      const c = (b.dates || b.destination || '').toString();
      if(c.includes('일본') || c.includes('japan')) countryCounts['일본'] = (countryCounts['일본']||0)+1;
      if(c.includes('베트남') || c.includes('vietnam')) countryCounts['베트남'] = (countryCounts['베트남']||0)+1;
      if(c.includes('태국') || c.includes('thailand')) countryCounts['태국'] = (countryCounts['태국']||0)+1;
      if(c.includes('필리핀') || c.includes('philippines')) countryCounts['필리핀'] = (countryCounts['필리핀']||0)+1;
    });
    const favoriteCountry = Object.entries(countryCounts).sort((a,b)=>b[1]-a[1])[0]?.[0] || null;
    return { user, bookings, favoriteCountry, bookingCount: bookings.length };
  }

  /* =========================================================================
     FLOW CONTROL
     ========================================================================= */
  function pickChoice(value, stateKey, next){
    state[stateKey] = value;
    addUserMessage(value);
    goTo(next);
  }

  function requestTextInput(stateKey, promptText, next){
    state.awaitingText = { key: stateKey, next };
    addBotMessage(promptText);
    userInput.focus();
  }

  async function goTo(stepName){
    state.current = stepName;
    const step = FLOW[stepName];
    if(!step){ console.warn('Unknown step:', stepName); return; }

    // Dedicated run() for custom steps (loading, results)
    if(typeof step.run === 'function'){
      await step.run();
      return;
    }

    const messages = typeof step.messages === 'function' ? step.messages(state) : step.messages;
    for(const m of messages){
      await addBotMessage(m);
    }
    if(step.quickReplies && step.quickReplies.length){
      renderQuickReplies(step.quickReplies);
    }
  }

  function restart(){
    Object.assign(state, {
      destination: null, style: null, duration: null, pax: null, budget: null,
      current: 'greeting', awaitingText: null
    });
    chatBody.innerHTML = '';
    goTo('greeting');
  }

  /* =========================================================================
     USER TEXT INPUT
     ========================================================================= */
  function autoGrow(){
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    sendBtn.disabled = userInput.value.trim().length === 0;
  }
  userInput.addEventListener('input', autoGrow);
  userInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      chatForm.requestSubmit();
    }
  });

  chatForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = userInput.value.trim();
    if(!text) return;

    addUserMessage(text);
    userInput.value = '';
    autoGrow();

    // If waiting for a specific answer (e.g., "직접 입력" destination)
    if(state.awaitingText){
      const { key, next } = state.awaitingText;
      state[key] = text;
      state.awaitingText = null;
      goTo(next);
      return;
    }

    // Otherwise, free-form question — 골프 Q&A 데이터셋 매칭
    await sleep(400);
    const answer = answerGolfQuestion(text);
    await addBotMessage(answer.text, { typingDelay: 800, speed: 18 });
    if(answer.followUp){
      renderQuickReplies(answer.followUp);
    }
  });

      text: '👨‍👩‍👧 가족 여행 추천:\n\n🌟 푸꾸옥 빈펄 (베트남)\n  └ 워터파크·아쿠아리움 포함, 키즈클럽\n\n🌟 카누차 오키나와 (일본)\n  └ 프라이빗 비치, 가족실 4인룸\n\n🌟 나트랑 빈펄 럭셔리 (베트남)\n  └ VIP 매니저 1:1 케어, 키즈 메뉴\n\n어린이는 라운딩 불가지만 캐디 매칭 서비스로 부모님만 골프 가능해요!',
      followUp: ['🇻🇳 푸꾸옥 보기', '🇯🇵 오키나와 보기', '🌏 처음부터 다시']
    },
    {
      keywords: ['vip', '럭셔리', '프리미엄', '5성'],
      text: '⭐ VIP·럭셔리 추천:\n\n🏆 나트랑 빈펄 7박 럭셔리 (베트남)\n  └ 980만원~ · VIP 매니저 전담 · 프라이빗 빌라\n\n🏆 카누차 오키나와 풀스위트 (일본)\n  └ 540만원~ · 챔피언 코스 라운딩 + 미슐랭 셰프\n\n🏆 푸꾸옥 빈펄 럭셔리 (베트남)\n  └ 720만원~ · 헬리 픽업 + 골프 PRO 1:1 레슨\n\n전담 컨시어지로 카톡 24시간 상담 가능해요.',
      followUp: ['🇻🇳 베트남 VIP', '🇯🇵 일본 VIP', '🌏 처음부터 다시']
    }
  ];

  function answerGolfQuestion(text){
    const q = text.toLowerCase();
    for(const item of GOLF_QA){
      if(item.keywords.some(k => q.includes(k.toLowerCase()))){
        return item;
      }
    }
    // 매칭 실패 — 기본 응답
    return {
      text: '💭 "' + text + '" 관련 답변을 찾고 있어요...\n\n해당 키워드로는 정확한 답변이 어렵네요. 아래 자주 묻는 질문 중에서 선택하시거나 단계별 추천을 받아보세요!',
      followUp: ['💰 캐디 팁은?', '👕 복장 규정', '🌧 우천 시 환불', '🌏 추천 받고 싶어요']
    };
  }

  /* =========================================================================
     음성 입력 mock — 마이크 애니메이션 + 5초 자동 인식
     ========================================================================= */
  let micActive = false;
  const VOICE_SAMPLES = [
    '베트남 다낭으로 4박 5일 골프 여행 가고 싶어요',
    '캐디 팁은 얼마 정도 드려야 하나요',
    '초보인데 어디가 좋을까요',
    '8명 단체로 갈만한 곳 추천해주세요',
    '예산 200만원으로 갈 수 있는 곳',
    '가족여행으로 추천해주세요',
    '필리핀 클락 갈만한가요'
  ];

  function handleMic(){
    if(micActive){
      stopMicListening();
      return;
    }
    startMicListening();
  }

  function startMicListening(){
    micActive = true;
    const micBtn = document.getElementById('micBtn');
    if(micBtn){
      micBtn.style.background = '#FF3366';
      micBtn.style.color = '#fff';
      micBtn.classList.add('mic-active');
      micBtn.innerHTML = '⏺';
    }
    // 오버레이 표시
    const overlay = document.createElement('div');
    overlay.id = 'micOverlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:grid;place-items:center;backdrop-filter:blur(4px);';
    overlay.innerHTML = `
      <div style="background:#fff;border-radius:24px;padding:32px 28px;width:min(360px,86vw);text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.4);">
        <div style="width:80px;height:80px;margin:0 auto 16px;border-radius:50%;background:radial-gradient(circle,#FF6B35,#FF3366);display:grid;place-items:center;animation:pulse-mic 1.2s ease-in-out infinite;">
          <span style="font-size:36px;">🎙</span>
        </div>
        <div style="font-size:16px;font-weight:900;color:#1A1A1A;margin-bottom:6px;">듣고 있어요...</div>
        <div style="font-size:12px;color:#6B7280;margin-bottom:18px;" id="micTimer">5초 후 자동 인식</div>
        <div style="display:flex;gap:8px;justify-content:center;align-items:end;height:32px;margin-bottom:18px;" id="micWaves">
          ${Array.from({length:7}, (_,i)=>`<div style="width:4px;background:linear-gradient(180deg,#FF6B35,#FF3366);border-radius:2px;animation:wave .8s ease-in-out infinite;animation-delay:${i*0.1}s;"></div>`).join('')}
        </div>
        <button onclick="window.__cancelMic()" style="padding:10px 20px;background:#F3F4F6;border:none;border-radius:8px;font-size:13px;font-weight:700;color:#6B7280;cursor:pointer;font-family:inherit;">취소</button>
      </div>
      <style>
        @keyframes pulse-mic{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,51,102,.6);}50%{transform:scale(1.08);box-shadow:0 0 0 20px rgba(255,51,102,0);}}
        @keyframes wave{0%,100%{height:8px;}50%{height:32px;}}
      </style>
    `;
    document.body.appendChild(overlay);

    // 카운트다운
    let remaining = 5;
    const timerEl = document.getElementById('micTimer');
    const countdown = setInterval(() => {
      remaining--;
      if(timerEl) timerEl.textContent = `${remaining}초 후 자동 인식`;
      if(remaining <= 0){
        clearInterval(countdown);
      }
    }, 1000);

    // 취소 함수 노출
    window.__cancelMic = () => {
      clearInterval(countdown);
      stopMicListening();
    };

    // 5초 후 자동 인식
    state.micTimeout = setTimeout(() => {
      clearInterval(countdown);
      const recognizedText = VOICE_SAMPLES[Math.floor(Math.random() * VOICE_SAMPLES.length)];
      stopMicListening();
      userInput.value = recognizedText;
      autoGrow();
      // 0.3초 후 자동 발송
      setTimeout(() => {
        if(userInput.value === recognizedText){
          chatForm.requestSubmit();
        }
      }, 300);
    }, 5000);
  }

  function stopMicListening(){
    micActive = false;
    const micBtn = document.getElementById('micBtn');
    if(micBtn){
      micBtn.style.background = '';
      micBtn.style.color = '';
      micBtn.classList.remove('mic-active');
      micBtn.innerHTML = '🎙';
    }
    const overlay = document.getElementById('micOverlay');
    if(overlay) overlay.remove();
    if(state.micTimeout){
      clearTimeout(state.micTimeout);
      state.micTimeout = null;
    }
  }

  /* Restart button */
  document.getElementById('restartBtn').addEventListener('click', () => {
    if(confirm('대화를 처음부터 다시 시작할까요?')) restart();
  });

  /* =========================================================================
     MOBILE: keep chat scrolled to bottom when keyboard opens
     ========================================================================= */
  userInput.addEventListener('focus', () => {
    setTimeout(() => scrollToBottom(true), 300);
  });
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', () => {
      scrollToBottom(false);
    });
  }

  /* =========================================================================
     INIT
     ========================================================================= */
  window.addEventListener('load', async () => {
    // 저장된 여행 재진입 (?trip=tripId)
    const tripId = new URLSearchParams(location.search).get('trip');
    if(tripId && window.OMT?.State?.getSavedTrips){
      const saved = window.OMT.State.getSavedTrips().find(t => t.id === tripId);
      if(saved){
        await addBotMessage(`💾 저장하신 "${saved.name}" 여행을 다시 불러왔어요!`);
        await addBotMessage('동일 조건으로 다시 추천을 받아볼게요...');
        Object.assign(state, saved);
        await sleep(600);
        goTo('loading');
        return;
      }
    }

    if(urlQuery){
      await addBotMessage(`안녕하세요! "${urlQuery}" 관련해서 도와드릴게요 ✦`);
      await addBotMessage('먼저 몇 가지만 확인할게요. 어디로 여행 가고 싶으세요?');
      renderQuickReplies(FLOW.greeting.quickReplies);
    } else {
      // 사용자 프로필 자동 인식 — 회원이면 맞춤 인사
      const profile = loadUserProfile();
      if(profile && profile.bookingCount > 0 && profile.favoriteCountry){
        await addBotMessage(`안녕하세요! 이전에 ${profile.bookingCount}번 예약하셨네요 ✦`);
        await addBotMessage(`${profile.favoriteCountry}을(를) 즐겨 가시는 것 같은데, 이번에도 비슷한 곳으로 추천드릴까요?`);
        renderQuickReplies([
          { label:`✨ ${profile.favoriteCountry} 또 가기`, value: profile.favoriteCountry, then: state => { state.destination = profile.favoriteCountry; goTo('style'); } },
          ...FLOW.greeting.quickReplies
        ]);
      } else {
        goTo('greeting');
      }
    }
  });
  </script>
</body>
